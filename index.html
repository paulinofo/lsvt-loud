function showErrBanner(msg){
  try{
    var d=document.createElement("div");
    d.style.cssText="position:fixed;bottom:0;left:0;right:0;z-index:999;background:#c62828;color:#fff;font-size:11px;padding:8px 12px;font-family:monospace;word-break:break-word;";
    d.textContent="⚠️ "+msg;
    document.body.appendChild(d);
    setTimeout(function(){ try{ d.remove(); }catch(e){} }, 20000);
  }catch(e){}
}
window.addEventListener("error", function(ev){ showErrBanner((ev.message||"error")+(ev.lineno?(" @"+ev.lineno):"")); });

{titulo:"El colibrí y el incendio",
 texto:"Una tarde de mucho calor, un rayo cayó sobre el bosque y comenzó un incendio. Las llamas crecían y crecían, y todos los animales corrieron hacia el río para ponerse a salvo. Desde la orilla miraban arder su casa, asustados y tristes, sin saber qué hacer.\n\nDe pronto, el león vio pasar un colibrí volando hacia el fuego. Llevaba en el pico una gota de agua. La dejó caer sobre las llamas, regresó al río, tomó otra gota, y volvió a volar hacia el incendio. Una y otra vez. Una gota cada vez.\n\nEl león le gritó: «¡Colibrí! ¿Estás loco? ¡Eso no sirve de nada! El fuego es enorme y tú eres el pájaro más pequeño del bosque. ¿Qué crees que vas a lograr con una gota de agua?»\n\nEl colibrí se detuvo un momento en el aire, miró al león y le contestó con voz clara y fuerte: «Puede que yo solo no apague el incendio. Pero yo estoy haciendo mi parte.»\n\nLos animales se quedaron en silencio. Uno a uno bajaron la cabeza, avergonzados. El elefante fue el primero en moverse: se metió al río, llenó su trompa y lanzó un chorro enorme sobre las llamas. Después el oso llevó agua en sus patas. Los castores hicieron un canal. Las aves llevaron gotas, como el colibrí. Hasta los ratones ayudaron, cargando hojas mojadas.\n\nCuando cayó la noche, el fuego estaba apagado. El bosque olía a humo, pero seguía en pie. Y todos sabían que había empezado con una sola gota de agua, llevada por el más pequeño de todos.\n\nAl día siguiente, el león reunió a los animales y dijo: «Ayer aprendí algo que no voy a olvidar. Ninguno de nosotros es demasiado pequeño para ayudar, y ningún esfuerzo es demasiado chico cuando se hace con el corazón completo.»\n\nEl colibrí, desde una rama, sonrió. Sus alas todavía estaban cansadas, pero su pecho estaba lleno de orgullo. No había sido el más fuerte, ni el más grande, ni el más rápido. Había sido, simplemente, el que no se quedó quieto.\n\nMoraleja: no esperes a poder hacerlo todo para empezar a hacer algo. Los grandes cambios comienzan con esfuerzos pequeños y constantes — gota a gota, día a día. Como tu práctica de voz de hoy: cada repetición es una gota, y las gotas juntas apagan incendios."},
{titulo:"Las dos ranas y la crema",
 texto:"Dos ranas saltaban una noche por la cocina de una granja. Sobre la mesa había un balde grande, y las dos, por curiosas, se asomaron al mismo tiempo. Resbalaron y cayeron adentro. El balde estaba lleno de crema espesa.\n\nLas ranas nadaron y nadaron, buscando la orilla. Pero las paredes del balde eran altas y lisas, y la crema era pesada como el lodo. No había de dónde agarrarse. No había manera de saltar.\n\nLa primera rana, después de un rato, se desanimó. «Esto no tiene remedio», pensó. «Nadie puede salir de aquí. ¿Para qué seguir pataleando, si el final va a ser el mismo?» Y así, convencida de que no había esperanza, dejó de mover las patas. La crema la cubrió despacio, y ahí terminó su historia.\n\nLa segunda rana también tenía miedo. También estaba cansada. También pensó, más de una vez, que aquello era imposible. Pero cada vez que le venía ese pensamiento, se contestaba a sí misma: «Mientras tenga fuerzas, yo pataleo. Descanso un poquito si hace falta, pero no me detengo.»\n\nY pataleó. Pataleó toda la noche. Pataleó cuando le dolían las piernas, pataleó cuando el sueño la vencía, pataleó cuando ya no le quedaba casi nada. Pequeñas pausas para respirar, y otra vez a patalear.\n\nY entonces sucedió algo que la rana no sabía que podía suceder: de tanto batirla, la crema empezó a espesarse. Primero se hizo más firme, después más dura, hasta que, con el amanecer, se convirtió en mantequilla. La rana sintió algo sólido bajo sus patas, se paró encima del bloque de mantequilla, tomó impulso, y de un salto salió del balde.\n\nAfuera, mientras recuperaba el aliento, miró hacia adentro y entendió la lección: ella no sabía que la crema podía volverse mantequilla. No dejó de patalear porque tuviera garantías. Dejó de rendirse, que es distinto.\n\nMoraleja: muchas veces no podemos ver la salida, pero eso no significa que no exista. El esfuerzo constante transforma las cosas de maneras que no imaginamos. Patalea hoy, patalea mañana — y un día, sin avisar, habrá suelo firme bajo tus pies. Con la voz pasa igual: cada día de práctica espesa la crema."},
{titulo:"El burro y el pozo",
 texto:"Un burro viejo se cayó una mañana en un pozo seco. El pozo era profundo y el burro no podía salir. Rebuznó durante horas, pidiendo ayuda, hasta que llegó el granjero con sus vecinos.\n\nEl granjero miró hacia el fondo y movió la cabeza. «El pozo está seco y de todas formas había que taparlo», dijo. «Y el burro ya está viejo. No vale la pena el esfuerzo de sacarlo. Ayúdenme a rellenar el pozo con tierra, y que descanse ahí.»\n\nLos vecinos tomaron sus palas y empezaron a echar tierra al pozo. El burro, al darse cuenta de lo que hacían, lloró desesperado. ¡Le estaban echando tierra encima! ¡Lo estaban enterrando vivo!\n\nPero después de unas cuantas paladas, el burro se quedó callado. El granjero se asomó al pozo y no podía creer lo que veía.\n\nCon cada palada de tierra que le caía encima, el burro hacía algo asombroso: se sacudía la tierra del lomo y daba un paso hacia arriba, sobre la tierra acumulada. Palada tras palada, el burro se sacudía y subía un paso. Se sacudía y subía. Se sacudía y subía.\n\nMuy pronto, todos vieron cómo el burro llegaba a la boca del pozo, daba un último salto, y salía trotando, cansado pero entero. Lo que iba a enterrarlo lo había levantado — porque él decidió qué hacer con cada palada.\n\nEl granjero se quitó el sombrero. Aquel burro viejo, al que ya no le veían valor, les acababa de dar a todos una lección que ninguna escuela enseña: la vida te va a echar tierra encima. A veces por error, a veces con intención, a veces sin razón alguna. Enfermedades, pérdidas, malas noticias, días grises. El truco no está en evitar la tierra — eso no se puede. El truco está en sacudírsela y usarla de escalón.\n\nCada problema trae escondida una decisión: te aplasta o te sube, y eso no lo decide el problema. Lo decides tú.\n\nMoraleja: cuando sientas que te llueve tierra encima, sacúdete y da un paso arriba. Lo que parece enterrarte puede ser justo lo que te saque del pozo. Hoy, cada AHHH fuerte y cada frase en voz alta es una sacudida más — y un paso más hacia arriba."},
{titulo:"El bambú que no crecía",
 texto:"Un campesino sembró un día una semilla de bambú japonés. Su vecino, ese mismo día, sembró maíz. A las pocas semanas, el maíz del vecino ya levantaba sus hojas verdes. La semilla de bambú, nada.\n\nPasó un año. El maíz se cosechó, se volvió a sembrar, y volvió a crecer. Del bambú, ni una señal. La tierra estaba igual que el primer día.\n\n«Esa semilla salió mala», le decía el vecino. «Ya siembra otra cosa. Estás perdiendo tu tiempo.» Pero el campesino regaba su pedazo de tierra todos los días. Lo abonaba. Le quitaba las hierbas. Y no se veía nada.\n\nPasaron dos años. Tres. Cuatro. El campesino seguía cuidando un pedazo de tierra donde aparentemente no había nada. El pueblo entero pensaba que estaba loco. Hasta su familia le pedía que se rindiera. Él contestaba siempre lo mismo: «La semilla está trabajando. Yo también.»\n\nY en el quinto año, sucedió. Un brote verde rompió la tierra. Y en las semanas siguientes, ante los ojos asombrados de todos, el bambú creció y creció sin parar: dos metros, cinco metros, ¡más de veinte metros en pocas semanas! El árbol más alto de toda la región, crecido en un abrir y cerrar de ojos.\n\n¿En un abrir y cerrar de ojos? No. El campesino sabía la verdad: durante esos cinco años, la semilla no estaba dormida. Estaba echando raíces. Raíces profundas y fuertes, metros y metros de raíces bajo la tierra, invisibles para todos. Sin esas raíces, un tallo de veinte metros se caería con el primer viento. El bambú no tardó cinco años en crecer. Tardó cinco años en prepararse para crecer.\n\nEl campesino cortó una vara de aquel bambú y la guardó junto a su puerta, para recordar la lección cada mañana: lo que no se ve también cuenta. Sobre todo, lo que no se ve.\n\nMoraleja: cuando practiques y no veas resultados, recuerda al bambú: estás echando raíces. Cada ejercicio que parece no cambiar nada está construyendo, por dentro, la fuerza que después todos verán. No preguntes cuánto falta. Riega tu tierra hoy — con tu voz fuerte y clara — y deja que las raíces hagan su trabajo."},
{titulo:"La zanahoria, el huevo y el café",
 texto:"Una joven fue a ver a su abuela y le dijo: «Abuela, ya no puedo más. Los problemas no se acaban. Resuelvo uno y aparecen dos. Estoy cansada de luchar. ¿Cómo le hiciste tú, que pasaste por tantas cosas?»\n\nLa abuela no contestó. La llevó a la cocina, puso tres ollas con agua en la lumbre y esperó a que hirvieran. En la primera echó una zanahoria. En la segunda, un huevo. En la tercera, un puñado de café molido. Las dejó hervir sin decir palabra, mientras la nieta esperaba con impaciencia.\n\nA los veinte minutos apagó la lumbre. Sacó la zanahoria y la puso en un plato. Sacó el huevo y lo puso al lado. Sirvió el café en una taza. Y entonces preguntó: «¿Qué ves, mi hija?»\n\n«Una zanahoria, un huevo y café», contestó la nieta, encogiéndose de hombros.\n\n«Tócalos», dijo la abuela. La nieta tocó la zanahoria: estaba blanda, se deshacía. Peló el huevo: estaba duro por dentro. Probó el café: era aromático, fuerte, delicioso.\n\n«Los tres pasaron por la misma agua hirviendo», dijo la abuela. «La misma agua, el mismo fuego, el mismo tiempo. Pero cada uno respondió diferente. La zanahoria entró dura y fuerte, y el agua la ablandó: se rindió. El huevo entró frágil, con su cascarón delgado, y el agua lo endureció por dentro: se hizo duro, cerrado, amargo. Pero el café… el café hizo algo distinto. El café transformó el agua. La convirtió en algo nuevo, en algo mejor. No dejó que el agua hirviendo lo cambiara a él: él cambió al agua.»\n\nLa nieta se quedó mirando la taza un largo rato.\n\n«La vida te va a hervir, mi hija. A todos nos hierve. La pregunta no es si vendrán problemas, porque van a venir. La pregunta es: ¿tú qué eres? ¿Zanahoria, huevo o café?»\n\nDicen que la nieta se tomó el café despacio, y que salió de esa cocina caminando más derecha.\n\nMoraleja: no puedes elegir el agua hirviendo, pero sí puedes elegir qué hacer con ella. Que las dificultades no te ablanden ni te endurezcan: transfórmalas en algo bueno, como el café. Practicar tu voz en tiempos difíciles es exactamente eso — convertir el agua caliente en aroma."}

{titulo:"The hummingbird and the fire",
 texto:"One hot afternoon, lightning struck the forest and a fire began. The flames grew and grew, and all the animals ran to the river to save themselves. From the bank they watched their home burn, scared and sad, not knowing what to do.\n\nSuddenly, the lion saw a hummingbird flying toward the fire. In her beak she carried one drop of water. She dropped it on the flames, returned to the river, picked up another drop, and flew back to the fire. Again and again. One drop at a time.\n\nThe lion shouted: \"Hummingbird! Are you crazy? That does nothing! The fire is enormous and you are the smallest bird in the forest. What do you think you will accomplish with one drop of water?\"\n\nThe hummingbird paused in the air, looked at the lion, and answered in a clear, loud voice: \"Maybe I cannot put out the fire alone. But I am doing my part.\"\n\nThe animals went quiet. One by one they lowered their heads, ashamed. The elephant moved first: he walked into the river, filled his trunk, and threw a huge stream over the flames. Then the bear carried water in his paws. The beavers dug a channel. The birds carried drops, like the hummingbird. Even the mice helped, dragging wet leaves.\n\nBy nightfall, the fire was out. The forest smelled of smoke, but it was still standing. And everyone knew it had started with a single drop of water, carried by the smallest of them all.\n\nThe next day the lion gathered the animals and said: \"Yesterday I learned something I will not forget. None of us is too small to help, and no effort is too little when it is given with a whole heart.\"\n\nFrom a branch, the hummingbird smiled. Her wings were still tired, but her chest was full of pride. She had not been the strongest, or the biggest, or the fastest. She had simply been the one who refused to stand still.\n\nThe moral: do not wait until you can do everything to start doing something. Great changes begin with small, steady efforts — drop by drop, day by day. Just like your voice practice today: every repetition is a drop, and enough drops put out fires."},
{titulo:"The two frogs and the cream",
 texto:"Two frogs were hopping through a farm kitchen one night. On the table stood a large bucket, and both frogs, curious, leaned over the edge at the same time. They slipped and fell in. The bucket was full of thick cream.\n\nThe frogs swam and swam, looking for the edge. But the walls of the bucket were tall and smooth, and the cream was heavy like mud. There was nothing to hold on to. There was no way to jump.\n\nAfter a while, the first frog lost heart. \"This is hopeless,\" she thought. \"No one can get out of here. Why keep kicking, if the ending will be the same?\" And so, convinced there was no hope, she stopped moving her legs. The cream covered her slowly, and there her story ended.\n\nThe second frog was afraid too. She was also tired. More than once she also thought it was impossible. But every time that thought came, she answered herself: \"As long as I have strength, I kick. I can rest a little if I need to, but I will not stop.\"\n\nAnd she kicked. She kicked all night. She kicked when her legs ached, she kicked when sleep tried to take her, she kicked when she had almost nothing left. Small pauses to breathe, and then kicking again.\n\nAnd then something happened that the frog did not know could happen: from all that churning, the cream began to thicken. First it grew firmer, then harder, until, with the sunrise, it turned into butter. The frog felt something solid under her feet, stood on the block of butter, pushed off, and with one jump she was out of the bucket.\n\nOutside, catching her breath, she looked back in and understood the lesson: she had not known the cream could turn into butter. She had not kept kicking because she had guarantees. She had simply refused to give up — which is a different thing.\n\nThe moral: often we cannot see the way out, but that does not mean there is none. Steady effort transforms things in ways we cannot imagine. Kick today, kick tomorrow — and one day, without warning, there will be solid ground under your feet. Your voice works the same way: every day of practice thickens the cream."},
{titulo:"The donkey and the well",
 texto:"One morning, an old donkey fell into a dry well. The well was deep and the donkey could not get out. He brayed for hours, calling for help, until the farmer arrived with his neighbors.\n\nThe farmer looked down and shook his head. \"The well is dry and we needed to fill it in anyway,\" he said. \"And the donkey is old. It is not worth the trouble of pulling him out. Help me fill the well with dirt, and let him rest there.\"\n\nThe neighbors took their shovels and began throwing dirt into the well. The donkey, realizing what they were doing, cried out in despair. They were throwing dirt on him! They were burying him alive!\n\nBut after a few shovelfuls, the donkey went quiet. The farmer looked into the well and could not believe his eyes.\n\nWith every shovelful of dirt that landed on him, the donkey was doing something astonishing: he shook the dirt off his back and took one step up, onto the pile beneath him. Shovelful after shovelful, the donkey shook it off and stepped up. Shook it off and stepped up. Shook it off and stepped up.\n\nSoon, everyone watched the donkey reach the mouth of the well, give one last jump, and trot away — tired, but whole. What was meant to bury him had lifted him — because he decided what to do with every shovelful.\n\nThe farmer took off his hat. That old donkey, the one nobody thought was worth saving, had just taught them all a lesson no school teaches: life will throw dirt on you. Sometimes by mistake, sometimes on purpose, sometimes for no reason at all. Illness, losses, bad news, gray days. The trick is not avoiding the dirt — that is impossible. The trick is shaking it off and using it as a step.\n\nEvery problem carries a hidden decision: it crushes you or it lifts you — and the problem does not make that decision. You do.\n\nThe moral: when you feel the dirt raining down, shake it off and take a step up. What seems to bury you may be exactly what gets you out of the well. Today, every loud AHHH and every phrase spoken out loud is one more shake — and one more step up."},
{titulo:"The bamboo that would not grow",
 texto:"One day a farmer planted a Japanese bamboo seed. That same day, his neighbor planted corn. Within a few weeks, the neighbor's corn was raising its green leaves. The bamboo seed showed nothing.\n\nA year passed. The corn was harvested, replanted, and grew again. From the bamboo, not a sign. The soil looked exactly as it had on the first day.\n\n\"That seed was a bad one,\" the neighbor kept saying. \"Plant something else. You are wasting your time.\" But the farmer watered his patch of earth every day. He fertilized it. He pulled the weeds. And still nothing showed.\n\nTwo years passed. Three. Four. The farmer kept caring for a patch of ground where, apparently, nothing existed. The whole town thought he had lost his mind. Even his family begged him to give up. He always answered the same way: \"The seed is working. So am I.\"\n\nAnd in the fifth year, it happened. A green shoot broke through the earth. And in the following weeks, before everyone's astonished eyes, the bamboo grew without stopping: six feet, fifteen feet, more than sixty feet in a matter of weeks! The tallest plant in the whole region, grown in the blink of an eye.\n\nIn the blink of an eye? No. The farmer knew the truth: during those five years, the seed had not been sleeping. It had been growing roots. Deep, strong roots, yards and yards of roots under the ground, invisible to everyone. Without those roots, a sixty-foot stalk would fall with the first wind. The bamboo did not take five years to grow. It took five years to prepare to grow.\n\nThe farmer cut a cane from that bamboo and kept it by his door, to remember the lesson every morning: what cannot be seen also counts. Above all, what cannot be seen.\n\nThe moral: when you practice and see no results, remember the bamboo: you are growing roots. Every exercise that seems to change nothing is quietly building the strength that everyone will see later. Do not ask how much longer. Water your ground today — with your loud, clear voice — and let the roots do their work."},
{titulo:"The carrot, the egg, and the coffee",
 texto:"A young woman went to see her grandmother and said: \"Grandma, I cannot take it anymore. The problems never end. I solve one and two more appear. I am tired of fighting. How did you do it, after everything you went through?\"\n\nThe grandmother did not answer. She took her to the kitchen, set three pots of water on the stove, and waited for them to boil. In the first she placed a carrot. In the second, an egg. In the third, a handful of ground coffee. She let them boil without a word, while her granddaughter waited impatiently.\n\nAfter twenty minutes she turned off the stove. She took out the carrot and put it on a plate. She took out the egg and placed it beside it. She poured the coffee into a cup. Then she asked: \"What do you see, my dear?\"\n\n\"A carrot, an egg, and coffee,\" the granddaughter answered, shrugging.\n\n\"Touch them,\" said the grandmother. The granddaughter touched the carrot: it was soft, falling apart. She peeled the egg: it was hard inside. She tasted the coffee: it was rich, strong, delicious.\n\n\"All three went through the same boiling water,\" said the grandmother. \"The same water, the same fire, the same time. But each one answered differently. The carrot went in hard and strong, and the water made it soft: it gave up. The egg went in fragile, with its thin shell, and the water hardened it inside: it became tough, closed, bitter. But the coffee… the coffee did something different. The coffee transformed the water. It turned it into something new, something better. It did not let the boiling water change it: it changed the water.\"\n\nThe granddaughter stared at the cup for a long time.\n\n\"Life will boil you, my dear. It boils all of us. The question is not whether problems will come, because they will. The question is: what are you? A carrot, an egg, or coffee?\"\n\nThey say the granddaughter drank the coffee slowly, and walked out of that kitchen standing a little taller.\n\nThe moral: you cannot choose the boiling water, but you can choose what to do with it. Do not let difficulties soften you or harden you: transform them into something good, like the coffee. Practicing your voice in hard times is exactly that — turning hot water into aroma."}

// Récords de tono del historial: nota más alta (ej.2), más grave (ej.3) y promedio al hablar (ej.1).
function personalPitch(){
  var hi=null, lo=null, speak=[], n=0;
  state.log.forEach(function(s){
    var e=s.exercises||{};
    if(e[1]&&e[1].pitch&&e[1].pitch.hz){ var m=freqToMidi(e[1].pitch.hz); if(hi==null||m>hi) hi=m; }
    if(e[2]&&e[2].pitch&&e[2].pitch.hz){ var m2=freqToMidi(e[2].pitch.hz); if(lo==null||m2<lo) lo=m2; }
    if(e[0]&&e[0].pitch&&e[0].pitch.hz){ speak.push(freqToMidi(e[0].pitch.hz)); }
  });
  return {hi:hi, lo:lo, speak:speak.length?speak.reduce(function(a,b){return a+b;},0)/speak.length:null};
}
// Zona de tono efectiva: personalizada a los récords del paciente; si no hay historial, la genérica.
function exZone(ex){
  var z=ex.zone; if(!z) return z;
  var p=personalPitch();
  if(ex.pitchRole==="max" && p.hi!=null){
    var mn=Math.round(p.hi)-2;
    return {min:mn, max:z.max, mode:"above", label:tt("tu zona récord (","your record zone (")+midiName(mn)+"+)"};
  }
  if(ex.pitchRole==="min" && p.lo!=null){
    var mx=Math.round(p.lo)+2;
    return {min:z.min, max:mx, mode:"below", label:tt("tu zona récord (","your record zone (")+midiName(mx)+"−)"};
  }
  if(ex.pitchRole==="avg" && p.speak!=null){
    var c=Math.round(p.speak);
    return {min:c-3, max:c+3, mode:"in", label:tt("tu rango habitual (","your usual range (")+midiName(c-3)+"–"+midiName(c+3)+")"};
  }
  return z;
}
// Meta de duración efectiva del sostenido. Prioridad: valor que el usuario fijó a mano;
// si no, para TONO NORMAL el 90% de tu mejor marca histórica (mínimo 8 s); para los demás su default.
function exTarget(ex){

}

function computeStreak(log){
  if(!log.length) return 0;
  var days={}; log.forEach(function(s){ days[localDay(s.date)]=1; });
  var streak=0, cur=new Date();
  function key(){ return cur.getFullYear()+"-"+pad(cur.getMonth()+1)+"-"+pad(cur.getDate()); }
  if(!days[key()]) cur.setDate(cur.getDate()-1);
  while(days[key()]){ streak++; cur.setDate(cur.getDate()-1); }
  return streak;
}

// Nota más frecuente de las últimas lecturas (estabiliza la identificación del tono).
function modeMidi(arr){
  if(!arr.length) return null;
  var count={}, best=arr[arr.length-1], bestN=0;
  for(var i=0;i<arr.length;i++){ var v=arr[i]; count[v]=(count[v]||0)+1; if(count[v]>bestN){ bestN=count[v]; best=v; } }
  return best;
}

/* ─────────── Motor de audio ─────────── */
function getCtx(){
  if(!state.audioCtx){
    var AC = window.AudioContext || window.webkitAudioContext;
    state.audioCtx = new AC();
  }
  if(state.audioCtx.state==="suspended") state.audioCtx.resume();
  return state.audioCtx;
}
function playTone(midi){
  try{
    var ctx=getCtx(), osc=ctx.createOscillator(), g=ctx.createGain();
    osc.type="sine"; osc.frequency.value=midiToFreq(midi);
    var t=ctx.currentTime;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.35,t+0.03);
    g.gain.exponentialRampToValueAtTime(0.0001,t+1.5);
    osc.connect(g).connect(ctx.destination); osc.start(t); osc.stop(t+1.6);
  }catch(e){}
}
function autoCorrelate(buf, sr){
  var SIZE=buf.length, rms=0, i, j;
  for(i=0;i<SIZE;i++) rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/SIZE);
  if(rms<0.003) return {freq:-1,rms:rms};   // puerta mínima baja: la validación real de "voz" es relativa al piso de ruido (voiceGate)
  var r1=0, r2=SIZE-1, thres=0.2;
  for(i=0;i<SIZE/2;i++){ if(Math.abs(buf[i])<thres){ r1=i; break; } }
  for(i=1;i<SIZE/2;i++){ if(Math.abs(buf[SIZE-i])<thres){ r2=SIZE-i; break; } }
  var b2=buf.slice(r1,r2), N=b2.length;
  if(N<32) return {freq:-1,rms:rms};
  var c=new Float32Array(N);
  for(i=0;i<N;i++){ var sum=0; for(j=0;j<N-i;j++) sum+=b2[j]*b2[j+i]; c[i]=sum; }
  var d=0; while(d<N-1 && c[d]>c[d+1]) d++;
  var maxval=-1, maxpos=-1;
  for(i=d;i<N;i++){ if(c[i]>maxval){ maxval=c[i]; maxpos=i; } }
  if(maxpos<=0) return {freq:-1,rms:rms};
  // Calidad del pico: la voz real correlaciona fuerte (~0.6–0.9 del máximo teórico c[0]);
  // el ruido produce picos aleatorios débiles (<0.3) que NO deben contar como tono.
  if(c[0]<=0 || maxval/c[0]<0.45) return {freq:-1,rms:rms};
  var T0=maxpos, x1=c[T0-1]||0, x2=c[T0], x3=c[T0+1]||0;
  var a=(x1+x3-2*x2)/2, bb=(x3-x1)/2;
  if(a) T0=T0-bb/(2*a);
  var freq=sr/T0;
  if(freq<65||freq>1200) return {freq:-1,rms:rms};   // <65 Hz: fuera el zumbido eléctrico (60 Hz); DO2=65.4 Hz sigue dentro
  return {freq:freq,rms:rms};
}
function startMic(cb){
  state.micError=null;
  // iOS CRÍTICO: crear y reanudar el AudioContext SÍNCRONAMENTE dentro del gesto (toque),
  // ANTES de pedir el micrófono. Si se hace después del await, iOS lo bloquea.
  var ctx;
  try{
    ctx=getCtx();
    if(ctx.state==="suspended"){ ctx.resume(); }
  }catch(e){
    state.micError="No se pudo iniciar el audio en este navegador. Prueba abrir la app en Safari."; render(); if(cb)cb(false); return;
  }

  // Desactivar el procesamiento del micrófono: en iOS el control automático de ganancia,
  // la cancelación de eco y la supresión de ruido alteran el tono y el volumen medidos.
  var micConstraints={audio:{echoCancellation:false, noiseSuppression:false, autoGainControl:false}};

  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    // Fallback a la API antigua (algunos WebViews)
    var legacy=navigator.getUserMedia||navigator.webkitGetUserMedia||navigator.mozGetUserMedia;
    if(legacy){
      legacy.call(navigator,micConstraints, function(st){ onStream(st); }, function(err){ onError(err); });
      return;
    }
    state.micError="Este navegador no expone el micrófono (mediaDevices no existe). Abre el archivo en Safari, no dentro de otra app.";
    render(); if(cb)cb(false); return;
  }

  navigator.mediaDevices.getUserMedia(micConstraints)
    .then(onStream).catch(onError);

  function onStream(stream){
    try{
      state.stream=stream;
      if(ctx.state==="suspended"){ ctx.resume(); }
      var srcNode=ctx.createMediaStreamSource(stream);
      var analyser=ctx.createAnalyser(); analyser.fftSize=2048;
      srcNode.connect(analyser);
      // iOS keep-alive: una salida activa con ganancia 0 (inaudible, sin feedback) evita que iOS
      // suspenda el contexto cuando cambia la sesión de audio (p.ej. al arrancar la grabación).
      try{ var _ka=ctx.createGain(); _ka.gain.value=0; srcNode.connect(_ka); _ka.connect(ctx.destination); }catch(e){}
      state.analyser=analyser; state.srcNode=srcNode; state.micOn=true;
      var buf=new Float32Array(analyser.fftSize);
      var byteBuf=new Uint8Array(analyser.fftSize);
      var hasFloat=typeof analyser.getFloatTimeDomainData==="function";
      function loop(ts){
        state.raf=requestAnimationFrame(loop);
        if(ts-state.lastTs<70) return;
        state.lastTs=ts;
        if(hasFloat) analyser.getFloatTimeDomainData(buf);
        else { analyser.getByteTimeDomainData(byteBuf); for(var i=0;i<byteBuf.length;i++) buf[i]=(byteBuf[i]-128)/128; }
        var res=autoCorrelate(buf, ctx.sampleRate);
        var dbfs = res.rms>1e-7 ? 20*Math.log10(res.rms) : -120;
        var dbRaw = clamp(dbfs+state.settings.calib, 30, 115);
        state.smoothDb = state.smoothDb>0 ? state.smoothDb*0.55+dbRaw*0.45 : dbRaw;
        var db=Math.round(state.smoothDb);
        // Piso de ruido global (baja rápido, sube muy lento y solo con el cuarto "quieto"):
        // referencia para detectar VOZ de forma RELATIVA — el nivel crudo del micrófono varía
        // por dispositivo, así que los umbrales absolutos fallan (y el zumbido de 60 Hz engaña).
        if(!state.floorRms) state.floorRms=Math.max(res.rms,0.0005);
        if(res.rms<state.floorRms) state.floorRms=state.floorRms*0.7+res.rms*0.3;   // baja rápido
        else state.floorRms=Math.min(state.floorRms*1.004, res.rms, 0.02);          // sube lento, también ante ruido constante (ventilador)
        var voiceGate=Math.max(0.003, state.floorRms*2.5);
        var isVoiced=res.freq>0 && res.rms>=voiceGate;
        var midi=null, mf=null, cents=0, f=0;
        if(isVoiced){
          var fr=res.freq;
          // Corrección de octava: si la detección saltó a ~2× o ~½ del tono actual, ajústala
          // (evita que un armónico envenene el suavizado y la nota).
          if(state.smoothF>0){
            if(Math.abs(fr-2*state.smoothF) < 0.15*state.smoothF) fr=fr/2;
            else if(Math.abs(fr-0.5*state.smoothF) < 0.15*state.smoothF) fr=fr*2;
          }
          state.smoothF = state.smoothF>0 ? state.smoothF*0.6+fr*0.4 : fr;
          f=state.smoothF; mf=freqToMidi(f);
          var rawMidi=Math.round(freqToMidi(fr));    // nota de esta trama, desde la freq cruda corregida
          state.noteBuf.push(rawMidi); if(state.noteBuf.length>6) state.noteBuf.shift();
          midi=modeMidi(state.noteBuf);              // nota estable = la más frecuente reciente
          cents=Math.round((mf-midi)*100);
          state.voidFrames=0;
        } else {
          // Tolera microcortes: conserva la nota unas cuantas tramas antes de soltarla (evita parpadeo).
          state.voidFrames++;
          if(state.voidFrames<4 && state.smoothF>0){
            f=state.smoothF; mf=freqToMidi(f); midi=modeMidi(state.noteBuf);
          } else { state.smoothF=0; state.noteBuf.length=0; }
        }
        var s={db:db, freq:f?Math.round(f):0, midi:midi, mf:mf, cents:cents, voiced:isVoiced};
        state.reading=s;
        state.history.push({db:db, mf:mf});
        if(state.history.length>110) state.history.shift();
        if(state.running && !state.paused){
          // Mientras se espera la voz, mide el ruido ambiente del cuarto (piso de referencia).
          if(state.waitingVoice){
            state.noiseFloorRms = state.noiseFloorRms>0 ? state.noiseFloorRms*0.9+res.rms*0.1 : res.rms;
          }
          // El reloj arranca con la primera voz (la inhalación previa no cuenta).
          // Umbral relativo al ambiente: en un cuarto ruidoso no arranca solo.
          if(state.waitingVoice && (s.voiced || res.rms>=Math.max(voiceGate, state.noiseFloorRms*3))){
            state.waitingVoice=false; startRepTimer(); updateTimer();
          }
          if(db>=55) state.repSamples.db.push(db);
          if(s.voiced && s.freq>0){
            state.repSamples.hz.push(s.freq);
            var ez=state.zoneNow||EXERCISES[state.exIdx].zone;
            if(ez){ state.repSamples.ztot++; if(inZone(s.mf,ez)) state.repSamples.zin++; }
          }
          // Fin por silencio tras oír la voz: cierra la repetición y avanza solo.
          // Frases: 2 s. Sostenidos: 3.5 s (ventana amplia + detección relativa, para que una
          // voz débil que baja no se confunda con "callar").
          // "Silencio" con umbral ADAPTATIVO: por debajo de 2× el ruido ambiente del cuarto y del
          // 18% del pico de la voz (un umbral fijo falla: el ambiente real nunca es silencio digital).
          var _exT=EXERCISES[state.exIdx].type;
          var _endSil=(_exT==="phrases")?PHRASE_END_SILENCE_MS:(_exT==="sustain")?SUSTAIN_END_SILENCE_MS:0;
          if(_endSil && !state.waitingVoice){
            if(res.rms>state.phrasePeakRms) state.phrasePeakRms=res.rms;
            var gate=Math.max(0.004, state.noiseFloorRms*2, state.phrasePeakRms*0.18);
            var makingSound = s.voiced || res.rms>=gate;
            if(makingSound){
              state.lastSoundTs=ts;
              if(++state.soundFrames>=3) state.heardSound=true;   // ~200 ms de voz real: ignora clics sueltos
            } else {
              state.soundFrames=0;
              if(state.heardSound && (ts-state.lastSoundTs)>=_endSil){ repDone(); }
            }
          }
        }
        // LECTURA: mientras se oye la voz, desvanece lo ya leído (al ritmo del texto en 5 min de voz).
        if(state.readRunning && EXERCISES[state.exIdx].type==="reading" && _readWords.total>0){
          if(s.voiced || res.rms>=voiceGate) state.readSoundTs=ts;
          if(state.readSoundTs && (ts-state.readSoundTs)<450){   // tolera pausas cortas entre palabras
            state.readProgress=Math.min(_readWords.total, (state.readProgress||0) + _readWords.rate*((ts-(state.readAdvTs||ts))/1000));
            var _upto=Math.floor(state.readProgress);
            while(_readWords.faded<_upto){ _readWords.els[_readWords.faded].style.opacity=READ_FADE_OPACITY; _readWords.faded++; }
          }
          state.readAdvTs=ts;
        }
        updateLive();
      }
      state.raf=requestAnimationFrame(loop);
      // Vigilante iOS (cada 1s): si iOS suspende/interrumpe el contexto (p.ej. al arrancar la
      // grabación) lo reanuda, y si el bucle de análisis muere lo vuelve a arrancar.
      if(state.micWatch) clearInterval(state.micWatch);
      state.micWatch=setInterval(function(){
        if(!state.micOn){ clearInterval(state.micWatch); state.micWatch=null; return; }
        try{ if(state.audioCtx && state.audioCtx.state!=="running") state.audioCtx.resume(); }catch(e){}
        if(performance.now()-state.lastTs>2000){   // el bucle no corre hace >2s: re-armarlo
          try{ if(state.raf) cancelAnimationFrame(state.raf); }catch(e){}
          state.raf=requestAnimationFrame(loop);
        }
        // Diagnóstico visible en la lectura aunque el bucle esté muerto
        if(_readDbNode && state.readRunning && performance.now()-state.lastTs>2000){
          _readDbNode.textContent=tt("⚠️ análisis de voz detenido — audio: ","⚠️ voice analysis stopped — audio: ")+(state.audioCtx?state.audioCtx.state:"—");
          _readDbNode.style.color="#e65100";
        }
      }, 1000);
      render(); if(cb)cb(true);
    }catch(e){
      state.micError=tt("Micrófono conectado pero falló el procesamiento de audio: ","Microphone connected but audio processing failed: ")+(e.message||e)+".";
      state.micOn=false; render(); if(cb)cb(false);
    }
  }

  function onError(err){
    var name=(err&&err.name)||"Error";
    var msg;
    if(name==="NotAllowedError"||name==="SecurityError")
      msg="Permiso denegado. Toca 🎤 otra vez y elige Permitir. Si no aparece: Ajustes → Safari → Micrófono → Permitir, y recarga.";
    else if(name==="NotFoundError"||name==="OverconstrainedError")
      msg="No se encontró micrófono disponible en el dispositivo.";
    else if(name==="NotReadableError")
      msg="El micrófono está siendo usado por otra app. Ciérrala e intenta de nuevo.";
    else
      msg=tt("No se pudo acceder al micrófono (","Could not access the microphone (")+name+tt("). Abre el archivo en Safari, no dentro de otra app.","). Open the app in Safari, not inside another app.");
    state.micError=msg;
    state.micOn=false; render(); if(cb)cb(false);
  }
}
function stopMic(){
  if(state.raf) cancelAnimationFrame(state.raf);
  if(state.micWatch){ clearInterval(state.micWatch); state.micWatch=null; }
  if(state.stream){ state.stream.getTracks().forEach(function(t){ t.stop(); }); state.stream=null; }
  state.srcNode=null;
  state.smoothF=0; state.smoothDb=0; state.micOn=false; state.reading=null;
  state.noteBuf.length=0; state.voidFrames=0;
  render();
}

/* ─────────── Wake Lock: pantalla encendida durante los ejercicios ─────────── */
var _wlPending=false;
function syncWakeLock(){
  var want = state.screen==="ex" || (state.screen==="tuner" && state.micOn);
  if(want && !state.wakeLock && !_wlPending && "wakeLock" in navigator){
    _wlPending=true;
    navigator.wakeLock.request("screen").then(function(wl){
      _wlPending=false;
      if(!(state.screen==="ex" || (state.screen==="tuner" && state.micOn))){ try{ wl.release(); }catch(e){} return; }
      state.wakeLock=wl;
      wl.addEventListener("release", function(){ if(state.wakeLock===wl) state.wakeLock=null; });
    }).catch(function(){ _wlPending=false; });
  } else if(!want && state.wakeLock){
    try{ state.wakeLock.release(); }catch(e){}
    state.wakeLock=null;
  }
}

  if(document.visibilityState==="visible") syncWakeLock();

/* ─────────── Zonas ─────────── */
function dbZone(db, targetDb){
  if(db==null || db<52) return {key:"silent",label:"· · · VOCALIZA",color:"#93a0c8",msg:""};
  if(db<targetDb) return {key:"low",label:"⬇ BAJO",color:"#e65100",msg:"¡MÁS FUERTE!"};
  if(db<=90) return {key:"ok",label:"✓ EN RANGO",color:"#2e7d32",msg:"¡MANTÉN ASÍ!"};   // zona verde: meta a 90 dB
  return {key:"high",label:"⬆ MUY FUERTE",color:"#6a1b9a",msg:"potente — sin tensar"};
}
function pitchStatus(mf, z){
  if(mf==null||!z) return null;
  if(z.mode==="above") return mf>=z.min?{ok:true,txt:"✓ agudo"}:{ok:false,txt:"⬆ sube más"};
  if(z.mode==="below") return mf<=z.max?{ok:true,txt:"✓ grave"}:{ok:false,txt:"⬇ baja más"};
  if(mf<z.min) return {ok:false,txt:"⬇ muy grave"};
  if(mf>z.max) return {ok:false,txt:"⬆ muy agudo"};
  return {ok:true,txt:"✓ normal"};
}
function inZone(mf, z){
  if(mf==null||!z) return false;
  if(z.mode==="above") return mf>=z.min;
  if(z.mode==="below") return mf<=z.max;
  return mf>=z.min && mf<=z.max;
}

// Puntajes de un ejercicio a partir de sus stats
function exerciseScores(ex, stats){
  var sc={intensidad:null,tono:null,esfuerzo:null,overall:null};
  if(stats.pctDb!=null) sc.intensidad=clamp(stats.pctDb,0,100);
  if(ex.zone && stats.tonePct!=null) sc.tono=clamp(stats.tonePct,0,100);
  var tg=exTarget(ex);
  if(ex.type==="sustain" && tg && stats.avg!=null) sc.esfuerzo=clamp(Math.round(stats.avg/tg*100),0,100);
  else if(stats.pctDb!=null) sc.esfuerzo=clamp(stats.pctDb,0,100); // frases: decir todas en voz alta
  var parts=[sc.intensidad,sc.tono,sc.esfuerzo].filter(function(v){return v!=null;});
  sc.overall=parts.length?Math.round(parts.reduce(function(a,b){return a+b;},0)/parts.length):null;
  return sc;
}
// Agrega los puntajes de una sesión (objeto exercises)
function aggScores(exs){
  var d={intensidad:[],tono:[],esfuerzo:[],overall:[]};
  for(var k in exs){ var s=exs[k]&&exs[k].scores; if(s){
    ["intensidad","tono","esfuerzo","overall"].forEach(function(dim){ if(s[dim]!=null) d[dim].push(s[dim]); });
  }}
  function avg(a){ return a.length?Math.round(a.reduce(function(x,y){return x+y;},0)/a.length):null; }
  return {intensidad:avg(d.intensidad),tono:avg(d.tono),esfuerzo:avg(d.esfuerzo),overall:avg(d.overall)};
}

function el(tag, attrs, children){
  var e=document.createElement(tag);
  if(attrs){ for(var k in attrs){
    if(k==="style") e.style.cssText=attrs[k];
    else if(k==="class") e.className=attrs[k];
    else if(k==="html") e.innerHTML=trs(attrs[k]);
    else e.setAttribute(k, attrs[k]);

  if(children!=null){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c==null||c===false) return;
      e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(trs(String(c))):c);

}

/* ─────────── Cronómetro ─────────── */
// Fin por silencio tras oír la voz: 3.5 s (da lugar a pausas a media frase sin cortarla).
var PHRASE_END_SILENCE_MS=3500, SUSTAIN_END_SILENCE_MS=3500;
// "GO!": se despliega 1 s después de mostrar la repetición para indicar cuándo empezar.
var GO_DELAY_MS=1000;
function flashGo(){
  try{
    var g=el("div",{style:"position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;font-size:100px;font-weight:900;color:#2e7d32;background:rgba(238,241,250,0.72);letter-spacing:3px;pointer-events:none;animation:goPop 1.1s ease forwards;"},"GO!");
    document.body.appendChild(g);
    setTimeout(function(){ try{ g.remove(); }catch(e){} }, 1150);
  }catch(e){}
}
function tickStart(){
  // Pedir micrófono PRIMERO, aún dentro del gesto del toque (clave en iOS).
  if(!state.micOn){ startMic(function(ok){
    // Si el micrófono falla, el reloj arranca de inmediato (no hay voz que esperar).
    if(!ok && state.running && state.waitingVoice){ state.waitingVoice=false; startRepTimer(); updateTimer(); }
  }); }
  state.sec=0; state.running=true;
  state.repSamples={db:[],hz:[],zin:0,ztot:0}; state.history=[];
  state.heardSound=false; state.soundFrames=0; state.lastSoundTs=0;   // re-arma el fin por silencio (frases)
  state.noiseFloorRms=0; state.phrasePeakRms=0;                       // re-mide ambiente y pico de voz
  // Sostenidos y frases: el reloj arranca al oír la voz (la inhalación previa no cuenta).
  var _t=EXERCISES[state.exIdx].type;
  state.waitingVoice = (_t==="sustain"||_t==="phrases") && !state.micError;
  if(!state.waitingVoice){ startRepTimer(); }
  else {
    // "GO!": en FRASES va PRIMERO (apenas se muestra la frase); en tonos, al segundo.
    var _goDelay=(EXERCISES[state.exIdx].type==="phrases")?250:GO_DELAY_MS;
    setTimeout(function(){ if(state.running && state.waitingVoice){ flashGo(); } }, _goDelay);
    // Red de seguridad: si el micrófono no llega a conectar (p.ej. permiso colgado), arranca solo.
    setTimeout(function(){ if(state.running && state.waitingVoice && !state.micOn){ state.waitingVoice=false; startRepTimer(); updateTimer(); } }, 4000);
  }
  render();
}
// Cronómetro basado en la hora real: no deriva si iOS congela los intervalos en segundo plano.
function startRepTimer(){
  state.timerT0=Date.now()-state.sec*1000;
  if(state.timer) clearInterval(state.timer);
  state.timer=setInterval(function(){
    var s=Math.floor((Date.now()-state.timerT0)/1000);
    if(s!==state.sec){
      state.sec=s; updateTimer();
      // Sostenidos: al alcanzar la meta de tiempo, cierra la rep (el gap de 3s + avance lo hace repDone).
      if(state.running && !state.paused && EXERCISES[state.exIdx].type==="sustain"
         && state.targetNow!=null && state.sec>=state.targetNow){ repDone(); }
    }
  }, 250);
}
function repDone(){
  state.running=false;
  if(state.timer){ clearInterval(state.timer); state.timer=null; }
  var ex=EXERCISES[state.exIdx];
  state.repLog.push(state.sec);
  var db=state.repSamples.db, hz=state.repSamples.hz, audio=null;
  if(db.length){
    var onTarget=db.filter(function(d){return d>=state.settings.targetDb;}).length;
    audio={ avgDb:Math.round(db.reduce(function(a,b){return a+b;},0)/db.length),
      maxDb:Math.max.apply(null,db),
      pctOnTarget:Math.round(onTarget/db.length*100),
      tonePct:state.repSamples.ztot?Math.round(state.repSamples.zin/state.repSamples.ztot*100):null,
      minHz:hz.length?Math.min.apply(null,hz):0,
      maxHz:hz.length?Math.max.apply(null,hz):0,
      avgHz:hz.length?hz.reduce(function(a,b){return a+b;},0)/hz.length:0 };
  }
  state.dbLog.push(audio);
  // Frases: califica la frase (pasa con ≥70% del tiempo hablado por arriba de la meta)
  // y lleva el conteo de la ronda de 10 para la calificación 0–10.
  if(ex.type==="phrases"){
    state.lastPhrase = (audio && audio.pctOnTarget!=null) ? {pct:audio.pctOnTarget, ok:audio.pctOnTarget>=70} : null;
    if(state.lastPhrase){ state.cycleN++; if(state.lastPhrase.ok) state.cycleOk++; }
  }
  if(state.rep+1>=exTotal(ex)){
    var avg=Math.round(state.repLog.reduce(function(a,b){return a+b;},0)/state.repLog.length);
    var best=Math.max.apply(null,state.repLog);
    var stats={type:ex.type,name:ex.name,reps:state.repLog.length,avg:avg,best:best};
    var wa=state.dbLog.filter(Boolean);
    if(wa.length){
      stats.avgDb=Math.round(wa.reduce(function(a,r){return a+r.avgDb;},0)/wa.length);
      stats.maxDb=Math.max.apply(null,wa.map(function(r){return r.maxDb;}));
      var pcts=wa.map(function(r){return r.pctOnTarget;}).filter(function(v){return v!=null;});
      if(pcts.length) stats.pctDb=Math.round(pcts.reduce(function(a,b){return a+b;},0)/pcts.length);
      var mins=wa.map(function(r){return r.minHz;}).filter(function(v){return v>0;});
      var maxs=wa.map(function(r){return r.maxHz;}).filter(function(v){return v>0;});
      var avgs=wa.map(function(r){return r.avgHz;}).filter(function(v){return v>0;});
      var tps=wa.map(function(r){return r.tonePct;}).filter(function(v){return v!=null;});
      if(tps.length) stats.tonePct=Math.round(tps.reduce(function(a,b){return a+b;},0)/tps.length);
      if(ex.pitchRole==="max"&&maxs.length){ var h=Math.max.apply(null,maxs); stats.pitch={note:hzToNote(h),hz:Math.round(h)}; }
      else if(ex.pitchRole==="min"&&mins.length){ var h2=Math.min.apply(null,mins); stats.pitch={note:hzToNote(h2),hz:Math.round(h2)}; }
      else if(ex.pitchRole&&avgs.length){ var h3=avgs.reduce(function(a,b){return a+b;},0)/avgs.length; stats.pitch={note:hzToNote(h3),hz:Math.round(h3)}; }
    }
    stats.scores=exerciseScores(ex, stats);
    recordExercise(ex.id, stats);
    if(ex.type==="phrases"){ showCycleSummary(true); }   // calificación de la última ronda; TERMINAR cierra
    else finishEx(ex.id);
  } else if(ex.type==="phrases"){
    // ¿Terminó la ronda de 10 frases? → calificación 0–10 (y descanso); si no, SIGUIENTE FRASE
    // directa, sin pausa numerada (el respiro natural lo dan el silencio de cierre y el GO!).
    var perCycle=exPhrases(ex).length;            // 10
    if((state.rep+1)%perCycle===0){ showCycleSummary(false); }
    else { phraseNext(); }
  } else {
    // Sostenidos: SIGUIENTE repetición directa, sin pausa (el respiro lo dan el silencio
    // de cierre y el GO!). El registro de la rep queda en los puntos y las estadísticas.
    state.lastRepHitMeta = (state.targetNow!=null && state.sec>=state.targetNow);
    state.lastRep={sec:state.sec, db:audio?audio.maxDb:null, cue:SENSE_CUES[state.rep%SENSE_CUES.length]};
    phraseNext();
  }
}

/* ─────────── Auto-ajuste vertical: ninguna pantalla debe necesitar scroll ───────────
   El tamaño efectivo del viewport varía por dispositivo, zoom de página y tamaño de texto
   de iOS; si el contenido rebasa el alto visible, se encoge proporcionalmente hasta caber.
   Excepciones: LECTURA (texto largo, scrollea a propósito) e HISTORIAL (lista). */
function fitToViewport(){
  app.style.zoom="";
  if(state.screen==="history") return;
  if(state.screen==="ex" && EXERCISES[state.exIdx].type==="reading") return;
  // Iterativo: al encoger, el texto se reacomoda y el alto cambia un poco — refina hasta caber.
  // OJO: medir el alto VISUAL (documentElement), no app.scrollHeight (viene en unidades ya
  // escaladas por el propio zoom y haría encoger de más en cada pasada).
  for(var i=0;i<3;i++){
    var vh=window.innerHeight, sh=document.documentElement.scrollHeight;
    if(sh<=vh+1) break;
    var cur=parseFloat(app.style.zoom||"1");
    app.style.zoom=String(Math.max(0.55, cur*(vh/sh)*0.995));
  }
}
window.addEventListener("resize", function(){ fitToViewport(); });
window.addEventListener("orientationchange", function(){ setTimeout(fitToViewport, 250); });

/* ─────────── Render principal ─────────── */
function render(){
  try{ renderInner(); }
  catch(e){
    showErrBanner("render: "+(e.message||e));
    // Auto-recuperación: si la pantalla que falló no era el inicio, regresa al inicio.
    if(state.screen!=="home"){
      try{ state.screen="home"; state.running=false; renderInner(); return; }catch(e2){}
    }
    // Último recurso: botón para reiniciar la vista.
    try{
      app.innerHTML="";
      var b=el("button",{style:"margin:40vh auto 0;display:block;padding:16px 30px;border:none;border-radius:14px;background:#1a237e;color:#fff;font-size:16px;font-weight:800;"},tt("↻ REINICIAR PANTALLA","↻ RESTART SCREEN"));
      b.addEventListener("click",function(){ state.screen="home"; render(); });
      app.appendChild(b);
    }catch(e3){}
  }
}
// Vigilante de arranque: si la pantalla queda vacía (iOS a veces arranca la PWA en blanco), re-renderiza.
var _bootTries=0;
setInterval(function(){
  if(_bootTries>=5) return;
  if(!app.children.length){ _bootTries++; try{ render(); }catch(e){} }
}, 1200);
function renderInner(){
  syncWakeLock();
  app.innerHTML="";
  var s=state.screen;
  if(s==="home") app.appendChild(HomeScreen());
  else if(s==="tuner") app.appendChild(TunerScreen());
  else if(s==="history") app.appendChild(HistoryScreen());
  else if(s==="done") app.appendChild(DoneScreen());
  else if(s==="ex"){
    var ex=EXERCISES[state.exIdx];
    if(ex.type==="sustain") app.appendChild(SustainScreen());
    else if(ex.type==="phrases") app.appendChild(PhraseScreen());
    else if(ex.type==="reading") app.appendChild(ReadScreen());
    else if(ex.type==="conversation") app.appendChild(ConvScreen());
  }
  fitToViewport();
}

/* ─────────── Termómetro (SVG) ─────────── */
function thermometerSVG(db, targetDb, micOn, running){
  var MIN=40,MAX=105,W=70,H=200,TW=44,r=TW/2;
  var tx0=(W-TW)/2, tx1=tx0+TW, ty0=8, ty1=H-8;
  function pct(v){ return clamp((v-MIN)/(MAX-MIN),0,1); }
  function y(p){ return ty1-p*(ty1-ty0); }
  var zone=dbZone(db,targetDb);
  var fill = (db!=null&&db>=45)?pct(db):0;
  var svg='<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="opacity:'+(micOn?1:0.4)+';transition:opacity .3s;">';
  // tube bg
  svg+='<rect x="'+tx0+'" y="'+ty0+'" width="'+TW+'" height="'+(ty1-ty0)+'" rx="'+r+'" fill="#e8eaf6" stroke="rgba(26,35,126,0.2)" stroke-width="1.5"/>';
  // zone bands
  function bandRect(p0,p1,color,op){
    var yy=y(p1), hh=y(p0)-y(p1);
    return '<rect x="'+(tx0+2)+'" y="'+yy+'" width="'+(TW-4)+'" height="'+hh+'" fill="'+color+'" opacity="'+op+'"/>';
  }
  var t=pct(targetDb);
  // Zona de trabajo fija 60–95 dB: blanco debajo, verde la zona, rojo difuminado arriba.
  var z0=pct(60), z1=pct(95);
  svg+='<defs><linearGradient id="redFade" x1="0" y1="1" x2="0" y2="0">'
     +'<stop offset="0%" stop-color="#c62828" stop-opacity="0.10"/>'
     +'<stop offset="100%" stop-color="#c62828" stop-opacity="0.45"/></linearGradient></defs>';
  svg+='<clipPath id="tube"><rect x="'+(tx0+2)+'" y="'+(ty0+2)+'" width="'+(TW-4)+'" height="'+(ty1-ty0-4)+'" rx="'+(r-2)+'"/></clipPath>';
  svg+='<g clip-path="url(#tube)">';
  svg+=bandRect(0,z0,"#ffffff",1);
  svg+=bandRect(z0,z1,"#2e7d32",0.20);
  svg+=bandRect(z1,1,"url(#redFade)",1);
  // fill
  if(fill>0){
    svg+='<rect x="'+(tx0+2)+'" y="'+y(fill)+'" width="'+(TW-4)+'" height="'+(y(0)-y(fill))+'" fill="'+zone.color+'" opacity="0.85"/>';
    svg+='<rect x="'+(tx0+2)+'" y="'+(y(fill)-2)+'" width="'+(TW-4)+'" height="4" fill="'+zone.color+'"/>';
  }
  svg+='</g>';
  // meta dashed line
  svg+='<line x1="'+(tx0-6)+'" y1="'+y(t)+'" x2="'+(tx1+6)+'" y2="'+y(t)+'" stroke="#0a0a0a" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.85"/>';
  // ticks
  [60,80,95].forEach(function(gv){
    svg+='<text x="'+(tx1-2)+'" y="'+(y(pct(gv))+3)+'" font-size="8.5" font-weight="800" fill="rgba(26,35,126,0.55)" text-anchor="end">'+gv+'</text>';
  });
  svg+='</svg>';
  return svg;
}

/* ─────────── Gráfica en vivo (dB+tono) ─────────── */
function liveGraphSVG(history, targetDb, ex){
  var W=300,HDB=76,HP=36,CAP=110;
  function dbY(db){ return HDB-clamp((db-50)/(100-50),0,1)*HDB; }   // escala de la gráfica: 50–100 dB
  var pMin=33,pMax=78;
  function pY(mf){ return HP-clamp((mf-pMin)/(pMax-pMin),0,1)*HP; }
  function X(i){ return i/(CAP-1)*W; }
  var last=history.length?history[history.length-1]:null;
  var okTop=dbY(90), okBot=dbY(targetDb);   // zona verde: meta a 90 dB
  var svg='<svg width="100%" height="'+HDB+'" viewBox="0 0 '+W+' '+HDB+'" preserveAspectRatio="none" style="display:block;">';
  svg+='<rect x="0" y="'+okTop+'" width="'+W+'" height="'+Math.max(0,okBot-okTop)+'" fill="rgba(46,125,50,0.14)"/>';
  svg+='<line x1="0" x2="'+W+'" y1="'+okBot+'" y2="'+okBot+'" stroke="#e65100" stroke-width="1.5" stroke-dasharray="5 4"/>';
  [60,70,80,90].forEach(function(g){ svg+='<line x1="0" x2="'+W+'" y1="'+dbY(g)+'" y2="'+dbY(g)+'" stroke="rgba(26,35,126,0.07)"/><text x="3" y="'+(dbY(g)-2.5)+'" font-size="8" fill="#93a0c8" font-weight="700">'+g+'</text>'; });
  if(history.length>1){
    var pts=history.map(function(h,i){ return X(i).toFixed(1)+","+dbY(h.db).toFixed(1); }).join(" ");
    svg+='<polyline points="'+pts+'" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  }
  if(last){ var z=dbZone(last.db,targetDb); svg+='<circle cx="'+X(history.length-1)+'" cy="'+dbY(last.db)+'" r="4.5" fill="'+z.color+'"/>'; }
  svg+='</svg>';

  var box=el("div",{style:"background:#ffffff;border-radius:16px;border:1px solid rgba(26,35,126,0.12);padding:10px 10px 8px;width:100%;"});
  box.appendChild(el("div",{style:"display:flex;justify-content:space-between;font-size:9px;letter-spacing:1.5px;color:#5a6899;font-weight:700;padding:0 2px 4px;"},[el("span",null,"🔊 VOLUMEN (dB)"),el("span",{style:"color:#2e7d32;"},tt("■ rango ","■ range ")+targetDb+"–90")]));
  box.appendChild(el("div",{html:svg}));

  // Carril de tono: solo si el ejercicio tiene zona de tono (frases es solo volumen).
  var z2=state.zoneNow||ex.zone;
  if(z2){
    var bandTop,bandBot;
    if(z2.mode==="above"){ bandTop=pY(pMax); bandBot=pY(z2.min); }
    else if(z2.mode==="below"){ bandTop=pY(z2.max); bandBot=pY(pMin); }

var _readNode=null, _readDbNode=null;

var _readWords={els:[],total:0,rate:0,faded:0};
// Aplica el desvanecido según state.readProgress, en ambas direcciones (sirve para re-sincronizar).
function applyReadFade(){
  var upto=Math.min(Math.floor(state.readProgress||0), _readWords.total);
  for(var k=0;k<_readWords.total;k++){ _readWords.els[k].style.opacity = (k<upto) ? READ_FADE_OPACITY : "1"; }
  _readWords.faded=upto;
}
// Indicador en vivo de la lectura: dB y si la app está oyendo la voz (diagnóstico visible).
function updateReadDOM(){
  if(!_readDbNode) return;
  var r=state.reading;
  var speaking = state.readSoundTs && (performance.now()-state.readSoundTs)<450;
  _readDbNode.textContent = (r&&r.db>=45 ? r.db+" dB" : "— dB") + (speaking ? tt(" · 🎙️ te escucho"," · 🎙️ I hear you") : tt(" · 🤫 no oigo voz"," · 🤫 no voice heard"));
  _readDbNode.style.color = speaking ? "#2e7d32" : "#93a0c8";
}
var READ_FADE_OPACITY="0.18";
// Lectura del día: rota con la fecha del calendario (cada día toca un autor/texto distinto).
function nextReading(){
  var d=new Date();
  var doy=Math.floor((d-new Date(d.getFullYear(),0,0))/86400000);
  var RS=isEN()?READINGS_EN:READINGS;
  return RS[doy%RS.length];
}
function readStart(){
  if(state.readRunning || state.readSec<=0) return;
  releaseRec();
  function begin(){
    state.readRunning=true;
    state.readProgress=0; state.readSoundTs=0; state.readAdvTs=0;   // reinicia el desvanecido de lo leído
    // Conversación: durante la charla se miden dB (state.running activa la captura del bucle de audio)
    if(EXERCISES[state.exIdx].type==="conversation"){ state.running=true; state.repSamples={db:[],hz:[],zin:0,ztot:0}; }
    state.readEndAt=Date.now()+state.readSec*1000;
    if(state.readTimer) clearInterval(state.readTimer);
    state.readTimer=setInterval(function(){
      var s=Math.max(0, Math.ceil((state.readEndAt-Date.now())/1000));
      if(s!==state.readSec){ state.readSec=s; if(_readNode) _readNode.textContent=fmtTime(s); }
      if(s<=0){ stopReading(); }
    }, 250);
    render();
  }
  if(!state.micOn){ startMic(function(ok){ if(ok) startReadRecording(); begin(); }); }
  else { startReadRecording(); begin(); }
}
function stopReading(){
  if(state.readTimer){ clearInterval(state.readTimer); state.readTimer=null; }
  state.readRunning=false;
  // Conversación: cerrar la medición y calcular las estadísticas de la charla
  if(state.running && EXERCISES[state.exIdx].type==="conversation"){
    state.running=false;
    var d=state.repSamples.db;
    if(d.length){
      var on=d.filter(function(v){return v>=state.settings.targetDb;}).length;
      var st={type:"conversation", name:EXERCISES[state.exIdx].name,
        avgDb:Math.round(d.reduce(function(a,b){return a+b;},0)/d.length),
        maxDb:Math.max.apply(null,d),
        pctDb:Math.round(on/d.length*100)};
      st.scores=exerciseScores(EXERCISES[state.exIdx], st);
      state.convStats=st;
    }
  }
  if(state.recording && state.recorder){ try{ state.recorder.stop(); }catch(e){ state.recording=false; render(); } }
  else render();
}
function startReadRecording(){
  try{
    if(typeof MediaRecorder==="undefined"){ state.recUnsupported=true; return; }
    if(!state.stream) return;
    var opts={}, types=["audio/mp4","audio/webm;codecs=opus","audio/webm"];
    for(var i=0;i<types.length;i++){ if(MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(types[i])){ opts.mimeType=types[i]; break; } }
    state.recChunks=[];
    // iOS: grabar desde el grafo de audio, NO del stream crudo — si el grabador y el analizador
    // consumen el mismo stream, iOS silencia uno de los dos (y el seguimiento de voz muere).
    var recStream=state.stream;
    try{
      if(state.audioCtx && state.srcNode && state.audioCtx.createMediaStreamDestination){
        var dest=state.audioCtx.createMediaStreamDestination();
        state.srcNode.connect(dest);

    }catch(e){}
    state.recorder = opts.mimeType ? new MediaRecorder(recStream, opts) : new MediaRecorder(recStream);
    state.recMime = state.recorder.mimeType || opts.mimeType || "audio/webm";
    state.recorder.ondataavailable=function(e){ if(e.data && e.data.size>0) state.recChunks.push(e.data); };
    state.recorder.onstop=function(){

    state.recording=true; state.recStarted=true;

}
function releaseRec(){

// Teclas blancas/negras clásicas. La nota activa se resalta en gris (sin color).
var PIANO_W_BASE="#FFFFFF", PIANO_W_ACT="#b9f6ca", PIANO_B_BASE="#111418", PIANO_B_ACT="#69f0ae";   // tecla activa: verde claro
function buildPiano(activeMidi, whiteH){
  whiteH=whiteH||138; var blackH=Math.round(whiteH*0.62);
  var keys={};
  var scroller=el("div",{style:"overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 4px;"});
  var kb=el("div",{style:"display:flex;position:relative;width:max-content;margin:0 auto;"});
  var WHITE_W=34, BLACK_W=21;
  var blackSet={1:1,3:1,6:1,8:1,10:1};
  for(var m=36;m<=76;m++){
    if(blackSet[m%12]) continue;
    var isActive=activeMidi===m;
    var isDO=(m%12===0);
    var container=el("div",{style:"position:relative;"});
    (function(mm){
      var whiteSpan=el("span",{style:"font-size:8.5px;font-weight:800;color:"+(isActive?"#1b5e20":isDO?"#333":"#8a92a3")+";"}, (isDO||isActive)?midiName(mm):"");
      var white=btn(whiteSpan,
        "width:"+WHITE_W+"px;height:"+whiteH+"px;background:"+(isActive?PIANO_W_ACT:PIANO_W_BASE)+";border:1px solid #333;border-radius:0 0 6px 6px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;", function(){ playTone(mm); });
      container.appendChild(white);
      keys[mm]={btn:white,span:whiteSpan,isDO:isDO,black:false};
      var nb=mm+1;
      if(blackSet[nb%12]){
        var blackActive=activeMidi===nb;
        var black=btn("", "position:absolute;top:0;right:-"+(BLACK_W/2)+"px;width:"+BLACK_W+"px;height:"+blackH+"px;z-index:2;background:"+(blackActive?PIANO_B_ACT:PIANO_B_BASE)+";border:1px solid #000;border-radius:0 0 5px 5px;", function(e){ e.stopPropagation(); playTone(nb); });
        container.appendChild(black);
        keys[nb]={btn:black,black:true};
      }
    })(m);
    kb.appendChild(container);
  }
  scroller.appendChild(kb);
  return {node:scroller, keys:keys};
}
// Desplaza el piano horizontalmente para dejar la tecla detectada más o menos al centro.
function centerPianoKey(scroller, keyBtn){
  if(!scroller || !keyBtn) return;
  try{
    var kr=keyBtn.getBoundingClientRect(), sr=scroller.getBoundingClientRect();
    if(!sr.width) return;                       // aún no está en el layout
    var target=scroller.scrollLeft + (kr.left+kr.width/2) - (sr.left+sr.width/2);
    target=Math.max(0, Math.min(target, scroller.scrollWidth-scroller.clientWidth));
    if(scroller.scrollTo){ scroller.scrollTo({left:target, behavior:"smooth"}); }
    else { scroller.scrollLeft=target; }
  }catch(e){}
}

/* ─────────── Medidor / Piano ─────────── */
function TunerScreen(){
  var wrap=el("div",{style:"display:flex;flex-direction:column;flex:1;"});
  var header=el("div",{style:"display:flex;align-items:center;gap:10px;padding:48px 20px 12px;"});
  header.appendChild(btn("‹",BACK_BTN,goHome));
  header.appendChild(el("div",{style:"flex:1;"},[el("div",{style:"font-size:10px;letter-spacing:3px;color:#6a1b9a;text-transform:uppercase;margin-bottom:2px;"},"MEDIDOR DE VOZ"),el("div",{style:"font-size:21px;font-weight:900;color:#0a0a0a;"},"🎹 dB + Tono")]));
  header.appendChild(btn("⚙️",BACK_BTN+"font-size:16px;padding:9px 12px;", function(){ state._cfg=!state._cfg; render(); }));
  header.appendChild(btn(state.micOn?"⏹":"🎤","background:"+(state.micOn?"rgba(198,40,40,0.15)":"rgba(106,27,154,0.15)")+";border:1.5px solid "+(state.micOn?"#c62828":"#6a1b9a")+";border-radius:12px;padding:9px 13px;color:"+(state.micOn?"#c62828":"#6a1b9a")+";font-size:13px;font-weight:800;flex-shrink:0;", function(){ if(state.micOn) stopMic(); else startMic(function(){}); }));
  wrap.appendChild(header);

  if(state.micError){
    wrap.appendChild(el("div",{style:"margin:0 16px 10px;background:rgba(230,81,0,0.08);border:1px solid rgba(230,81,0,0.3);border-radius:12px;padding:11px 14px;font-size:12px;color:#e65100;line-height:1.55;",html:"⚠️ "+state.micError}));
  }

  if(state._cfg){
    var cfg=el("div",{style:"margin:0 16px 12px;background:#ffffff;border-radius:14px;border:1px solid rgba(26,35,126,0.1);padding:13px 15px;display:flex;flex-direction:column;gap:12px;"});
    cfg.appendChild(cfgRow("🎯 Meta de volumen", state.settings.targetDb+" dB", function(){ state.settings.targetDb=clamp(state.settings.targetDb-5,60,100); saveSettings(state.settings); render(); }, function(){ state.settings.targetDb=clamp(state.settings.targetDb+5,60,100); saveSettings(state.settings); render(); }));
    cfg.appendChild(cfgRow("⚖️ Calibración dB", "+"+state.settings.calib, function(){ state.settings.calib=clamp(state.settings.calib-2,70,140); saveSettings(state.settings); render(); }, function(){ state.settings.calib=clamp(state.settings.calib+2,70,140); saveSettings(state.settings); render(); }));
    cfg.appendChild(el("div",{style:"font-size:10.5px;color:#93a0c8;line-height:1.6;"},"Los dB son estimados (el micrófono del teléfono no está calibrado). Para igualar la app de tu doctora: vocaliza tu voz normal y sube o baja la calibración hasta que marque lo mismo. El rango objetivo es tu meta a meta+15 dB. Mantén siempre la misma distancia (~30 cm)."));
    wrap.appendChild(cfg);
  }

  var r=state.reading, td=state.settings.targetDb;
  var zone=dbZone(r?r.db:null, td);
  var activeMidi=(r&&r.midi!=null)?r.midi:null;

  // display cards
  var volCard=el("div",{style:"flex:1.1;background:#ffffff;border-radius:18px;padding:16px 10px;border:1.5px solid "+(zone.key!=="silent"?zone.color+"70":"rgba(26,35,126,0.09)")+";text-align:center;"});
  var volNum=el("div",{style:"font-size:54px;font-weight:900;line-height:1;letter-spacing:-2px;color:"+(zone.key!=="silent"?zone.color:"#c7cee6")+";"}, (r&&r.db>=45)?String(r.db):"——");
  var volLabel=el("div",{style:"font-size:11px;font-weight:800;margin-top:4px;color:"+(zone.key!=="silent"?zone.color:"#5a6899")+";"}, zone.key!=="silent"?zone.label:"dB est.");
  volCard.appendChild(el("div",{style:"font-size:9.5px;letter-spacing:2px;color:#5a6899;margin-bottom:4px;"},"VOLUMEN"));
  volCard.appendChild(volNum); volCard.appendChild(volLabel);

  var noteCard=el("div",{style:"flex:1;background:#ffffff;border-radius:18px;padding:16px 10px;border:1.5px solid rgba(106,27,154,0.25);text-align:center;"});
  var noteNum=el("div",{style:"font-size:40px;font-weight:900;line-height:1.3;letter-spacing:-1px;color:"+(activeMidi!=null?"#6a1b9a":"#c7cee6")+";"}, activeMidi!=null?midiName(activeMidi):"——");
  var noteFreq=el("div",{style:"font-size:11px;color:#5a6899;font-weight:700;margin-top:3px;"}, (r&&r.freq)?(r.freq+" Hz"):"· · ·");
  noteCard.appendChild(el("div",{style:"font-size:9.5px;letter-spacing:2px;color:#5a6899;margin-bottom:4px;"},"NOTA"));
  noteCard.appendChild(noteNum); noteCard.appendChild(noteFreq);

  var cards=el("div",{style:"display:flex;gap:10px;padding:4px 16px 0;align-items:stretch;"});
  cards.appendChild(volCard); cards.appendChild(noteCard);
  wrap.appendChild(cards);

  // dB bar
  var dbPct=r?clamp((r.db-40)/(105-40),0,1)*100:0;
  var tPct=clamp((td-40)/(105-40),0,1)*100;
  var barWrap=el("div",{style:"padding:12px 20px 0;"});
  var bar=el("div",{style:"position:relative;height:14px;background:#dde3f3;border-radius:99px;"});
  var barFill=el("div",{style:"position:absolute;left:0;top:0;bottom:0;width:"+dbPct+"%;border-radius:99px;background:"+((zone.key==="ok"||zone.key==="high")?"linear-gradient(90deg,#0d47a1,#2e7d32)":"linear-gradient(90deg,#0d47a1,#6a1b9a)")+";"});
  bar.appendChild(barFill);
  bar.appendChild(el("div",{style:"position:absolute;left:"+tPct+"%;top:-4px;bottom:-4px;width:3px;background:#e65100;border-radius:2px;transform:translateX(-50%);"}));
  barWrap.appendChild(bar);
  wrap.appendChild(barWrap);

  // piano
  var pianoWrap=el("div",{style:"flex:1;display:flex;flex-direction:column;justify-content:center;"});
  var piano=buildPiano(activeMidi, 138);
  var pianoKeys=piano.keys;
  pianoWrap.appendChild(piano.node);
  if(activeMidi!=null) requestAnimationFrame(function(){ if(piano.keys[activeMidi]) centerPianoKey(piano.node, piano.keys[activeMidi].btn); });

  _tunerNodes={volCard:volCard,volNum:volNum,volLabel:volLabel,noteNum:noteNum,noteFreq:noteFreq,barFill:barFill,keys:pianoKeys,scroller:piano.node,activeMidi:activeMidi};

  var guide=el("div",{style:"display:flex;gap:8px;justify-content:center;padding:10px 16px 0;flex-wrap:wrap;"});
  [["🔉 Grave","DO2 – SOL2","#2e7d32"],["🗣️ Habla","LA2 – MI3","#0d47a1"],["📢 Agudo","SOL3 +","#6a1b9a"]].forEach(function(g){
    guide.appendChild(el("div",{style:"background:"+g[2]+"10;border:1px solid "+g[2]+"30;border-radius:10px;padding:6px 12px;font-size:11px;color:"+g[2]+";font-weight:700;",html:g[0]+" <span style='color:#5a6899;font-weight:500;'>"+g[1]+"</span>"}));
  });
  pianoWrap.appendChild(guide);
  pianoWrap.appendChild(el("div",{style:"font-size:11.5px;color:#93a0c8;text-align:center;padding:10px 28px 38px;line-height:1.7;",html:"💡 <b style='color:#5a6899;'>Toca una tecla</b> para escuchar el tono · <b style='color:#5a6899;'>🎤</b> para medir tu voz · 📏 ~30 cm"}));
  wrap.appendChild(pianoWrap);
  return wrap;
}
// Actualización ligera del Medidor durante mic (sin re-render completo)
var _tunerNodes={};
function updateTunerDOM(){
  if(!_tunerNodes.volNum) return;
  var r=state.reading, td=state.settings.targetDb;
  var zone=dbZone(r?r.db:null, td);
  var activeMidi=(r&&r.midi!=null)?r.midi:null;
  // tarjeta volumen
  _tunerNodes.volCard.style.borderColor=(zone.key!=="silent"?zone.color+"70":"rgba(26,35,126,0.09)");
  _tunerNodes.volNum.textContent=(r&&r.db>=45)?String(r.db):"——";
  _tunerNodes.volNum.style.color=(zone.key!=="silent"?zone.color:"#c7cee6");
  _tunerNodes.volLabel.textContent=zone.key!=="silent"?zone.label:"dB est.";
  _tunerNodes.volLabel.style.color=(zone.key!=="silent"?zone.color:"#5a6899");
  // tarjeta nota
  _tunerNodes.noteNum.textContent=activeMidi!=null?midiName(activeMidi):"——";
  _tunerNodes.noteNum.style.color=(activeMidi!=null?"#6a1b9a":"#c7cee6");
  _tunerNodes.noteFreq.textContent=(r&&r.freq)?(r.freq+" Hz"):"· · ·";
  // barra dB
  var dbPct=r?clamp((r.db-40)/(105-40),0,1)*100:0;
  _tunerNodes.barFill.style.width=dbPct+"%";
  _tunerNodes.barFill.style.background=(zone.key==="ok"||zone.key==="high")?"linear-gradient(90deg,#0d47a1,#2e7d32)":"linear-gradient(90deg,#0d47a1,#6a1b9a)";
  // piano: resaltar tecla activa
  if(_tunerNodes.activeMidi!==activeMidi){
    var prev=_tunerNodes.activeMidi, keys=_tunerNodes.keys;
    if(prev!=null && keys[prev]){ setKeyActive(keys[prev],prev,false); }
    if(activeMidi!=null && keys[activeMidi]){ setKeyActive(keys[activeMidi],activeMidi,true); }
    _tunerNodes.activeMidi=activeMidi;
    if(activeMidi!=null && keys[activeMidi]) centerPianoKey(_tunerNodes.scroller, keys[activeMidi].btn);   // nota al centro
  }
}
function setKeyActive(k,midi,on){
  if(k.black){
    k.btn.style.background=on?PIANO_B_ACT:PIANO_B_BASE;
  } else {
    k.btn.style.background=on?PIANO_W_ACT:PIANO_W_BASE;
    k.span.textContent=(k.isDO||on)?midiName(midi):"";
    k.span.style.color=on?"#1b5e20":k.isDO?"#333":"#8a92a3";
  }
}
function cfgRow(label, value, onDec, onInc){
  var b="width:34px;height:34px;border-radius:9px;border:1px solid rgba(26,35,126,0.15);background:rgba(26,35,126,0.07);color:#0a0a0a;font-size:18px;font-weight:800;";
  return el("div",{style:"display:flex;align-items:center;gap:10px;"},[
    el("div",{style:"flex:1;font-size:13px;color:#5a6899;font-weight:600;"},label),
    btn("−",b,onDec),
    el("div",{style:"min-width:62px;text-align:center;font-size:15px;font-weight:900;color:#0a0a0a;"},value),
    btn("+",b,onInc)
  ]);
}

/* ─────────── Arranque ─────────── */
// Detección de contexto: iOS solo da micrófono en https o file:// (contexto seguro).
state.secureOk = (typeof window.isSecureContext === "undefined") ? true : (window.isSecureContext || location.protocol === "file:");
if(!state.secureOk){
  state.micError="Esta página no está en un contexto seguro (https o archivo local). El micrófono estará bloqueado. Abre el archivo directamente en Safari (file://) o sírvelo por https.";
}

// Restaurar la sesión de hoy: si la app se recarga a mitad de sesión, los
// ejercicios ya guardados vuelven a aparecer como completados en el inicio.
(function(){
  if(!state.log.length) return;
  var s=state.log[state.log.length-1];
  if(localDay(s.date)!==localDay(new Date().toISOString())) return;
  if(s.id<=(state.settings.resetAt||0)) return;   // el usuario reinició la sesión de hoy
  state.sessionId=s.id;
  for(var k in (s.exercises||{})) state.done[k]=true;
})();

render();

// Service Worker: guarda la app para uso offline.
// En desarrollo (localhost) NO se registra, para ver siempre la última versión.
var _isDev = (location.hostname==="localhost" || location.hostname==="127.0.0.1");
if("serviceWorker" in navigator && !_isDev){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
