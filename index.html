/* ─────────── Lecturas rotativas (superación / resiliencia / adaptabilidad) ───────────
   Cada texto tiene ~600 palabras: leído en voz alta con calma dura ~5 minutos. */
var READINGS=[
  {titulo:"Resiliencia y adaptación", texto:"La resiliencia no es la ausencia de dificultades, sino la fuerza para crecer a través de ellas. Como el bambú que se dobla con el viento sin quebrarse, quien se adapta encuentra firmeza donde otros solo ven obstáculos. Adaptarse al cambio no es rendirse ante él, sino aprender su lenguaje. El río no lucha contra la roca: la rodea con paciencia, la pule y sigue su camino hacia el mar. Así, una mente flexible convierte cada revés en una lección y cada caída en un nuevo punto de partida.\n\nPiensa en el árbol que crece en la ladera de la montaña. El viento lo golpea todos los días, y sin embargo sus raíces se hacen más profundas precisamente por ese viento. Las tormentas no lo destruyen: lo obligan a sostenerse mejor. Con las personas ocurre lo mismo. Cada dificultad que enfrentamos con calma y decisión fortalece algo dentro de nosotros que ninguna comodidad podría fortalecer. Nadie elige las tormentas, pero todos podemos elegir echar raíces más hondas.\n\nLas personas resilientes no nacen así: se hacen, día tras día, con actos pequeños. Se hacen cuando deciden levantarse diez minutos antes para cuidar su salud. Se hacen cuando repiten un ejercicio aunque el progreso parezca lento. Se hacen cuando piden ayuda sin vergüenza, porque saben que apoyarse en otros también es una forma de fuerza. La resiliencia se construye igual que un muro firme: colocando una piedra cada día, sin prisa, pero sin pausa.\n\nAdaptarse también es un acto de valentía. Cuesta soltar la manera antigua de hacer las cosas, cuesta aceptar que el cuerpo o las circunstancias cambiaron. Pero quien se adapta no pierde: transforma. El marinero no puede controlar el viento, aunque sí puede ajustar las velas. Ajustar las velas no es rendirse; es seguir navegando hacia el mismo destino por un camino nuevo. Cada persona que aprende una nueva forma de hacer lo de siempre está demostrando una inteligencia que solo da la vida vivida.\n\nLa vida de cada persona guarda capítulos difíciles que en su momento parecieron imposibles de superar. Y sin embargo, aquí estamos: los superamos, aprendimos, seguimos adelante. Ese es el mejor recordatorio cuando llega una dificultad nueva. Ya lo hicimos antes. Ya nos levantamos antes. La memoria de nuestras propias victorias es un tesoro que nadie nos puede quitar, y volver a ella nos da fuerzas cuando el ánimo flaquea.\n\nLa serenidad también se entrena, y su puerta de entrada es la respiración. Cuando el aire entra lento y profundo, el cuerpo entero recibe el mensaje de que no hay peligro: los músculos se sueltan, la mente se ordena y la voz encuentra apoyo firme. Antes de cada tarea difícil, tres respiraciones hondas obran pequeños milagros. No es casualidad que todas las tradiciones del mundo, desde los monjes hasta los deportistas de élite, comiencen igual: respirando con calma. Quien domina su respiración lleva consigo un refugio portátil, disponible en cualquier lugar y a cualquier hora, gratuito y silencioso. Y desde ese refugio todo se enfrenta mejor: las noticias inesperadas, los días torcidos y también, por supuesto, cada ejercicio de voz que pide aire generoso y ánimo tranquilo.\n\nHoy, al leer estas palabras en voz alta y fuerte, estás practicando exactamente eso: resiliencia. Cada frase dicha con energía es una pequeña victoria sobre la comodidad del silencio. No importa si ayer costó más o si mañana costará un poco: lo que importa es que hoy tu voz suena, clara y fuerte, y que cada día de práctica es una raíz más profunda. La verdadera fortaleza no está en no doblarse jamás, sino en volver a erguirse, más sabios y más serenos, después de cada tormenta."},
  {titulo:"El viento del cambio", texto:"El mundo cambia sin pedir permiso, y con él debemos aprender a movernos. Adaptarse no significa perder quiénes somos, sino descubrir nuevas formas de seguir siendo nosotros mismos. Las especies que sobreviven no son las más fuertes ni las más rápidas, sino las que mejor responden al cambio. Lo mismo ocurre con las personas: quien abraza lo nuevo con curiosidad encuentra puertas donde otros ven muros.\n\nHay un proverbio que dice: cuando sopla el viento del cambio, algunos construyen muros y otros construyen molinos. El muro y el molino se hacen con las mismas piedras; la diferencia está en la intención. El que construye muros gasta su energía en detener lo inevitable. El que construye molinos usa esa misma energía para moler su trigo, para crear algo útil, para avanzar. Ante cada cambio, grande o pequeño, tenemos esa elección: muro o molino, resistencia o aprovechamiento.\n\nCambiar de costumbres a cualquier edad es posible, y la ciencia lo confirma: el cerebro humano sigue aprendiendo toda la vida. Cada vez que practicamos algo nuevo, se crean conexiones que antes no existían. Por eso ningún día de práctica se pierde, aunque no se note de inmediato. Por dentro, silenciosamente, el cuerpo y la mente están construyendo caminos nuevos. La constancia es el arquitecto invisible de todas nuestras capacidades.\n\nMira hacia atrás y cuenta cuántas veces ya te has reinventado. Aprendiste a caminar cayéndote. Aprendiste un oficio empezando desde cero. Te adaptaste a ciudades, a personas, a épocas distintas. Cada etapa de la vida exigió una versión nueva de ti, y siempre la encontraste. Esta etapa no es diferente: pide paciencia, pide práctica, pide voz fuerte y ánimo firme, y tú ya sabes cómo se hace, porque llevas toda la vida haciéndolo.\n\nEl cambio también trae regalos que solo se ven con el tiempo. Una dificultad nos enseña quiénes son los que de verdad nos acompañan. Un tropiezo nos vuelve más comprensivos con los tropiezos ajenos. Una limitación nueva nos descubre fuerzas que no sabíamos que teníamos. No se trata de negar lo difícil, sino de no quedarse ciego a lo bueno que viene mezclado con ello. La vida rara vez da páginas completamente oscuras.\n\nLa curiosidad es la mejor compañera de la adaptación. El que pregunta, el que quiere saber cómo funciona lo nuevo, el que prueba sin miedo a equivocarse, mantiene el espíritu joven aunque pasen los años. Aprender una palabra nueva, un juego nuevo, una receta nueva: cada pequeño aprendizaje es una ventana abierta que deja entrar aire fresco a la casa. Los estudiosos de la longevidad coinciden en que las personas que llegan lúcidas y alegres a edades avanzadas comparten un rasgo: nunca dejaron de interesarse por el mundo. La curiosidad no cuesta dinero ni exige fuerzas extraordinarias; solo pide mirar lo desconocido con ojos de explorador y no de juez. Quien conserva viva la pregunta «¿y esto cómo será?» tiene garantizada una vida interesante, se adapte a lo que se tenga que adaptar.\n\nHoy tu tarea es simple y poderosa: leer fuerte, respirar hondo, y recordar que cada palabra dicha con energía es un molino girando a tu favor. Elijamos crear, aprender y crecer, convencidos de que nuestra mayor fortaleza es la capacidad de reinventarnos una y otra vez. El viento va a soplar de todos modos: que nos encuentre construyendo molinos, con la frente en alto y la voz sonando clara, fuerte y segura."},
  {titulo:"El arte de superarse", texto:"Toda gran conquista comenzó como un pequeño intento. Nadie nace sabiendo caminar, hablar o vencer sus miedos; todo se aprende paso a paso, con paciencia y constancia. La superación no es un destino, sino un camino que recorremos cada día al elegir ser un poco mejores que ayer. Habrá tropiezos, dudas y cansancio, pero cada esfuerzo deja una huella y cada práctica nos acerca a la meta.\n\nLos grandes maestros de cualquier arte repiten lo mismo: el talento importa menos que la práctica. El pianista toca escalas todos los días, aunque ya sea famoso. El atleta entrena la misma salida mil veces, aunque ya haya ganado medallas. Lo extraordinario no nace de hacer cosas extraordinarias de vez en cuando, sino de hacer cosas ordinarias con extraordinaria constancia. Practicar la voz cada día es exactamente eso: el entrenamiento silencioso de un campeón.\n\nHay días buenos y días difíciles, y los dos valen. El día bueno confirma el progreso; el día difícil construye el carácter. Cuando el ejercicio sale con facilidad, celebramos. Cuando cuesta más, no significa retroceso: significa que ese día el entrenamiento contó doble. El cuerpo tiene sus ritmos, el ánimo tiene sus mareas, y el que sigue practicando a pesar de las mareas es el que llega más lejos. No se le pide al mar que esté siempre en calma; se aprende a navegar en todas sus aguas.\n\nCompararse con otros es una trampa; compararse con uno mismo es una brújula. La única pregunta que importa no es si alguien lo hace mejor, sino: ¿lo hago un poco mejor que el mes pasado? ¿Mi voz suena más fuerte que cuando empecé? ¿Me atrevo hoy a cosas que antes evitaba? Esas pequeñas victorias personales, sumadas, forman lo que después llamamos una gran superación. El progreso se mide en semanas y meses, no en minutos.\n\nTambién es importante celebrar. Cada ejercicio terminado merece un reconocimiento, aunque sea íntimo y breve: lo hice, cumplí, aquí estoy. La disciplina sin celebración se vuelve gris y se abandona; la disciplina celebrada se convierte en orgullo y se sostiene sola. Quien aprende a felicitarse por los pasos pequeños descubre que el camino largo se hace mucho más ligero y hasta disfrutable.\n\nNadie se supera completamente solo. Detrás de cada persona que avanza hay manos que aplauden, voces que animan y compañía que sostiene. Aceptar apoyo no resta mérito: lo multiplica, porque convierte el esfuerzo propio en una obra compartida. Contarle a la familia los avances, presumir un buen resultado, pedir que escuchen la voz cada vez más fuerte: todo eso teje una red que hace más difícil rendirse y más sabroso celebrar. Y la red funciona en los dos sentidos: así como recibimos ánimo, también lo damos, y pocas cosas fortalecen tanto como sentirse útil para otro. El que anima a los demás con voz fuerte y palabras generosas se anima, sin darse cuenta, a sí mismo. La superación, como la mesa, se disfruta más acompañada.\n\nConfía en tu voz, en tu cuerpo y en tu mente, porque dentro de ti habita una fuerza capaz de sorprenderte. Hoy, mientras lees estas líneas en voz alta y fuerte, estás haciendo exactamente lo que hacen los que se superan: presentarse, practicar, insistir. Levántate cada mañana, respira hondo y da el siguiente paso, porque el progreso pertenece a quienes se atreven a intentarlo una vez más, con la voz clara y el corazón decidido."},
  {titulo:"Gota a gota", texto:"La perseverancia es el arte de continuar cuando todo invita a detenerse. El agua, gota a gota, perfora la piedra más dura; no por su fuerza, sino por su constancia. Así también nosotros alcanzamos lo que parecía imposible: con repetición, disciplina y paciencia. Los grandes logros rara vez llegan de golpe; se construyen con pequeños pasos sostenidos en el tiempo.\n\nEn el campo, el agricultor siembra sabiendo que no verá frutos mañana. Riega la tierra día tras día sin impacientarse, porque entiende algo que las ciudades a veces olvidan: los procesos valiosos tienen su tiempo propio. Nadie jala una planta para que crezca más rápido. La cuida, la riega, confía. La voz se cultiva igual: cada repetición es un riego, cada sesión es una semana de sol, y la cosecha llega para quien no abandonó el campo.\n\nLa constancia tiene un aliado poderoso: el hábito. Lo que al principio requiere esfuerzo y memoria, con el tiempo se vuelve tan natural como lavarse los dientes. Los primeros días de cualquier práctica son los más difíciles, porque todo es nuevo y el resultado no se ve. Pero quien resiste esas primeras semanas descubre que después el hábito lo lleva a él, y no al revés. La disciplina bien sembrada se convierte en costumbre, y la costumbre en identidad: ya no soy alguien que intenta practicar; soy alguien que practica.\n\nCuando el avance parece lento, conviene mirar el camino recorrido y no solo la cima. El alpinista que solo mira la cumbre se desanima; el que mira de vez en cuando hacia el valle descubre cuánto ha subido ya. Compara tu voz de hoy con la de tus primeros días, no con una perfección imaginaria. El registro de cada sesión cuenta esa historia: paso a paso, número a número, tu esfuerzo va dejando constancia de que sí hay camino, y de que lo estás recorriendo.\n\nTambién los descansos forman parte de la perseverancia. Descansar no es abandonar: es recargar. El músculo crece en la pausa, la tierra se renueva en barbecho, y la voz también agradece sus momentos de silencio y de agua. Perseverar no significa exigirse sin medida, sino volver siempre, una y otra vez, con la serenidad del que sabe que esto es una carrera larga y que la va ganando quien permanece.\n\nLas catedrales más imponentes se levantaron piedra por piedra, a lo largo de generaciones enteras. Los canteros que colocaban las primeras hiladas sabían que no verían las torres terminadas, y aun así trabajaban con esmero, porque entendían que toda grandeza es una suma de jornadas humildes. Lo mismo cuenta cualquier abuela sobre el tejido: punto por punto se hace la cobija que abriga a toda la familia. Lo mismo dice el mar, que fue llenándose río por río, lluvia por lluvia. La naturaleza entera funciona por acumulación paciente, y nosotros somos parte de ella. Cada repetición de voz, cada lectura como esta, cada día marcado en el calendario de práctica es una piedra bien puesta, un punto bien tejido, una gota que se suma. La obra avanza aunque no siempre se vea desde cerca.\n\nCuando sientas que avanzas despacio, recuerda que incluso el paso más lento te acerca, mientras que rendirse te aleja para siempre. La gota no tiene prisa y sin embargo vence a la piedra. Sigue adelante con calma y determinación, hoy con esta lectura en voz alta y fuerte, mañana con la siguiente, porque la meta no es de quien corre más rápido, sino de quien nunca, nunca deja de caminar."},
  {titulo:"La actitud lo cambia todo", texto:"La actitud con la que enfrentamos la vida transforma por completo lo que vivimos. No podemos elegir todas las circunstancias, pero siempre podemos elegir cómo responder a ellas. Una sonrisa, una palabra amable o un pensamiento esperanzador tienen el poder de cambiar un día entero. El optimismo no ignora las dificultades: las mira de frente y decide buscar una salida.\n\nDos personas pueden vivir la misma mañana lluviosa. Una ve el cielo gris y decide que el día está arruinado. La otra escucha la lluvia y agradece el fresco, el olor a tierra mojada, la excusa perfecta para un café caliente. La lluvia es la misma; la vida que cada una vive ese día es completamente distinta. Ese es el poder silencioso de la actitud: no cambia el clima, pero cambia por completo al que lo habita.\n\nLa ciencia lo ha estudiado mucho: las personas que practican la gratitud duermen mejor, se enferman menos y se recuperan más rápido. No porque su vida tenga menos problemas, sino porque su atención está entrenada para ver también lo que sí funciona. Cada noche se puede hacer un ejercicio sencillo: nombrar tres cosas buenas del día, aunque sean pequeñas. Un plato sabroso, una llamada cariñosa, un ejercicio completado. La gratitud es una linterna: alumbra lo que ya estaba ahí.\n\nLa actitud también se contagia. Quien saluda con voz fuerte y ánimo alegre cambia el humor de toda la mesa. Quien se queja sin pausa apaga la habitación entera. Todos conocemos a personas cuya sola presencia levanta el día, y la buena noticia es que eso no es un don misterioso: es una decisión repetida. Ser esa persona para los demás está al alcance de cualquiera que lo decida, y trae de regalo serlo también para uno mismo.\n\nHablar con voz fuerte es, en sí mismo, una declaración de actitud. El que habla fuerte dice al mundo: aquí estoy, tengo algo que decir, mi voz vale. Por eso este ejercicio es mucho más que un entrenamiento muscular: es un entrenamiento de presencia. Cada palabra dicha con energía le recuerda al cuerpo y a la mente que no estamos para escondernos, que la vida se vive de frente y en voz alta, participando, opinando, contando historias y diciendo cariños que se escuchen bien.\n\nEl buen humor merece un lugar de honor entre los remedios. Reírse, incluso de uno mismo, afloja lo que la preocupación aprieta. Una carcajada a tiempo relaja los hombros, abre el pecho y hasta mejora la voz, porque la risa es, al fin y al cabo, un ejercicio de aire y sonido hecho con alegría. Las familias que cultivan el chiste, la anécdota repetida mil veces y el apodo cariñoso viven las dificultades con otra ligereza. No se trata de tomar todo a broma, sino de no tomarse tan en serio todo el tiempo. El que puede sonreír de su propio tropiezo ya le quitó la mitad del peso. Buscar cada día una razón para reír, y reír fuerte, sin pena, es también entrenar la voz y entrenar el alma.\n\nCada mañana es una página en blanco esperando ser escrita con valentía y entusiasmo. Cuida tus pensamientos como cuidas un jardín: arranca las hierbas del desánimo y riega las flores de la esperanza. Alimenta tu confianza con cada práctica cumplida y habla siempre con fuerza y claridad, porque quien cree en sí mismo, y lo dice con voz fuerte para que todos lo oigan, ya ha dado el primer paso hacia el éxito."}
];

function todayCarryover(){
  var d=new Date();
  var doy=Math.floor((d-new Date(d.getFullYear(),0,0))/86400000);
  return CARRYOVER[doy%CARRYOVER.length];
}

/* ─────────── Utilidades ─────────── */
function pad(n){ return (n<10?"0":"")+n; }
function fmtTime(s){ return pad(Math.floor(s/60))+":"+pad(s%60); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
var NOTE=["DO","DO♯","RE","RE♯","MI","FA","FA♯","SOL","SOL♯","LA","LA♯","SI"];
function midiToFreq(m){ return 440*Math.pow(2,(m-69)/12); }
function freqToMidi(f){ return 69+12*Math.log2(f/440); }
function midiName(m){ return NOTE[((m%12)+12)%12]+(Math.floor(m/12)-1); }
function hzToNote(hz){ return hz>0?midiName(Math.round(freqToMidi(hz))):"—"; }
function localDay(iso){ var d=new Date(iso); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }

var LS_LOG="lsvt-log", LS_SET="lsvt-settings";
function loadLog(){ try{ return JSON.parse(localStorage.getItem(LS_LOG)||"[]"); }catch(e){ return []; } }
function saveLog(l){ try{ localStorage.setItem(LS_LOG, JSON.stringify(l)); }catch(e){} }
function loadSettings(){ try{ var s=JSON.parse(localStorage.getItem(LS_SET)||"{}"); return {calib:s.calib!=null?s.calib:94, targetDb:s.targetDb!=null?s.targetDb:80, reps:s.reps||{}, resetAt:s.resetAt||0, phrases:(Array.isArray(s.phrases)&&s.phrases.length)?s.phrases:null, carryDone:s.carryDone||""}; }catch(e){ return {calib:94,targetDb:80,reps:{},resetAt:0,phrases:null,carryDone:""}; } }
function saveSettings(s){ try{ localStorage.setItem(LS_SET, JSON.stringify(s)); }catch(e){} }

// Repeticiones efectivas (con override guardado por el usuario)
function exReps(ex){ var r=state.settings.reps[ex.id]; return (r!=null)?r:ex.reps; }
// Frases efectivas: las personalizadas por el paciente (protocolo LSVT: frases propias) o las de ejemplo.
function exPhrases(ex){ return (state.settings.phrases&&state.settings.phrases.length)?state.settings.phrases:ex.phrases; }
// Total de repeticiones a realizar. Para frases: ciclos × nº de frases (10).
function exTotal(ex){ return (ex.type==="phrases")?(exReps(ex)*exPhrases(ex).length):exReps(ex); }
function setReps(ex, val){
  var min=1, max=(ex.type==="phrases")?exPhrases(ex).length:30;
  state.settings.reps[ex.id]=clamp(val, min, max);
  saveSettings(state.settings); render();
}
function repStepperRow(ex){
  var REPS=exReps(ex);
  var lbl=(ex.type==="phrases")?"Ciclos":"Repeticiones";

function computeStreak(log){
  if(!log.length) return 0;
  var days={}; log.forEach(function(s){ days[localDay(s.date)]=1; });
  var streak=0, cur=new Date();
  function key(){ return cur.getFullYear()+"-"+pad(cur.getMonth()+1)+"-"+pad(cur.getDate()); }
  if(!days[key()]) cur.setDate(cur.getDate()-1);
  while(days[key()]){ streak++; cur.setDate(cur.getDate()-1); }
  return streak;
}

// Nota más frecuente de las últimas lecturas (estabiliza la identificación del tono).
function modeMidi(arr){
  if(!arr.length) return null;
  var count={}, best=arr[arr.length-1], bestN=0;
  for(var i=0;i<arr.length;i++){ var v=arr[i]; count[v]=(count[v]||0)+1; if(count[v]>bestN){ bestN=count[v]; best=v; } }
  return best;
}

var app = document.getElementById("app");

/* ─────────── Motor de audio ─────────── */
function getCtx(){
  if(!state.audioCtx){
    var AC = window.AudioContext || window.webkitAudioContext;
    state.audioCtx = new AC();
  }
  if(state.audioCtx.state==="suspended") state.audioCtx.resume();
  return state.audioCtx;
}
function playTone(midi){
  try{
    var ctx=getCtx(), osc=ctx.createOscillator(), g=ctx.createGain();
    osc.type="sine"; osc.frequency.value=midiToFreq(midi);
    var t=ctx.currentTime;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.35,t+0.03);
    g.gain.exponentialRampToValueAtTime(0.0001,t+1.5);
    osc.connect(g).connect(ctx.destination); osc.start(t); osc.stop(t+1.6);
  }catch(e){}
}
function autoCorrelate(buf, sr){
  var SIZE=buf.length, rms=0, i, j;
  for(i=0;i<SIZE;i++) rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/SIZE);
  if(rms<0.012) return {freq:-1,rms:rms};
  var r1=0, r2=SIZE-1, thres=0.2;
  for(i=0;i<SIZE/2;i++){ if(Math.abs(buf[i])<thres){ r1=i; break; } }
  for(i=1;i<SIZE/2;i++){ if(Math.abs(buf[SIZE-i])<thres){ r2=SIZE-i; break; } }
  var b2=buf.slice(r1,r2), N=b2.length;
  if(N<32) return {freq:-1,rms:rms};
  var c=new Float32Array(N);
  for(i=0;i<N;i++){ var sum=0; for(j=0;j<N-i;j++) sum+=b2[j]*b2[j+i]; c[i]=sum; }
  var d=0; while(d<N-1 && c[d]>c[d+1]) d++;
  var maxval=-1, maxpos=-1;
  for(i=d;i<N;i++){ if(c[i]>maxval){ maxval=c[i]; maxpos=i; } }
  if(maxpos<=0) return {freq:-1,rms:rms};
  var T0=maxpos, x1=c[T0-1]||0, x2=c[T0], x3=c[T0+1]||0;
  var a=(x1+x3-2*x2)/2, bb=(x3-x1)/2;
  if(a) T0=T0-bb/(2*a);
  var freq=sr/T0;
  if(freq<50||freq>1200) return {freq:-1,rms:rms};
  return {freq:freq,rms:rms};
}
function startMic(cb){
  state.micError=null;
  // iOS CRÍTICO: crear y reanudar el AudioContext SÍNCRONAMENTE dentro del gesto (toque),
  // ANTES de pedir el micrófono. Si se hace después del await, iOS lo bloquea.
  var ctx;
  try{
    ctx=getCtx();
    if(ctx.state==="suspended"){ ctx.resume(); }
  }catch(e){
    state.micError="No se pudo iniciar el audio en este navegador. Prueba abrir la app en Safari."; render(); if(cb)cb(false); return;
  }

  // Desactivar el procesamiento del micrófono: en iOS el control automático de ganancia,
  // la cancelación de eco y la supresión de ruido alteran el tono y el volumen medidos.
  var micConstraints={audio:{echoCancellation:false, noiseSuppression:false, autoGainControl:false}};

  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    // Fallback a la API antigua (algunos WebViews)
    var legacy=navigator.getUserMedia||navigator.webkitGetUserMedia||navigator.mozGetUserMedia;
    if(legacy){
      legacy.call(navigator,micConstraints, function(st){ onStream(st); }, function(err){ onError(err); });
      return;
    }
    state.micError="Este navegador no expone el micrófono (mediaDevices no existe). Abre el archivo en Safari, no dentro de otra app.";
    render(); if(cb)cb(false); return;
  }

  navigator.mediaDevices.getUserMedia(micConstraints)
    .then(onStream).catch(onError);

  function onStream(stream){
    try{
      state.stream=stream;
      if(ctx.state==="suspended"){ ctx.resume(); }
      var srcNode=ctx.createMediaStreamSource(stream);
      var analyser=ctx.createAnalyser(); analyser.fftSize=2048;
      srcNode.connect(analyser);
      state.analyser=analyser; state.micOn=true;
      var buf=new Float32Array(analyser.fftSize);
      var byteBuf=new Uint8Array(analyser.fftSize);
      var hasFloat=typeof analyser.getFloatTimeDomainData==="function";
      function loop(ts){
        state.raf=requestAnimationFrame(loop);
        if(ts-state.lastTs<70) return;
        state.lastTs=ts;
        if(hasFloat) analyser.getFloatTimeDomainData(buf);
        else { analyser.getByteTimeDomainData(byteBuf); for(var i=0;i<byteBuf.length;i++) buf[i]=(byteBuf[i]-128)/128; }
        var res=autoCorrelate(buf, ctx.sampleRate);
        var dbfs = res.rms>1e-7 ? 20*Math.log10(res.rms) : -120;
        var dbRaw = clamp(dbfs+state.settings.calib, 30, 115);
        state.smoothDb = state.smoothDb>0 ? state.smoothDb*0.55+dbRaw*0.45 : dbRaw;
        var db=Math.round(state.smoothDb);
        var midi=null, mf=null, cents=0, f=0;
        if(res.freq>0){
          var fr=res.freq;
          // Corrección de octava: si la detección saltó a ~2× o ~½ del tono actual, ajústala
          // (evita que un armónico envenene el suavizado y la nota).
          if(state.smoothF>0){
            if(Math.abs(fr-2*state.smoothF) < 0.15*state.smoothF) fr=fr/2;
            else if(Math.abs(fr-0.5*state.smoothF) < 0.15*state.smoothF) fr=fr*2;
          }
          state.smoothF = state.smoothF>0 ? state.smoothF*0.6+fr*0.4 : fr;
          f=state.smoothF; mf=freqToMidi(f);
          var rawMidi=Math.round(freqToMidi(fr));    // nota de esta trama, desde la freq cruda corregida
          state.noteBuf.push(rawMidi); if(state.noteBuf.length>6) state.noteBuf.shift();
          midi=modeMidi(state.noteBuf);              // nota estable = la más frecuente reciente
          cents=Math.round((mf-midi)*100);
          state.voidFrames=0;
        } else {
          // Tolera microcortes: conserva la nota unas cuantas tramas antes de soltarla (evita parpadeo).
          state.voidFrames++;
          if(state.voidFrames<4 && state.smoothF>0){
            f=state.smoothF; mf=freqToMidi(f); midi=modeMidi(state.noteBuf);
          } else { state.smoothF=0; state.noteBuf.length=0; }
        }
        var s={db:db, freq:f?Math.round(f):0, midi:midi, mf:mf, cents:cents, voiced:res.freq>0};
        state.reading=s;
        state.history.push({db:db, mf:mf});
        if(state.history.length>110) state.history.shift();
        if(state.running && !state.paused){
          if(db>=55) state.repSamples.db.push(db);
          if(s.voiced && s.freq>0){
            state.repSamples.hz.push(s.freq);
            var ez=EXERCISES[state.exIdx].zone;
            if(ez){ state.repSamples.ztot++; if(inZone(s.mf,ez)) state.repSamples.zin++; }
          }
        }
        updateLive();
      }
      state.raf=requestAnimationFrame(loop);
      render(); if(cb)cb(true);
    }catch(e){
      state.micError="Micrófono conectado pero falló el procesamiento de audio: "+(e.message||e)+".";
      state.micOn=false; render(); if(cb)cb(false);
    }
  }

  function onError(err){
    var name=(err&&err.name)||"Error";
    var msg;
    if(name==="NotAllowedError"||name==="SecurityError")
      msg="Permiso denegado. Toca 🎤 otra vez y elige Permitir. Si no aparece: Ajustes → Safari → Micrófono → Permitir, y recarga.";
    else if(name==="NotFoundError"||name==="OverconstrainedError")
      msg="No se encontró micrófono disponible en el dispositivo.";
    else if(name==="NotReadableError")
      msg="El micrófono está siendo usado por otra app. Ciérrala e intenta de nuevo.";
    else
      msg="No se pudo acceder al micrófono ("+name+"). Abre el archivo en Safari, no dentro de otra app.";
    state.micError=msg;
    state.micOn=false; render(); if(cb)cb(false);
  }
}
function stopMic(){
  if(state.raf) cancelAnimationFrame(state.raf);
  if(state.stream){ state.stream.getTracks().forEach(function(t){ t.stop(); }); state.stream=null; }
  state.smoothF=0; state.smoothDb=0; state.micOn=false; state.reading=null;
  state.noteBuf.length=0; state.voidFrames=0;
  render();
}

/* ─────────── Wake Lock: pantalla encendida durante los ejercicios ─────────── */
var _wlPending=false;
function syncWakeLock(){
  var want = state.screen==="ex" || (state.screen==="tuner" && state.micOn);
  if(want && !state.wakeLock && !_wlPending && "wakeLock" in navigator){
    _wlPending=true;
    navigator.wakeLock.request("screen").then(function(wl){
      _wlPending=false;
      if(!(state.screen==="ex" || (state.screen==="tuner" && state.micOn))){ try{ wl.release(); }catch(e){} return; }
      state.wakeLock=wl;
      wl.addEventListener("release", function(){ if(state.wakeLock===wl) state.wakeLock=null; });
    }).catch(function(){ _wlPending=false; });
  } else if(!want && state.wakeLock){
    try{ state.wakeLock.release(); }catch(e){}
    state.wakeLock=null;
  }
}
// iOS libera el wake lock al bloquear o cambiar de app; se vuelve a pedir al regresar.
document.addEventListener("visibilitychange", function(){
  if(document.visibilityState==="visible") syncWakeLock();
});

/* ─────────── Zonas ─────────── */
function dbZone(db, targetDb){
  if(db==null || db<52) return {key:"silent",label:"· · · VOCALIZA",color:"#93a0c8",msg:""};
  if(db<targetDb) return {key:"low",label:"⬇ BAJO",color:"#e65100",msg:"¡MÁS FUERTE!"};
  if(db<=targetDb+15) return {key:"ok",label:"✓ EN RANGO",color:"#2e7d32",msg:"¡MANTÉN ASÍ!"};
  return {key:"high",label:"⬆ MUY FUERTE",color:"#6a1b9a",msg:"potente — sin tensar"};
}
function pitchStatus(mf, z){
  if(mf==null||!z) return null;
  if(z.mode==="above") return mf>=z.min?{ok:true,txt:"✓ agudo"}:{ok:false,txt:"⬆ sube más"};
  if(z.mode==="below") return mf<=z.max?{ok:true,txt:"✓ grave"}:{ok:false,txt:"⬇ baja más"};
  if(mf<z.min) return {ok:false,txt:"⬇ muy grave"};
  if(mf>z.max) return {ok:false,txt:"⬆ muy agudo"};
  return {ok:true,txt:"✓ normal"};
}
function inZone(mf, z){
  if(mf==null||!z) return false;
  if(z.mode==="above") return mf>=z.min;
  if(z.mode==="below") return mf<=z.max;
  return mf>=z.min && mf<=z.max;
}

/* ─────────── Calificación (0–100 + etiqueta) ─────────── */
function scoreLabel(s){
  if(s==null) return {txt:"—",color:"#5a6899"};
  if(s>=85) return {txt:"Excelente",color:"#2e7d32"};
  if(s>=70) return {txt:"Muy bien",color:"#43a047"};
  if(s>=50) return {txt:"Bien",color:"#e65100"};
  if(s>=30) return {txt:"Sigue practicando",color:"#d84315"};
  return {txt:"A mejorar",color:"#c62828"};
}
// Puntajes de un ejercicio a partir de sus stats
function exerciseScores(ex, stats){
  var sc={intensidad:null,tono:null,esfuerzo:null,overall:null};
  if(stats.pctDb!=null) sc.intensidad=clamp(stats.pctDb,0,100);
  if(ex.zone && stats.tonePct!=null) sc.tono=clamp(stats.tonePct,0,100);
  if(ex.type==="sustain" && ex.target && stats.avg!=null) sc.esfuerzo=clamp(Math.round(stats.avg/ex.target*100),0,100);
  else if(stats.pctDb!=null) sc.esfuerzo=clamp(stats.pctDb,0,100); // frases: decir todas en voz alta
  var parts=[sc.intensidad,sc.tono,sc.esfuerzo].filter(function(v){return v!=null;});
  sc.overall=parts.length?Math.round(parts.reduce(function(a,b){return a+b;},0)/parts.length):null;
  return sc;
}
// Agrega los puntajes de una sesión (objeto exercises)
function aggScores(exs){
  var d={intensidad:[],tono:[],esfuerzo:[],overall:[]};
  for(var k in exs){ var s=exs[k]&&exs[k].scores; if(s){
    ["intensidad","tono","esfuerzo","overall"].forEach(function(dim){ if(s[dim]!=null) d[dim].push(s[dim]); });
  }}
  function avg(a){ return a.length?Math.round(a.reduce(function(x,y){return x+y;},0)/a.length):null; }
  return {intensidad:avg(d.intensidad),tono:avg(d.tono),esfuerzo:avg(d.esfuerzo),overall:avg(d.overall)};
}

function el(tag, attrs, children){
  var e=document.createElement(tag);
  if(attrs){ for(var k in attrs){
    if(k==="style") e.style.cssText=attrs[k];
    else if(k==="class") e.className=attrs[k];
    else if(k==="html") e.innerHTML=attrs[k];
    else e.setAttribute(k, attrs[k]);
  }}
  if(children!=null){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c==null||c===false) return;
      e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);

}

  state.restSec=0; state.restT0=Date.now();
  if(state.restTimer) clearInterval(state.restTimer);
  state.restTimer=setInterval(function(){ state.restSec=Math.floor((Date.now()-state.restT0)/1000); if(_pauseNode) _pauseNode.textContent=fmtTime(state.restSec); }, 500);

  if(!state.paused) return;

  if(state.waterAuto){ state.waterAuto=false; phraseNext(); return; }  // pausa de agua de frases → continúa solo

}

/* ─────────── Cronómetro ─────────── */
function tickStart(){
  // Pedir micrófono PRIMERO, aún dentro del gesto del toque (clave en iOS).
  if(!state.micOn){ startMic(function(){}); }
  state.sec=0; state.running=true;
  state.repSamples={db:[],hz:[],zin:0,ztot:0}; state.history=[];
  startRepTimer();
  render();
}
// Cronómetro basado en la hora real: no deriva si iOS congela los intervalos en segundo plano.
function startRepTimer(){
  state.timerT0=Date.now()-state.sec*1000;
  if(state.timer) clearInterval(state.timer);
  state.timer=setInterval(function(){
    var s=Math.floor((Date.now()-state.timerT0)/1000);
    if(s!==state.sec){ state.sec=s; updateTimer(); }
  }, 250);
}
function repDone(){
  state.running=false;
  if(state.timer){ clearInterval(state.timer); state.timer=null; }
  var ex=EXERCISES[state.exIdx];
  state.repLog.push(state.sec);
  var db=state.repSamples.db, hz=state.repSamples.hz, audio=null;
  if(db.length){
    var onTarget=db.filter(function(d){return d>=state.settings.targetDb;}).length;
    audio={ avgDb:Math.round(db.reduce(function(a,b){return a+b;},0)/db.length),
      maxDb:Math.max.apply(null,db),
      pctOnTarget:Math.round(onTarget/db.length*100),
      tonePct:state.repSamples.ztot?Math.round(state.repSamples.zin/state.repSamples.ztot*100):null,
      minHz:hz.length?Math.min.apply(null,hz):0,
      maxHz:hz.length?Math.max.apply(null,hz):0,
      avgHz:hz.length?hz.reduce(function(a,b){return a+b;},0)/hz.length:0 };
  }
  state.dbLog.push(audio);
  if(state.rep+1>=exTotal(ex)){
    var avg=Math.round(state.repLog.reduce(function(a,b){return a+b;},0)/state.repLog.length);
    var best=Math.max.apply(null,state.repLog);
    var stats={type:ex.type,name:ex.name,reps:state.repLog.length,avg:avg,best:best};
    var wa=state.dbLog.filter(Boolean);
    if(wa.length){
      stats.avgDb=Math.round(wa.reduce(function(a,r){return a+r.avgDb;},0)/wa.length);
      stats.maxDb=Math.max.apply(null,wa.map(function(r){return r.maxDb;}));
      var pcts=wa.map(function(r){return r.pctOnTarget;}).filter(function(v){return v!=null;});
      if(pcts.length) stats.pctDb=Math.round(pcts.reduce(function(a,b){return a+b;},0)/pcts.length);
      var mins=wa.map(function(r){return r.minHz;}).filter(function(v){return v>0;});
      var maxs=wa.map(function(r){return r.maxHz;}).filter(function(v){return v>0;});
      var avgs=wa.map(function(r){return r.avgHz;}).filter(function(v){return v>0;});
      var tps=wa.map(function(r){return r.tonePct;}).filter(function(v){return v!=null;});
      if(tps.length) stats.tonePct=Math.round(tps.reduce(function(a,b){return a+b;},0)/tps.length);
      if(ex.pitchRole==="max"&&maxs.length){ var h=Math.max.apply(null,maxs); stats.pitch={note:hzToNote(h),hz:Math.round(h)}; }
      else if(ex.pitchRole==="min"&&mins.length){ var h2=Math.min.apply(null,mins); stats.pitch={note:hzToNote(h2),hz:Math.round(h2)}; }
      else if(ex.pitchRole&&avgs.length){ var h3=avgs.reduce(function(a,b){return a+b;},0)/avgs.length; stats.pitch={note:hzToNote(h3),hz:Math.round(h3)}; }
    }
    stats.scores=exerciseScores(ex, stats);
    recordExercise(ex.id, stats);
    finishEx(ex.id);
  } else if(ex.type==="phrases"){
    // Frases: al terminar cada frase, ¿toca pausa de agua (tras ciclo 2) o pausa de 3s + auto-avance?
    var perCycle=exPhrases(ex).length;            // 10
    if(state.rep+1 === 2*perCycle){ startWaterBreak(); }   // acaba de completar el 2º ciclo (frase 20)
    else { startPhraseGap(); }                             // 3s y avanza sola
  } else {
    state.rep++; state.sec=0; render();
  }
}

/* ─────────── Termómetro (SVG) ─────────── */
function thermometerSVG(db, targetDb, micOn, running){
  var MIN=40,MAX=105,W=70,H=250,TW=44,r=TW/2;
  var tx0=(W-TW)/2, tx1=tx0+TW, ty0=8, ty1=H-8;
  function pct(v){ return clamp((v-MIN)/(MAX-MIN),0,1); }
  function y(p){ return ty1-p*(ty1-ty0); }
  var zone=dbZone(db,targetDb);
  var fill = (db!=null&&db>=45)?pct(db):0;
  var svg='<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="opacity:'+(micOn?1:0.4)+';transition:opacity .3s;">';
  // tube bg
  svg+='<rect x="'+tx0+'" y="'+ty0+'" width="'+TW+'" height="'+(ty1-ty0)+'" rx="'+r+'" fill="#e8eaf6" stroke="rgba(26,35,126,0.2)" stroke-width="1.5"/>';
  // zone bands
  function bandRect(p0,p1,color,op){
    var yy=y(p1), hh=y(p0)-y(p1);
    return '<rect x="'+(tx0+2)+'" y="'+yy+'" width="'+(TW-4)+'" height="'+hh+'" fill="'+color+'" opacity="'+op+'"/>';
  }
  var t=pct(targetDb);
  svg+='<clipPath id="tube"><rect x="'+(tx0+2)+'" y="'+(ty0+2)+'" width="'+(TW-4)+'" height="'+(ty1-ty0-4)+'" rx="'+(r-2)+'"/></clipPath>';
  svg+='<g clip-path="url(#tube)">';
  svg+=bandRect(0,t,"#e65100",0.16);
  svg+=bandRect(t,pct(targetDb+15),"#2e7d32",0.20);
  svg+=bandRect(pct(targetDb+15),1,"#6a1b9a",0.16);
  // fill
  if(fill>0){
    svg+='<rect x="'+(tx0+2)+'" y="'+y(fill)+'" width="'+(TW-4)+'" height="'+(y(0)-y(fill))+'" fill="'+zone.color+'" opacity="0.85"/>';
    svg+='<rect x="'+(tx0+2)+'" y="'+(y(fill)-2)+'" width="'+(TW-4)+'" height="4" fill="'+zone.color+'"/>';
  }
  svg+='</g>';
  // meta dashed line
  svg+='<line x1="'+(tx0-6)+'" y1="'+y(t)+'" x2="'+(tx1+6)+'" y2="'+y(t)+'" stroke="#0a0a0a" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.85"/>';
  // ticks
  [60,80,100].forEach(function(gv){
    svg+='<text x="'+(tx1-2)+'" y="'+(y(pct(gv))+3)+'" font-size="8.5" font-weight="800" fill="rgba(26,35,126,0.55)" text-anchor="end">'+gv+'</text>';
  });
  svg+='</svg>';
  return svg;
}

/* ─────────── Gráfica en vivo (dB+tono) ─────────── */
function liveGraphSVG(history, targetDb, ex){
  var W=300,HDB=110,HP=46,CAP=110;
  function dbY(db){ return HDB-clamp((db-40)/(105-40),0,1)*HDB; }
  var pMin=33,pMax=78;
  function pY(mf){ return HP-clamp((mf-pMin)/(pMax-pMin),0,1)*HP; }
  function X(i){ return i/(CAP-1)*W; }
  var last=history.length?history[history.length-1]:null;
  var okTop=dbY(targetDb+15), okBot=dbY(targetDb);
  var svg='<svg width="100%" height="'+HDB+'" viewBox="0 0 '+W+' '+HDB+'" preserveAspectRatio="none" style="display:block;">';
  svg+='<rect x="0" y="'+okTop+'" width="'+W+'" height="'+Math.max(0,okBot-okTop)+'" fill="rgba(46,125,50,0.14)"/>';
  svg+='<line x1="0" x2="'+W+'" y1="'+okBot+'" y2="'+okBot+'" stroke="#e65100" stroke-width="1.5" stroke-dasharray="5 4"/>';
  [60,80,100].forEach(function(g){ svg+='<line x1="0" x2="'+W+'" y1="'+dbY(g)+'" y2="'+dbY(g)+'" stroke="rgba(26,35,126,0.07)"/><text x="3" y="'+(dbY(g)-2.5)+'" font-size="8" fill="#93a0c8" font-weight="700">'+g+'</text>'; });
  if(history.length>1){
    var pts=history.map(function(h,i){ return X(i).toFixed(1)+","+dbY(h.db).toFixed(1); }).join(" ");
    svg+='<polyline points="'+pts+'" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  }
  if(last){ var z=dbZone(last.db,targetDb); svg+='<circle cx="'+X(history.length-1)+'" cy="'+dbY(last.db)+'" r="4.5" fill="'+z.color+'"/>'; }
  svg+='</svg>';

  // pitch lane
  var z2=ex.zone, bandTop,bandBot;
  if(z2.mode==="above"){ bandTop=pY(pMax); bandBot=pY(z2.min); }
  else if(z2.mode==="below"){ bandTop=pY(z2.max); bandBot=pY(pMin); }
  else { bandTop=pY(z2.max); bandBot=pY(z2.min); }
  var svg2='<svg width="100%" height="'+HP+'" viewBox="0 0 '+W+' '+HP+'" preserveAspectRatio="none" style="display:block;">';
  svg2+='<rect x="0" y="'+bandTop+'" width="'+W+'" height="'+Math.max(0,bandBot-bandTop)+'" fill="'+ex.color+'22"/>';
  var seg=[], cur=[];
  history.forEach(function(h,i){ if(h.mf!=null) cur.push(X(i).toFixed(1)+","+pY(h.mf).toFixed(1)); else { if(cur.length>1) seg.push(cur.join(" ")); cur=[]; } });
  if(cur.length>1) seg.push(cur.join(" "));
  seg.forEach(function(sp){ svg2+='<polyline points="'+sp+'" fill="none" stroke="#6a1b9a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'; });
  if(last&&last.mf!=null) svg2+='<circle cx="'+X(history.length-1)+'" cy="'+pY(last.mf)+'" r="3.8" fill="#6a1b9a"/>';
  svg2+='</svg>';

  var box=el("div",{style:"background:#ffffff;border-radius:16px;border:1px solid rgba(26,35,126,0.12);padding:10px 10px 8px;width:100%;"});
  box.appendChild(el("div",{style:"display:flex;justify-content:space-between;font-size:9px;letter-spacing:1.5px;color:#5a6899;font-weight:700;padding:0 2px 4px;"},[el("span",null,"🔊 VOLUMEN (dB)"),el("span",{style:"color:#2e7d32;"},"■ rango "+targetDb+"–"+(targetDb+15))]));
  box.appendChild(el("div",{html:svg}));
  box.appendChild(el("div",{style:"display:flex;justify-content:space-between;font-size:9px;letter-spacing:1.5px;color:#5a6899;font-weight:700;padding:8px 2px 4px;border-top:1px solid rgba(26,35,126,0.07);margin-top:6px;"},[el("span",null,"♪ TONO"),el("span",{style:"color:"+ex.color+";"},"■ "+ex.zone.label)]));
  box.appendChild(el("div",{html:svg2}));
  return box;
}

var _readNode=null;
function nextReading(){
  var idx=0; try{ idx=parseInt(localStorage.getItem("lsvt-readIdx")||"0",10)||0; }catch(e){}
  idx=((idx%READINGS.length)+READINGS.length)%READINGS.length;
  try{ localStorage.setItem("lsvt-readIdx", String((idx+1)%READINGS.length)); }catch(e){}
  return READINGS[idx];
}
function readStart(){
  if(state.readRunning || state.readSec<=0) return;
  releaseRec();
  function begin(){
    state.readRunning=true;
    state.readEndAt=Date.now()+state.readSec*1000;
    if(state.readTimer) clearInterval(state.readTimer);
    state.readTimer=setInterval(function(){
      var s=Math.max(0, Math.ceil((state.readEndAt-Date.now())/1000));
      if(s!==state.readSec){ state.readSec=s; if(_readNode) _readNode.textContent=fmtTime(s); }
      if(s<=0){ stopReading(); }
    }, 250);
    render();
  }
  if(!state.micOn){ startMic(function(ok){ if(ok) startReadRecording(); begin(); }); }
  else { startReadRecording(); begin(); }
}
function stopReading(){
  if(state.readTimer){ clearInterval(state.readTimer); state.readTimer=null; }
  state.readRunning=false;
  if(state.recording && state.recorder){ try{ state.recorder.stop(); }catch(e){ state.recording=false; render(); } }
  else render();
}
function startReadRecording(){
  try{
    if(typeof MediaRecorder==="undefined"){ state.recUnsupported=true; return; }
    if(!state.stream) return;
    var opts={}, types=["audio/mp4","audio/webm;codecs=opus","audio/webm"];
    for(var i=0;i<types.length;i++){ if(MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(types[i])){ opts.mimeType=types[i]; break; } }
    state.recChunks=[];
    state.recorder = opts.mimeType ? new MediaRecorder(state.stream, opts) : new MediaRecorder(state.stream);
    state.recMime = state.recorder.mimeType || opts.mimeType || "audio/webm";
    state.recorder.ondataavailable=function(e){ if(e.data && e.data.size>0) state.recChunks.push(e.data); };
    state.recorder.onstop=function(){
      try{ state.recBlob=new Blob(state.recChunks,{type:state.recMime}); state.recURL=URL.createObjectURL(state.recBlob); }catch(e){}
      state.recording=false; render();
    };
    state.recorder.start(1000);
    state.recording=true; state.recStarted=true;
  }catch(e){ state.recording=false; state.recorder=null; }

    cfg.appendChild(cfgRow("🎯 Meta de volumen", state.settings.targetDb+" dB", function(){ state.settings.targetDb=clamp(state.settings.targetDb-5,60,100); saveSettings(state.settings); render(); }, function(){ state.settings.targetDb=clamp(state.settings.targetDb+5,60,100); saveSettings(state.settings); render(); }));
    cfg.appendChild(cfgRow("⚖️ Calibración dB", "+"+state.settings.calib, function(){ state.settings.calib=clamp(state.settings.calib-2,70,115); saveSettings(state.settings); render(); }, function(){ state.settings.calib=clamp(state.settings.calib+2,70,115); saveSettings(state.settings); render(); }));
    cfg.appendChild(el("div",{style:"font-size:10.5px;color:#93a0c8;line-height:1.6;"},"Los dB son estimados (el micrófono del teléfono no está calibrado). El rango objetivo es tu meta a meta+15 dB. Mantén siempre la misma distancia (~30 cm) para comparar entre sesiones."));
    wrap.appendChild(cfg);
  }

  var r=state.reading, td=state.settings.targetDb;
  var zone=dbZone(r?r.db:null, td);
  var activeMidi=(r&&r.midi!=null)?r.midi:null;

  // display cards
  var volCard=el("div",{style:"flex:1.1;background:#ffffff;border-radius:18px;padding:16px 10px;border:1.5px solid "+(zone.key!=="silent"?zone.color+"70":"rgba(26,35,126,0.09)")+";text-align:center;"});
  var volNum=el("div",{style:"font-size:54px;font-weight:900;line-height:1;letter-spacing:-2px;color:"+(zone.key!=="silent"?zone.color:"#c7cee6")+";"}, (r&&r.db>=45)?String(r.db):"——");
  var volLabel=el("div",{style:"font-size:11px;font-weight:800;margin-top:4px;color:"+(zone.key!=="silent"?zone.color:"#5a6899")+";"}, zone.key!=="silent"?zone.label:"dB est.");
  volCard.appendChild(el("div",{style:"font-size:9.5px;letter-spacing:2px;color:#5a6899;margin-bottom:4px;"},"VOLUMEN"));
  volCard.appendChild(volNum); volCard.appendChild(volLabel);

  var noteCard=el("div",{style:"flex:1;background:#ffffff;border-radius:18px;padding:16px 10px;border:1.5px solid rgba(106,27,154,0.25);text-align:center;"});
  var noteNum=el("div",{style:"font-size:40px;font-weight:900;line-height:1.3;letter-spacing:-1px;color:"+(activeMidi!=null?"#6a1b9a":"#c7cee6")+";"}, activeMidi!=null?midiName(activeMidi):"——");
  var noteFreq=el("div",{style:"font-size:11px;color:#5a6899;font-weight:700;margin-top:3px;"}, (r&&r.freq)?(r.freq+" Hz"):"· · ·");
  noteCard.appendChild(el("div",{style:"font-size:9.5px;letter-spacing:2px;color:#5a6899;margin-bottom:4px;"},"NOTA"));
  noteCard.appendChild(noteNum); noteCard.appendChild(noteFreq);

  var cards=el("div",{style:"display:flex;gap:10px;padding:4px 16px 0;align-items:stretch;"});
  cards.appendChild(volCard); cards.appendChild(noteCard);
  wrap.appendChild(cards);

  // dB bar
  var dbPct=r?clamp((r.db-40)/(105-40),0,1)*100:0;
  var tPct=clamp((td-40)/(105-40),0,1)*100;
  var barWrap=el("div",{style:"padding:12px 20px 0;"});
  var bar=el("div",{style:"position:relative;height:14px;background:#dde3f3;border-radius:99px;"});
  var barFill=el("div",{style:"position:absolute;left:0;top:0;bottom:0;width:"+dbPct+"%;border-radius:99px;background:"+((zone.key==="ok"||zone.key==="high")?"linear-gradient(90deg,#0d47a1,#2e7d32)":"linear-gradient(90deg,#0d47a1,#6a1b9a)")+";"});
  bar.appendChild(barFill);
  bar.appendChild(el("div",{style:"position:absolute;left:"+tPct+"%;top:-4px;bottom:-4px;width:3px;background:#e65100;border-radius:2px;transform:translateX(-50%);"}));
  barWrap.appendChild(bar);
  wrap.appendChild(barWrap);

  // piano
  var pianoWrap=el("div",{style:"flex:1;display:flex;flex-direction:column;justify-content:center;"});
  var piano=buildPiano(activeMidi, 138);
  var pianoKeys=piano.keys;
  pianoWrap.appendChild(piano.node);

  _tunerNodes={volCard:volCard,volNum:volNum,volLabel:volLabel,noteNum:noteNum,noteFreq:noteFreq,barFill:barFill,keys:pianoKeys,activeMidi:activeMidi};

  var guide=el("div",{style:"display:flex;gap:8px;justify-content:center;padding:10px 16px 0;flex-wrap:wrap;"});
  [["🔉 Grave","DO2 – SOL2","#2e7d32"],["🗣️ Habla","LA2 – MI3","#0d47a1"],["📢 Agudo","SOL3 +","#6a1b9a"]].forEach(function(g){
    guide.appendChild(el("div",{style:"background:"+g[2]+"10;border:1px solid "+g[2]+"30;border-radius:10px;padding:6px 12px;font-size:11px;color:"+g[2]+";font-weight:700;",html:g[0]+" <span style='color:#5a6899;font-weight:500;'>"+g[1]+"</span>"}));
  });
  pianoWrap.appendChild(guide);
  pianoWrap.appendChild(el("div",{style:"font-size:11.5px;color:#93a0c8;text-align:center;padding:10px 28px 38px;line-height:1.7;",html:"💡 <b style='color:#5a6899;'>Toca una tecla</b> para escuchar el tono · <b style='color:#5a6899;'>🎤</b> para medir tu voz · 📏 ~30 cm"}));
  wrap.appendChild(pianoWrap);
  return wrap;
}
// Actualización ligera del Medidor durante mic (sin re-render completo)
var _tunerNodes={};
function updateTunerDOM(){
  if(!_tunerNodes.volNum) return;
  var r=state.reading, td=state.settings.targetDb;
  var zone=dbZone(r?r.db:null, td);
  var activeMidi=(r&&r.midi!=null)?r.midi:null;
  // tarjeta volumen
  _tunerNodes.volCard.style.borderColor=(zone.key!=="silent"?zone.color+"70":"rgba(26,35,126,0.09)");
  _tunerNodes.volNum.textContent=(r&&r.db>=45)?String(r.db):"——";
  _tunerNodes.volNum.style.color=(zone.key!=="silent"?zone.color:"#c7cee6");
  _tunerNodes.volLabel.textContent=zone.key!=="silent"?zone.label:"dB est.";
  _tunerNodes.volLabel.style.color=(zone.key!=="silent"?zone.color:"#5a6899");
  // tarjeta nota
  _tunerNodes.noteNum.textContent=activeMidi!=null?midiName(activeMidi):"——";
  _tunerNodes.noteNum.style.color=(activeMidi!=null?"#6a1b9a":"#c7cee6");
  _tunerNodes.noteFreq.textContent=(r&&r.freq)?(r.freq+" Hz"):"· · ·";
  // barra dB
  var dbPct=r?clamp((r.db-40)/(105-40),0,1)*100:0;
  _tunerNodes.barFill.style.width=dbPct+"%";
  _tunerNodes.barFill.style.background=(zone.key==="ok"||zone.key==="high")?"linear-gradient(90deg,#0d47a1,#2e7d32)":"linear-gradient(90deg,#0d47a1,#6a1b9a)";
  // piano: resaltar tecla activa
  if(_tunerNodes.activeMidi!==activeMidi){
    var prev=_tunerNodes.activeMidi, keys=_tunerNodes.keys;
    if(prev!=null && keys[prev]){ setKeyActive(keys[prev],prev,false); }
    if(activeMidi!=null && keys[activeMidi]){ setKeyActive(keys[activeMidi],activeMidi,true); }
    _tunerNodes.activeMidi=activeMidi;
  }
}
function setKeyActive(k,midi,on){
  if(k.black){
    k.btn.style.background=on?PIANO_B_ACT:PIANO_B_BASE;
  } else {
    k.btn.style.background=on?PIANO_W_ACT:PIANO_W_BASE;
    k.span.textContent=(k.isDO||on)?midiName(midi):"";
    k.span.style.color=on?"#fff":k.isDO?"#333":"#8a92a3";
  }
}
function cfgRow(label, value, onDec, onInc){
  var b="width:34px;height:34px;border-radius:9px;border:1px solid rgba(26,35,126,0.15);background:rgba(26,35,126,0.07);color:#0a0a0a;font-size:18px;font-weight:800;";
  return el("div",{style:"display:flex;align-items:center;gap:10px;"},[
    el("div",{style:"flex:1;font-size:13px;color:#5a6899;font-weight:600;"},label),
    btn("−",b,onDec),
    el("div",{style:"min-width:62px;text-align:center;font-size:15px;font-weight:900;color:#0a0a0a;"},value),
    btn("+",b,onInc)
  ]);
}

/* ─────────── Arranque ─────────── */
// Detección de contexto: iOS solo da micrófono en https o file:// (contexto seguro).
state.secureOk = (typeof window.isSecureContext === "undefined") ? true : (window.isSecureContext || location.protocol === "file:");
if(!state.secureOk){
  state.micError="Esta página no está en un contexto seguro (https o archivo local). El micrófono estará bloqueado. Abre el archivo directamente en Safari (file://) o sírvelo por https.";
}

// Restaurar la sesión de hoy: si la app se recarga a mitad de sesión, los
// ejercicios ya guardados vuelven a aparecer como completados en el inicio.
(function(){
  if(!state.log.length) return;
  var s=state.log[state.log.length-1];
  if(localDay(s.date)!==localDay(new Date().toISOString())) return;
  if(s.id<=(state.settings.resetAt||0)) return;   // el usuario reinició la sesión de hoy
  state.sessionId=s.id;
  for(var k in (s.exercises||{})) state.done[k]=true;
})();

render();

// Service Worker: guarda la app para uso offline.
// En desarrollo (localhost) NO se registra, para ver siempre la última versión.
var _isDev = (location.hostname==="localhost" || location.hostname==="127.0.0.1");
if("serviceWorker" in navigator && !_isDev){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
</script>
