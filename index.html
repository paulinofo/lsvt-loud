function showErrBanner(msg){
  try{
    var d=document.createElement("div");
    d.style.cssText="position:fixed;bottom:0;left:0;right:0;z-index:999;background:#c62828;color:#fff;font-size:11px;padding:8px 12px;font-family:monospace;word-break:break-word;";
    d.textContent="⚠️ "+msg;
    document.body.appendChild(d);
    setTimeout(function(){ try{ d.remove(); }catch(e){} }, 20000);
  }catch(e){}
}
window.addEventListener("error", function(ev){ showErrBanner((ev.message||"error")+(ev.lineno?(" @"+ev.lineno):"")); });

var READINGS=[
{titulo:"El colibrí y el incendio",
 texto:"Una tarde de mucho calor, después de semanas sin lluvia, un rayo cayó sobre un árbol seco y el bosque comenzó a arder. Al principio fue una columna de humo delgada. Luego el viento sopló, y las llamas saltaron de copa en copa como si tuvieran prisa. Los animales despertaron con el olor del humo y corrieron hacia el río. Corrieron los venados y los jabalíes, corrieron los conejos, voló la parvada entera de los pericos. Desde la orilla, apretados unos contra otros, miraban arder su casa. Nadie decía nada. ¿Qué se puede decir frente a un incendio?\n\nDe pronto, el león levantó la vista y vio algo extraño: un colibrí volaba directo hacia el fuego. Llevaba en el pico una sola gota de agua. Llegó hasta las llamas, dejó caer su gota, dio la vuelta, regresó al río, tomó otra gota y voló de nuevo hacia el incendio. Una y otra vez. Ida y vuelta. Una gota cada vez.\n\nEl león rugió para hacerse oír: «¡Colibrí! ¿Te has vuelto loco? ¡Eso no sirve de nada! El fuego es enorme y tú eres el pájaro más pequeño de todo el bosque. ¡Una gota de agua no apaga nada! ¿Qué crees que estás haciendo?»\n\nEl colibrí se detuvo un momento en el aire, con las alas zumbando, cansado y chiquito frente al animal más grande de la orilla. Lo miró a los ojos y le contestó con voz clara y fuerte: «Puede que yo solo no apague el incendio. Pero yo estoy haciendo mi parte.»\n\nY se fue por otra gota.\n\nLos animales se quedaron en silencio. Un silencio largo, de esos que pesan. Uno a uno fueron bajando la cabeza, avergonzados: el colibrí, con todo en contra, hacía algo. Ellos, con todo a favor, solo miraban.\n\nEl elefante fue el primero en moverse. Se metió al río, llenó su trompa enorme y lanzó un chorro potente sobre las llamas más cercanas. El oso empezó a cargar agua entre las patas. Los castores, que saben de agua más que nadie, se pusieron a desviar un canal del río hacia el bosque. Las aves formaron una línea en el cielo, llevando gotas, como el colibrí. Hasta los ratones ayudaron, arrastrando hojas mojadas para tapar las brasas del suelo.\n\nTrabajaron toda la tarde y toda la noche, cada quien con lo que tenía: trompas, picos, patas, dientes. Cuando amaneció, el fuego estaba apagado. El bosque olía a humo y algunas zonas quedaron negras, pero la casa de todos seguía en pie. Y todos sabían cómo había empezado la hazaña: con una sola gota de agua, llevada por el más pequeño de todos.\n\nDías después, cuando el bosque empezaba a reverdecer, el león reunió a los animales junto al río y dijo: «Aprendí algo que no voy a olvidar mientras viva. Ninguno de nosotros es demasiado pequeño para ayudar. Y ningún esfuerzo es demasiado chico cuando se hace con el corazón completo. El fuego no lo apagó el más fuerte. Lo apagamos todos, porque uno solo no se rindió.»\n\nEl colibrí escuchaba desde una rama. Tenía las alas todavía adoloridas, pero el pecho lleno de orgullo. No había sido el más grande, ni el más veloz, ni el más poderoso. Había sido, simplemente, el que no se quedó quieto.\n\nMoraleja: no esperes a poder hacerlo todo para empezar a hacer algo. Los grandes cambios comienzan con esfuerzos pequeños y constantes — gota a gota, día a día. Tu práctica de voz es exactamente eso: cada repetición es una gota. Y las gotas, juntas y tercas, apagan incendios."},
{titulo:"Las dos ranas y la crema",
 texto:"En una granja vivían dos ranas amigas. Las dos eran curiosas, y una noche de verano, mientras exploraban la cocina buscando mosquitos, encontraron sobre la mesa un balde grande y brillante. Se acercaron a la orilla al mismo tiempo. «¿Qué habrá adentro?», dijo una. «Huele a dulce», dijo la otra. Se asomaron un poquito más… y las dos resbalaron y cayeron adentro.\n\nEl balde estaba lleno de crema espesa.\n\nAl principio no se asustaron. Eran ranas: nadar era lo suyo. Pero pronto entendieron el problema. Las paredes del balde eran altas y lisas como un vidrio, sin una sola grieta de dónde agarrarse. Y la crema no era como el agua del estanque: era pesada, espesa, se pegaba al cuerpo y las jalaba hacia abajo. Para no hundirse había que patalear todo el tiempo. Y desde esa crema tan blanda, era imposible tomar impulso para saltar.\n\nNadaron en círculos. Empujaron las paredes. Lo intentaron todo. Nada funcionaba.\n\nEntonces la primera rana empezó a hacer cuentas: «Las paredes son muy altas. La crema es muy espesa. Nadie sabe que estamos aquí. Esto no tiene remedio.» Y como sus cuentas le salían tan claras, tomó una decisión: «¿Para qué seguir pataleando, si el final va a ser el mismo?» Dejó de mover las patas. La crema la cubrió despacio, y ahí terminó su historia.\n\nLa segunda rana vio todo. Y sintió el mismo miedo, el mismo cansancio, la misma tentación de parar. Más de una vez pensó que su amiga tenía razón, que aquello era imposible. Pero cada vez que ese pensamiento le llegaba, se contestaba a sí misma con una frase corta, casi como un rezo: «Mientras tenga fuerzas, yo pataleo.»\n\nY pataleó. Pataleó cuando le ardían las piernas. Pataleó con los ojos cerrados, cuando el sueño quería vencerla. Pataleaba un rato con todas sus fuerzas, descansaba tres segundos flotando apenas, y volvía a patalear. No pataleaba porque viera la salida — no la veía. Pataleaba porque estaba viva, y eso era lo único que le tocaba hacer.\n\nY entonces sucedió algo que la rana no sabía que podía suceder. De tanto y tanto batirla, la crema empezó a cambiar. Primero se puso más firme. Después más dura. Con el amanecer, de tanto golpe de pata, la crema se había convertido en mantequilla.\n\nLa rana sintió de pronto algo sólido bajo sus patas. No lo podía creer: ¡suelo firme, en medio del balde! Se subió al bloque de mantequilla, dobló las piernas, tomó el impulso más grande de su vida, y de un salto limpio salió volando por encima del borde.\n\nAfuera, tirada en la mesa, respirando agitada, miró hacia el balde y entendió la lección completa: ella no sabía que la crema podía volverse mantequilla. Ninguna rana lo sabe. No siguió pataleando porque tuviera garantías. Siguió pataleando porque decidió no rendirse. Y fue el esfuerzo mismo — ciego, cansado, terco — el que fabricó el suelo que la salvó.\n\nMoraleja: muchas veces no puedes ver la salida, pero eso no significa que no exista. El esfuerzo constante transforma las cosas de maneras que nadie imagina: debajo de tanto pataleo, se está formando suelo firme. Con la voz pasa igual: cada día de práctica espesa la crema. Un día, sin avisar, sentirás el suelo bajo los pies."},
{titulo:"El burro y el pozo",
 texto:"En un rancho vivía un burro viejo que había trabajado toda su vida: cargó leña, jaló carretas, llevó niños en el lomo. Ya estaba canoso y lento, y pasaba los días pastando cerca de la casa.\n\nUna mañana, caminando distraído, pisó unas tablas podridas que tapaban un pozo seco, y cayó hasta el fondo. El pozo era profundo. El burro quedó de pie, aturdido, y empezó a rebuznar con todas sus fuerzas para pedir ayuda.\n\nRebuznó horas. Al fin llegó el granjero, se asomó, y detrás de él llegaron los vecinos. Todos miraron hacia abajo. El pozo era muy hondo, no había cuerda ni polea, y el burro pesaba demasiado para sacarlo cargando.\n\nEl granjero se rascó la cabeza y tomó una decisión que le pareció práctica: «Este pozo está seco y de todas maneras había que taparlo, para que no se caiga nadie más. Y el burro ya está viejo. No vale la pena tanto esfuerzo. Vamos a rellenar el pozo con tierra, y que el animal descanse ahí.»\n\nPuede sonar cruel, y lo era. Los vecinos dudaron un momento, pero tomaron sus palas. Y empezó a llover tierra dentro del pozo.\n\nEl burro entendió de inmediato lo que pasaba. ¡Le estaban echando tierra encima! ¡Lo estaban enterrando vivo! Rebuznó con un llanto que partía el alma. Pataleó, giró, golpeó las paredes. Arriba, las palas seguían.\n\nY de pronto, el burro se quedó callado.\n\nEl granjero pensó lo peor y se asomó con cuidado. Lo que vio lo dejó con la boca abierta.\n\nCada vez que una palada de tierra le caía en el lomo, el burro hacía algo muy simple y muy sabio: se sacudía. Se sacudía fuerte, dejaba caer la tierra al suelo… y se subía encima. Con cada palada, el montón bajo sus patas crecía un poquito. Y el burro, en vez de dejarse enterrar, subía. Palada. Sacudida. Paso arriba. Palada. Sacudida. Paso arriba.\n\nLos vecinos se dieron cuenta y, sin decirlo, cambiaron de bando: ahora echaban tierra para ayudarlo a subir. El montón creció y creció, y el burro fue subiendo por el pozo, palmo a palmo, hasta que su cabeza asomó por el borde. Dio un último empujón con las patas traseras y salió trotando, cubierto de polvo de pies a cabeza, cansado, pero entero y libre.\n\nEl granjero se quitó el sombrero, apenado y admirado a la vez. Aquel burro viejo, al que ya nadie le veía valor, les acababa de enseñar a todos una lección que ninguna escuela enseña: la vida, tarde o temprano, te echa tierra encima. A veces por descuido, a veces con intención, a veces sin ninguna razón. Enfermedades, pérdidas, malas noticias, días grises que parecen no acabarse.\n\nY cada palada trae escondida la misma pregunta: ¿esta tierra me entierra, o me sube? El que responde no es el problema. El que responde eres tú, con lo que haces en cuanto la tierra te toca el lomo.\n\nMoraleja: cuando sientas que te llueve tierra encima, no te quedes quieto debajo: sacúdete y da un paso arriba. Lo que parecía enterrarte puede ser justo lo que te saque del pozo. Cada AHHH fuerte de hoy, cada frase dicha en voz alta, es una sacudida más — y un paso más cerca de la orilla."},
{titulo:"El bambú que no crecía",
 texto:"Un campesino paciente compró un día una semilla rara: bambú japonés. El vendedor le advirtió: «Esta semilla no es para cualquiera. Hay que cuidarla mucho tiempo antes de ver algo.» El campesino sonrió: «El campo me enseñó a esperar.» Y la sembró en un rincón de su tierra, junto al camino.\n\nEse mismo día, su vecino sembró maíz.\n\nA las pocas semanas, el maíz del vecino ya levantaba sus hojas verdes, en filas parejas que daban gusto ver. En el rincón del bambú, nada. Tierra lisa, callada, como si no hubiera semilla debajo.\n\nPasó un año entero. El vecino cosechó su maíz, volvió a sembrar, y volvió a cosechar. Del bambú, ni una señal. «Esa semilla te salió mala», le decía el vecino por encima de la cerca. «Siembra otra cosa ahí. Estás regando piedras.»\n\nPero el campesino iba cada mañana con su regadera. Quitaba las hierbas. Abonaba la tierra. Le hablaba bajito, como quien saluda. Y no se veía nada.\n\nPasaron dos años. Tres. Cuatro. Cuatro años regando un pedazo de tierra vacía. En el pueblo ya era famoso: «el loco que riega la nada». Hasta su familia le rogaba que se rindiera: «Papá, ya déjalo. No hay nada ahí abajo.» Él contestaba siempre igual, sin enojarse: «La semilla está trabajando. Yo también.»\n\nY en el quinto año, una mañana como cualquier otra, lo vio: un brote verde, del grueso de un dedo, rompiendo la tierra del rincón. El campesino se arrodilló y se rió solo, con los ojos mojados.\n\nLo que pasó después nadie en el pueblo lo olvidó jamás. El bambú creció como si el tiempo le debiera algo: medio metro en días, dos metros en una semana, cinco metros, diez, ¡más de veinte metros en pocas semanas! El tallo más alto de toda la región, mecido por el viento por encima de todos los tejados, crecido —decían los asombrados— «de la noche a la mañana».\n\n¿De la noche a la mañana? El campesino sabía la verdad, y la contaba a quien quisiera oírla: durante esos cinco años, la semilla nunca estuvo dormida. Estaba echando raíces. Raíces hondas y fuertes, metros y metros de raíces tejidas bajo la tierra, invisibles para todos los que solo miraban la superficie. Tenía que ser así: un tallo de veinte metros, sin esas raíces, se caería con el primer viento fuerte. El bambú no tardó cinco años en crecer. Tardó cinco años en prepararse para poder crecer sin romperse.\n\nEl campesino cortó una vara de aquel bambú y la colgó junto a su puerta. Cuando alguien le preguntaba para qué, respondía: «Para acordarme cada mañana de que lo que no se ve, también cuenta. Sobre todo lo que no se ve.»\n\nMoraleja: cuando practiques y no veas resultados, acuérdate del bambú: estás echando raíces. Cada ejercicio que parece no cambiar nada está construyendo por dentro la fuerza que después todos verán. No te preguntes cuánto falta. Riega tu tierra hoy — con tu voz fuerte y clara — y deja que las raíces hagan su trabajo en silencio."},
{titulo:"La zanahoria, el huevo y el café",
 texto:"Una joven tocó una tarde la puerta de su abuela. Traía los hombros caídos y los ojos cansados. La abuela, que había vivido lo suficiente para reconocer esa cara, la hizo pasar sin preguntas y puso agua para el café.\n\n«Abuela», dijo al fin la joven, «ya no puedo más. Los problemas no se acaban nunca. Resuelvo uno y aparecen dos. Me esfuerzo y parece que no sirve. Estoy cansada de luchar. Tú pasaste cosas más duras que las mías… ¿cómo le hiciste para no romperte?»\n\nLa abuela no contestó. Las abuelas sabias casi nunca contestan rápido. La llevó a la cocina, puso tres ollas con agua en la lumbre, y esperó en silencio a que hirvieran. En la primera olla echó una zanahoria, gruesa y firme. En la segunda, un huevo, frágil y de cascarón delgado. En la tercera, un puñado de café molido, que se dispersó en el agua como polvo oscuro.\n\n«Abuela, ¿qué haces?», preguntó la joven. «Espera», dijo la abuela. Y las dejó hervir veinte minutos, sin decir una palabra más, mientras la cocina se llenaba de vapor y de aroma.\n\nAl fin apagó la lumbre. Sacó la zanahoria y la puso en un plato. Sacó el huevo y lo puso al lado. Coló el café y lo sirvió en una taza. «Dime, hija: ¿qué ves?»\n\n«Pues… una zanahoria, un huevo y café», contestó la joven, encogiéndose de hombros.\n\n«Acércate. Tócalos.»\n\nLa joven tocó la zanahoria: había entrado dura como un palo, y ahora estaba blanda, se deshacía entre los dedos. Peló el huevo: había entrado líquido por dentro, y ahora estaba duro, apretado, sin nada de su suavidad. Probó el café: el agua simple se había vuelto oscura, aromática, deliciosa.\n\n«Los tres pasaron por la misma agua hirviendo», dijo la abuela. «La misma agua. El mismo fuego. El mismo tiempo. Y mira: cada uno respondió a su manera. La zanahoria entró fuerte y dura, pero el agua la ablandó: el problema la venció y se rindió. El huevo entró frágil por fuera pero tierno por dentro, y el agua lo endureció por dentro: sobrevivió, sí, pero se volvió duro, cerrado, amargo con todos. Hay gente así, que después de sufrir ya no deja entrar a nadie.»\n\nLa abuela levantó la taza y la puso en las manos de su nieta.\n\n«Pero el café, hija… el café hizo algo que los otros no pudieron. No dejó que el agua hirviendo lo cambiara: él cambió al agua. La convirtió en algo nuevo, en algo mejor, en algo que da gusto y consuela. Eso hacen los que eligen bien: toman lo mismo que los quería vencer y lo transforman.»\n\n«La vida te va a hervir, mi hija. Nos hierve a todos, y más de una vez. La pregunta nunca fue si vendrán las aguas calientes, porque van a venir. La pregunta es otra: cuando vengan… ¿tú qué vas a ser? ¿Zanahoria, huevo, o café?»\n\nDicen que la joven se tomó el café despacio, sin prisa, hasta el fondo. Y que salió de esa cocina caminando más derecha, oliendo a café recién hecho.\n\nMoraleja: no puedes elegir el agua hirviendo, pero sí lo que haces con ella. Que las dificultades no te ablanden ni te endurezcan: transfórmalas, como el café. Practicar tu voz en los días difíciles es exactamente eso — convertir el agua caliente en aroma."}
];

{titulo:"The hummingbird and the fire",
 texto:"One very hot afternoon, after weeks without rain, lightning struck a dry tree and the forest began to burn. At first it was a thin column of smoke. Then the wind blew, and the flames jumped from treetop to treetop as if they were in a hurry. The animals woke to the smell of smoke and ran to the river. The deer ran, the wild pigs ran, the rabbits ran, the whole flock of parrots took to the sky. From the bank, pressed close together, they watched their home burn. Nobody said a word. What can anyone say in front of a fire?\n\nSuddenly the lion looked up and saw something strange: a hummingbird flying straight toward the flames. In her beak she carried a single drop of water. She reached the fire, let her drop fall, turned around, flew back to the river, picked up another drop, and headed to the fire again. Over and over. Back and forth. One drop at a time.\n\nThe lion roared to be heard: \"Hummingbird! Have you lost your mind? That is useless! The fire is enormous and you are the smallest bird in this whole forest. One drop of water puts out nothing! What do you think you are doing?\"\n\nThe hummingbird paused in mid-air, wings humming, tiny and tired in front of the biggest animal on the bank. She looked him in the eye and answered in a clear, loud voice: \"Maybe I cannot put out the fire alone. But I am doing my part.\"\n\nAnd she went for another drop.\n\nThe animals fell silent. A long, heavy silence. One by one they lowered their heads, ashamed: the hummingbird, with everything against her, was doing something. They, with everything in their favor, were only watching.\n\nThe elephant moved first. He waded into the river, filled his enormous trunk, and shot a powerful stream over the nearest flames. The bear began carrying water in his paws. The beavers, who know water better than anyone, set to work digging a channel from the river toward the trees. The birds formed a line across the sky, carrying drops, like the hummingbird. Even the mice helped, dragging wet leaves to smother the embers on the ground.\n\nThey worked all evening and all night, each one with what they had: trunks, beaks, paws, teeth. When the sun rose, the fire was out. The forest smelled of smoke and some patches were black, but everyone's home was still standing. And they all knew how the rescue had begun: with a single drop of water, carried by the smallest of them all.\n\nDays later, when the forest was turning green again, the lion gathered the animals by the river and said: \"I learned something I will remember as long as I live. None of us is too small to help. And no effort is too little when it is given with a whole heart. The strongest did not put out this fire. We all did — because one of us refused to give up.\"\n\nThe hummingbird listened from a branch. Her wings still ached, but her chest was full of pride. She had not been the biggest, or the fastest, or the most powerful. She had simply been the one who would not stand still.\n\nThe moral: do not wait until you can do everything to start doing something. Great changes begin with small, steady efforts — drop by drop, day by day. Your voice practice is exactly that: every repetition is one drop. And drops, together and stubborn, put out fires."},
{titulo:"The two frogs and the cream",
 texto:"On a farm there lived two frogs who were good friends. Both were curious, and one summer night, while exploring the kitchen in search of mosquitoes, they found a large, shiny bucket on the table. They hopped to the rim at the same time. \"What do you think is inside?\" said one. \"It smells sweet,\" said the other. They leaned in a little more… and both slipped and fell in.\n\nThe bucket was full of thick cream.\n\nAt first they were not afraid. They were frogs — swimming was their specialty. But they soon understood the problem. The walls of the bucket were tall and smooth as glass, without a single crack to grab. And the cream was nothing like pond water: it was heavy and thick, it clung to their bodies and pulled them down. To keep from sinking they had to kick all the time. And from something so soft, it was impossible to push off and jump.\n\nThey swam in circles. They pushed against the walls. They tried everything. Nothing worked.\n\nThen the first frog started doing the math: \"The walls are too tall. The cream is too thick. Nobody knows we are here. There is no way out.\" And since her math seemed so clear, she made a decision: \"Why keep kicking, if the ending will be the same?\" She stopped moving her legs. The cream covered her slowly, and there her story ended.\n\nThe second frog saw it all. She felt the same fear, the same exhaustion, the same temptation to stop. More than once she thought her friend had been right, that it truly was impossible. But every time that thought arrived, she answered it with a short phrase, almost like a prayer: \"As long as I have strength, I kick.\"\n\nAnd she kicked. She kicked when her legs burned. She kicked with her eyes closed when sleep tried to take her. She would kick with all her might for a while, rest for three seconds, barely floating, and then kick again. She was not kicking because she could see a way out — she could not. She kicked because she was alive, and kicking was the one thing left to do.\n\nAnd then something happened that the frog did not know could happen. From so much churning, the cream began to change. First it grew firmer. Then harder. By sunrise, beaten by thousands of little kicks, the cream had turned into butter.\n\nSuddenly the frog felt something solid under her feet. She could not believe it: firm ground, in the middle of the bucket! She climbed onto the block of butter, bent her legs, gathered the biggest jump of her life, and sailed clean over the edge.\n\nOutside, lying on the table and catching her breath, she looked back at the bucket and understood the whole lesson: she had not known that cream could turn into butter. No frog knows that. She had not kept kicking because she had guarantees. She kept kicking because she decided not to give up. And it was the effort itself — blind, tired, stubborn — that built the ground that saved her.\n\nThe moral: often you cannot see the way out, but that does not mean there is none. Steady effort transforms things in ways nobody can imagine: beneath all that kicking, solid ground is forming. Your voice works the same way: every day of practice thickens the cream. One day, without warning, you will feel the ground under your feet."},
{titulo:"The donkey and the well",
 texto:"On a ranch there lived an old donkey who had worked his whole life: he had carried firewood, pulled carts, and given children rides on his back. Now he was gray and slow, and spent his days grazing near the house.\n\nOne morning, walking along without paying attention, he stepped on some rotten boards covering a dry well — and fell all the way to the bottom. The well was deep. The donkey stood there, stunned, and began braying with all his strength, calling for help.\n\nHe brayed for hours. Finally the farmer came, looked over the edge, and behind him came the neighbors. They all stared down. The well was very deep, there was no rope or pulley, and the donkey was far too heavy to lift.\n\nThe farmer scratched his head and made a decision that seemed practical to him: \"This well is dry, and we needed to fill it in anyway so nobody else falls in. And the donkey is old. He is not worth all that trouble. Let us fill the well with dirt, and let the animal rest there.\"\n\nIt may sound cruel — and it was. The neighbors hesitated for a moment, but they picked up their shovels. And dirt began to rain into the well.\n\nThe donkey understood immediately what was happening. They were throwing dirt on him! They were burying him alive! He let out a cry that could break anyone's heart. He kicked, he turned, he banged against the walls. Up above, the shovels kept working.\n\nAnd then, suddenly, the donkey went quiet.\n\nThe farmer feared the worst and peeked over the edge. What he saw left his mouth hanging open.\n\nEvery time a shovelful of dirt landed on his back, the donkey did something very simple and very wise: he shook it off. He shook hard, let the dirt fall to the ground… and stepped on top of it. With every shovelful, the pile under his hooves grew a little taller. And the donkey, instead of letting himself be buried, climbed. Shovelful. Shake. Step up. Shovelful. Shake. Step up.\n\nThe neighbors caught on and, without saying it out loud, switched sides: now they were throwing dirt to help him rise. The pile grew and grew, and the donkey came up the well, inch by inch, until his head appeared over the rim. He gave one last push with his hind legs and trotted out — covered in dust from head to tail, exhausted, but whole and free.\n\nThe farmer took off his hat, ashamed and amazed at the same time. That old donkey, the one nobody thought was worth saving, had just taught them all a lesson no school teaches: sooner or later, life throws dirt on you. Sometimes by accident, sometimes on purpose, sometimes for no reason at all. Illness, losses, bad news, gray days that seem to never end.\n\nAnd every shovelful carries the same hidden question: does this dirt bury me, or lift me? The problem is not the one who answers. You are — with what you do the moment the dirt touches your back.\n\nThe moral: when you feel the dirt raining down, do not stand still underneath it: shake it off and take a step up. What seemed to bury you may be exactly what lifts you out of the well. Every loud AHHH today, every phrase spoken out loud, is one more shake — and one step closer to the edge."},
{titulo:"The bamboo that would not grow",
 texto:"A patient farmer one day bought a rare seed: Japanese bamboo. The seller warned him: \"This seed is not for everyone. You must care for it a long time before you see anything at all.\" The farmer smiled: \"The land taught me how to wait.\" And he planted it in a corner of his field, next to the road.\n\nThat same day, his neighbor planted corn.\n\nWithin a few weeks, the neighbor's corn was lifting its green leaves in neat rows that were a pleasure to look at. In the bamboo corner: nothing. Smooth, quiet soil, as if there were no seed under it at all.\n\nA whole year passed. The neighbor harvested his corn, planted again, and harvested again. From the bamboo, not one sign. \"That seed was a dud,\" the neighbor would say over the fence. \"Plant something else there. You are watering rocks.\"\n\nBut the farmer went out every morning with his watering can. He pulled the weeds. He fed the soil. He even spoke to it softly, the way you greet someone. And still nothing showed.\n\nTwo years passed. Three. Four. Four years watering a patch of empty ground. He became famous in town: \"the fool who waters nothing.\" Even his family begged him to stop: \"Please, let it go. There is nothing down there.\" He always answered the same way, without anger: \"The seed is working. So am I.\"\n\nAnd in the fifth year, on a morning like any other, he saw it: a green shoot, thick as a finger, breaking through the soil in the corner. The farmer knelt down and laughed to himself, his eyes wet.\n\nWhat happened next, nobody in town ever forgot. The bamboo grew as if time owed it something: two feet in days, six feet in a week, fifteen feet, thirty, more than sixty feet in a matter of weeks! The tallest stalk in the whole region, swaying in the wind above every rooftop — grown, said the astonished neighbors, \"overnight.\"\n\nOvernight? The farmer knew the truth, and he told it to anyone who would listen: during those five years, the seed was never asleep. It was growing roots. Deep, strong roots — yards and yards of them, woven under the earth, invisible to everyone who only looked at the surface. It had to be that way: a sixty-foot stalk without those roots would snap in the first strong wind. The bamboo did not take five years to grow. It took five years getting ready to grow without breaking.\n\nThe farmer cut a cane from that bamboo and hung it by his front door. When people asked him why, he answered: \"So that every morning I remember that what cannot be seen also counts. Above all, what cannot be seen.\"\n\nThe moral: when you practice and see no results, remember the bamboo: you are growing roots. Every exercise that seems to change nothing is quietly building the strength that everyone will see later. Do not ask how much longer it will take. Water your ground today — with your loud, clear voice — and let the roots do their silent work."},
{titulo:"The carrot, the egg, and the coffee",
 texto:"One afternoon a young woman knocked on her grandmother's door. Her shoulders were slumped and her eyes were tired. The grandmother, who had lived long enough to recognize that face, let her in without questions and put water on for coffee.\n\n\"Grandma,\" the young woman finally said, \"I cannot take it anymore. The problems never end. I solve one and two more appear. I try so hard and it seems useless. I am tired of fighting. You went through harder things than mine… how did you keep from breaking?\"\n\nThe grandmother did not answer. Wise grandmothers almost never answer quickly. She led her to the kitchen, set three pots of water on the stove, and waited in silence for them to boil. Into the first pot she dropped a carrot, thick and firm. Into the second, an egg, fragile in its thin shell. Into the third, a handful of ground coffee, which scattered across the water like dark dust.\n\n\"Grandma, what are you doing?\" the young woman asked. \"Wait,\" said the grandmother. And she let them boil for twenty minutes, without another word, while the kitchen filled with steam and aroma.\n\nAt last she turned off the stove. She took out the carrot and set it on a plate. She took out the egg and placed it beside it. She strained the coffee and poured it into a cup. \"Tell me, my dear: what do you see?\"\n\n\"Well… a carrot, an egg, and coffee,\" the young woman answered, shrugging.\n\n\"Come closer. Touch them.\"\n\nShe touched the carrot: it had gone in hard as a stick, and now it was soft, falling apart between her fingers. She peeled the egg: it had gone in liquid inside, and now it was hard, tight, with none of its softness left. She tasted the coffee: the plain water had turned dark, fragrant, delicious.\n\n\"All three went through the same boiling water,\" said the grandmother. \"The same water. The same fire. The same amount of time. And look: each one answered in its own way. The carrot went in strong and hard, but the water made it soft: the problem defeated it, and it gave up. The egg went in fragile on the outside and tender on the inside, and the water hardened its heart: it survived, yes, but it came out tough, closed, bitter. There are people like that — after suffering, they never let anyone in again.\"\n\nThe grandmother lifted the cup and placed it in her granddaughter's hands.\n\n\"But the coffee, my dear… the coffee did what the others could not. It did not let the boiling water change it: it changed the water. It turned it into something new, something better, something that comforts and delights. That is what people who choose well do: they take the very thing that tried to defeat them, and they transform it.\"\n\n\"Life will boil you, my child. It boils all of us, more than once. The question was never whether the hot water will come, because it will. The question is: when it comes… what will you be? A carrot, an egg, or coffee?\"\n\nThey say the young woman drank the coffee slowly, unhurried, down to the last sip. And that she walked out of that kitchen standing taller, smelling of fresh coffee.\n\nThe moral: you cannot choose the boiling water, but you can choose what to do with it. Do not let difficulties soften you or harden you: transform them, like the coffee. Practicing your voice on the hard days is exactly that — turning hot water into aroma."}

/* ─────────── Utilidades ─────────── */
function pad(n){ return (n<10?"0":"")+n; }
function fmtTime(s){ return pad(Math.floor(s/60))+":"+pad(s%60); }
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
var NOTE=["DO","DO♯","RE","RE♯","MI","FA","FA♯","SOL","SOL♯","LA","LA♯","SI"];
function midiToFreq(m){ return 440*Math.pow(2,(m-69)/12); }
function freqToMidi(f){ return 69+12*Math.log2(f/440); }
function midiName(m){ var N=(typeof state!=="undefined"&&isEN())?NOTE_EN:NOTE; return N[((m%12)+12)%12]+(Math.floor(m/12)-1); }
function hzToNote(hz){ return hz>0?midiName(Math.round(freqToMidi(hz))):"—"; }
function localDay(iso){ var d=new Date(iso); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }

/* ─────────── Metas personalizadas (protocolo: "tan alto/grave/largo COMO PUEDAS", contra tu propio máximo) ─────────── */
// Récords de tono del historial: nota más alta (ej.2), más grave (ej.3) y promedio al hablar (ej.1).
function personalPitch(){
  var hi=null, lo=null, speak=[], n=0;
  state.log.forEach(function(s){
    var e=s.exercises||{};
    if(e[1]&&e[1].pitch&&e[1].pitch.hz){ var m=freqToMidi(e[1].pitch.hz); if(hi==null||m>hi) hi=m; }
    if(e[2]&&e[2].pitch&&e[2].pitch.hz){ var m2=freqToMidi(e[2].pitch.hz); if(lo==null||m2<lo) lo=m2; }
    if(e[0]&&e[0].pitch&&e[0].pitch.hz){ speak.push(freqToMidi(e[0].pitch.hz)); }
  });
  return {hi:hi, lo:lo, speak:speak.length?speak.reduce(function(a,b){return a+b;},0)/speak.length:null};
}
// Zona de tono efectiva: personalizada a los récords del paciente; si no hay historial, la genérica.
function exZone(ex){
  var z=ex.zone; if(!z) return z;
  var p=personalPitch();
  if(ex.pitchRole==="max" && p.hi!=null){
    var mn=Math.round(p.hi)-2;
    return {min:mn, max:z.max, mode:"above", label:tt("tu zona récord (","your record zone (")+midiName(mn)+"+)"};
  }
  if(ex.pitchRole==="min" && p.lo!=null){
    var mx=Math.round(p.lo)+2;
    return {min:z.min, max:mx, mode:"below", label:tt("tu zona récord (","your record zone (")+midiName(mx)+"−)"};
  }
  if(ex.pitchRole==="avg" && p.speak!=null){
    var c=Math.round(p.speak);
    return {min:c-3, max:c+3, mode:"in", label:tt("tu rango habitual (","your usual range (")+midiName(c-3)+"–"+midiName(c+3)+")"};
  }
  return z;
}
// Meta de duración efectiva del sostenido. Prioridad: valor que el usuario fijó a mano;
// si no, para TONO NORMAL el 90% de tu mejor marca histórica (mínimo 8 s); para los demás su default.
function exTarget(ex){
  if(ex.target==null) return null;
  var ov=state.settings.targets && state.settings.targets[ex.id];
  if(ov!=null) return ov;
  if(ex.id!==0) return ex.target;
  var best=0;
  state.log.forEach(function(s){ var e=(s.exercises||{})[0]; if(e&&e.best>best) best=e.best; });
  return best>=9 ? Math.max(8, Math.round(best*0.9)) : ex.target;
}
function setTarget(ex, val){
  if(!state.settings.targets) state.settings.targets={};
  state.settings.targets[ex.id]=clamp(val, 2, 60);
  saveSettings(state.settings);
  state.targetNow=exTarget(ex);   // refresca la meta activa del ejercicio abierto
  render();
}

function computeStreak(log){
  if(!log.length) return 0;
  var days={}; log.forEach(function(s){ days[localDay(s.date)]=1; });
  var streak=0, cur=new Date();
  function key(){ return cur.getFullYear()+"-"+pad(cur.getMonth()+1)+"-"+pad(cur.getDate()); }
  if(!days[key()]) cur.setDate(cur.getDate()-1);
  while(days[key()]){ streak++; cur.setDate(cur.getDate()-1); }
  return streak;
}

// Nota más frecuente de las últimas lecturas (estabiliza la identificación del tono).
function modeMidi(arr){
  if(!arr.length) return null;
  var count={}, best=arr[arr.length-1], bestN=0;
  for(var i=0;i<arr.length;i++){ var v=arr[i]; count[v]=(count[v]||0)+1; if(count[v]>bestN){ bestN=count[v]; best=v; } }
  return best;
}

/* ─────────── Motor de audio ─────────── */
function getCtx(){
  if(!state.audioCtx){
    var AC = window.AudioContext || window.webkitAudioContext;
    state.audioCtx = new AC();
  }
  if(state.audioCtx.state==="suspended") state.audioCtx.resume();
  return state.audioCtx;
}
function playTone(midi){
  try{
    var ctx=getCtx(), osc=ctx.createOscillator(), g=ctx.createGain();
    osc.type="sine"; osc.frequency.value=midiToFreq(midi);
    var t=ctx.currentTime;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.35,t+0.03);
    g.gain.exponentialRampToValueAtTime(0.0001,t+1.5);

function autoCorrelate(buf, sr){
  var SIZE=buf.length, rms=0, i, j;
  for(i=0;i<SIZE;i++) rms+=buf[i]*buf[i];
  rms=Math.sqrt(rms/SIZE);
  if(rms<0.003) return {freq:-1,rms:rms};   // puerta mínima baja: la validación real de "voz" es relativa al piso de ruido (voiceGate)
  var r1=0, r2=SIZE-1, thres=0.2;
  for(i=0;i<SIZE/2;i++){ if(Math.abs(buf[i])<thres){ r1=i; break; } }
  for(i=1;i<SIZE/2;i++){ if(Math.abs(buf[SIZE-i])<thres){ r2=SIZE-i; break; } }
  var b2=buf.slice(r1,r2), N=b2.length;
  if(N<32) return {freq:-1,rms:rms};
  var c=new Float32Array(N);
  for(i=0;i<N;i++){ var sum=0; for(j=0;j<N-i;j++) sum+=b2[j]*b2[j+i]; c[i]=sum; }
  var d=0; while(d<N-1 && c[d]>c[d+1]) d++;
  var maxval=-1, maxpos=-1;
  for(i=d;i<N;i++){ if(c[i]>maxval){ maxval=c[i]; maxpos=i; } }
  if(maxpos<=0) return {freq:-1,rms:rms};
  // Calidad del pico: la voz real correlaciona fuerte (~0.6–0.9 del máximo teórico c[0]);
  // el ruido produce picos aleatorios débiles (<0.3) que NO deben contar como tono.
  if(c[0]<=0 || maxval/c[0]<0.45) return {freq:-1,rms:rms};
  var T0=maxpos, x1=c[T0-1]||0, x2=c[T0], x3=c[T0+1]||0;
  var a=(x1+x3-2*x2)/2, bb=(x3-x1)/2;
  if(a) T0=T0-bb/(2*a);
  var freq=sr/T0;
  if(freq<65||freq>1200) return {freq:-1,rms:rms};   // <65 Hz: fuera el zumbido eléctrico (60 Hz); DO2=65.4 Hz sigue dentro
  return {freq:freq,rms:rms};
}
function startMic(cb){
  state.micError=null;
  // iOS CRÍTICO: crear y reanudar el AudioContext SÍNCRONAMENTE dentro del gesto (toque),
  // ANTES de pedir el micrófono. Si se hace después del await, iOS lo bloquea.
  var ctx;
  try{
    ctx=getCtx();
    if(ctx.state==="suspended"){ ctx.resume(); }
  }catch(e){
    state.micError="No se pudo iniciar el audio en este navegador. Prueba abrir la app en Safari."; render(); if(cb)cb(false); return;
  }

  // Desactivar el procesamiento del micrófono: en iOS el control automático de ganancia,

    if(legacy){
      legacy.call(navigator,micConstraints, function(st){ onStream(st); }, function(err){ onError(err); });
      return;
    }
    state.micError="Este navegador no expone el micrófono (mediaDevices no existe). Abre el archivo en Safari, no dentro de otra app.";
    render(); if(cb)cb(false); return;
  }

    .then(onStream).catch(onError);

  function onStream(stream){

      // suspenda el contexto cuando cambia la sesión de audio (p.ej. al arrancar la grabación).

      state.analyser=analyser; state.srcNode=srcNode; state.micOn=true;
      var buf=new Float32Array(analyser.fftSize);
      var byteBuf=new Uint8Array(analyser.fftSize);
      var hasFloat=typeof analyser.getFloatTimeDomainData==="function";

        state.raf=requestAnimationFrame(loop);
        if(ts-state.lastTs<70) return;
        state.lastTs=ts;
        if(hasFloat) analyser.getFloatTimeDomainData(buf);
        else { analyser.getByteTimeDomainData(byteBuf); for(var i=0;i<byteBuf.length;i++) buf[i]=(byteBuf[i]-128)/128; }

        // referencia para detectar VOZ de forma RELATIVA — el nivel crudo del micrófono varía
        // por dispositivo, así que los umbrales absolutos fallan (y el zumbido de 60 Hz engaña).
        if(!state.floorRms) state.floorRms=Math.max(res.rms,0.0005);
        if(res.rms<state.floorRms) state.floorRms=state.floorRms*0.7+res.rms*0.3;   // baja rápido
        else state.floorRms=Math.min(state.floorRms*1.004, res.rms, 0.02);          // sube lento, también ante ruido constante (ventilador)
        var voiceGate=Math.max(0.003, state.floorRms*2.5);

            else if(Math.abs(fr-0.5*state.smoothF) < 0.15*state.smoothF) fr=fr*2;

        } else {

        }

          if(state.waitingVoice){

          }
          // El reloj arranca con la primera voz (la inhalación previa no cuenta).
          // Umbral relativo al ambiente: en un cuarto ruidoso no arranca solo.
          if(state.waitingVoice && (s.voiced || res.rms>=Math.max(voiceGate, state.noiseFloorRms*3))){
            state.waitingVoice=false; startRepTimer(); updateTimer();
          }
          if(db>=55) state.repSamples.db.push(db);
          if(s.voiced && s.freq>0){
            state.repSamples.hz.push(s.freq);
            var ez=state.zoneNow||EXERCISES[state.exIdx].zone;
            if(ez){ state.repSamples.ztot++; if(inZone(s.mf,ez)) state.repSamples.zin++; }
          }
          // Fin por silencio tras oír la voz: cierra la repetición y avanza solo.
          // Frases: 2 s. Sostenidos: 3.5 s (ventana amplia + detección relativa, para que una
          // voz débil que baja no se confunda con "callar").
          // "Silencio" con umbral ADAPTATIVO: por debajo de 2× el ruido ambiente del cuarto y del
          // 18% del pico de la voz (un umbral fijo falla: el ambiente real nunca es silencio digital).
          var _exT=EXERCISES[state.exIdx].type;
          var _endSil=(_exT==="phrases")?PHRASE_END_SILENCE_MS:(_exT==="sustain")?SUSTAIN_END_SILENCE_MS:0;
          if(_endSil && !state.waitingVoice){
            if(res.rms>state.phrasePeakRms) state.phrasePeakRms=res.rms;
            var gate=Math.max(0.004, state.noiseFloorRms*2, state.phrasePeakRms*0.18);

            if(makingSound){
              state.lastSoundTs=ts;
              if(++state.soundFrames>=3) state.heardSound=true;   // ~200 ms de voz real: ignora clics sueltos
            } else {

            }
          }
        }
        // LECTURA: mientras se oye la voz, desvanece lo ya leído (al ritmo del texto en 5 min de voz).
        if(state.readRunning && EXERCISES[state.exIdx].type==="reading" && _readWords.total>0){

          }
          state.readAdvTs=ts;
        }
        updateLive();
      }
      state.raf=requestAnimationFrame(loop);
      // Vigilante iOS (cada 1s): si iOS suspende/interrumpe el contexto (p.ej. al arrancar la
      // grabación) lo reanuda, y si el bucle de análisis muere lo vuelve a arrancar.

      state.micWatch=setInterval(function(){
        if(!state.micOn){ clearInterval(state.micWatch); state.micWatch=null; return; }
        try{ if(state.audioCtx && state.audioCtx.state!=="running") state.audioCtx.resume(); }catch(e){}

        }

        }

  function onError(err){

function stopMic(){
  if(state.raf) cancelAnimationFrame(state.raf);
  if(state.micWatch){ clearInterval(state.micWatch); state.micWatch=null; }
  if(state.stream){ state.stream.getTracks().forEach(function(t){ t.stop(); }); state.stream=null; }
  state.srcNode=null;
  state.smoothF=0; state.smoothDb=0; state.micOn=false; state.reading=null;
  state.noteBuf.length=0; state.voidFrames=0;
  render();
}

/* ─────────── Wake Lock: pantalla encendida durante los ejercicios ─────────── */
var _wlPending=false;
function syncWakeLock(){
  var want = state.screen==="ex" || (state.screen==="tuner" && state.micOn);
  if(want && !state.wakeLock && !_wlPending && "wakeLock" in navigator){
    _wlPending=true;
    navigator.wakeLock.request("screen").then(function(wl){
      _wlPending=false;
      if(!(state.screen==="ex" || (state.screen==="tuner" && state.micOn))){ try{ wl.release(); }catch(e){} return; }
      state.wakeLock=wl;
      wl.addEventListener("release", function(){ if(state.wakeLock===wl) state.wakeLock=null; });
    }).catch(function(){ _wlPending=false; });
  } else if(!want && state.wakeLock){
    try{ state.wakeLock.release(); }catch(e){}
    state.wakeLock=null;
  }
}
// iOS libera el wake lock al bloquear o cambiar de app; se vuelve a pedir al regresar.
document.addEventListener("visibilitychange", function(){
  if(document.visibilityState==="visible") syncWakeLock();
});

/* ─────────── Zonas ─────────── */
function dbZone(db, targetDb){
  if(db==null || db<52) return {key:"silent",label:"· · · VOCALIZA",color:"#93a0c8",msg:""};
  if(db<targetDb) return {key:"low",label:"⬇ BAJO",color:"#e65100",msg:"¡MÁS FUERTE!"};
  if(db<=90) return {key:"ok",label:"✓ EN RANGO",color:"#2e7d32",msg:"¡MANTÉN ASÍ!"};   // zona verde: meta a 90 dB
  return {key:"high",label:"⬆ MUY FUERTE",color:"#6a1b9a",msg:"potente — sin tensar"};
}
function pitchStatus(mf, z){
  if(mf==null||!z) return null;
  if(z.mode==="above") return mf>=z.min?{ok:true,txt:"✓ agudo"}:{ok:false,txt:"⬆ sube más"};
  if(z.mode==="below") return mf<=z.max?{ok:true,txt:"✓ grave"}:{ok:false,txt:"⬇ baja más"};
  if(mf<z.min) return {ok:false,txt:"⬇ muy grave"};
  if(mf>z.max) return {ok:false,txt:"⬆ muy agudo"};
  return {ok:true,txt:"✓ normal"};
}
function inZone(mf, z){
  if(mf==null||!z) return false;
  if(z.mode==="above") return mf>=z.min;
  if(z.mode==="below") return mf<=z.max;
  return mf>=z.min && mf<=z.max;
}

/* ─────────── Calificación (0–100 + etiqueta) ─────────── */
function scoreLabel(s){
  if(s==null) return {txt:"—",color:"#5a6899"};
  if(s>=85) return {txt:"Excelente",color:"#2e7d32"};
  if(s>=70) return {txt:"Muy bien",color:"#43a047"};
  if(s>=50) return {txt:"Bien",color:"#e65100"};
  if(s>=30) return {txt:"Sigue practicando",color:"#d84315"};
  return {txt:"A mejorar",color:"#c62828"};
}
// Puntajes de un ejercicio a partir de sus stats
function exerciseScores(ex, stats){
  var sc={intensidad:null,tono:null,esfuerzo:null,overall:null};
  if(stats.pctDb!=null) sc.intensidad=clamp(stats.pctDb,0,100);
  if(ex.zone && stats.tonePct!=null) sc.tono=clamp(stats.tonePct,0,100);
  var tg=exTarget(ex);
  if(ex.type==="sustain" && tg && stats.avg!=null) sc.esfuerzo=clamp(Math.round(stats.avg/tg*100),0,100);
  else if(stats.pctDb!=null) sc.esfuerzo=clamp(stats.pctDb,0,100); // frases: decir todas en voz alta
  var parts=[sc.intensidad,sc.tono,sc.esfuerzo].filter(function(v){return v!=null;});
  sc.overall=parts.length?Math.round(parts.reduce(function(a,b){return a+b;},0)/parts.length):null;
  return sc;
}
// Agrega los puntajes de una sesión (objeto exercises)
function aggScores(exs){
  var d={intensidad:[],tono:[],esfuerzo:[],overall:[]};
  for(var k in exs){ var s=exs[k]&&exs[k].scores; if(s){
    ["intensidad","tono","esfuerzo","overall"].forEach(function(dim){ if(s[dim]!=null) d[dim].push(s[dim]); });
  }}
  function avg(a){ return a.length?Math.round(a.reduce(function(x,y){return x+y;},0)/a.length):null; }
  return {intensidad:avg(d.intensidad),tono:avg(d.tono),esfuerzo:avg(d.esfuerzo),overall:avg(d.overall)};
}
function currentSessionExercises(){

  return state.log.length?(state.log[state.log.length-1].exercises||{}):{};
}
function scoreDimRow(label, val){

/* ─────────── Helpers DOM ─────────── */
function el(tag, attrs, children){
  var e=document.createElement(tag);
  if(attrs){ for(var k in attrs){
    if(k==="style") e.style.cssText=attrs[k];
    else if(k==="class") e.className=attrs[k];
    else if(k==="html") e.innerHTML=trs(attrs[k]);
    else e.setAttribute(k, attrs[k]);
  }}
  if(children!=null){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c==null||c===false) return;
      e.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(trs(String(c))):c);
    });
  }
  return e;
}
function btn(txt, style, onClick){
  var b=el("button",{style:style},txt); b.addEventListener("click",onClick); return b;
}

/* ─────────── Pausa (descanso / tomar agua) ─────────── */
var _pauseNode=null;
function pauseSession(){
  if(state.paused) return;
  state.paused=true;
  if(state.timer){ clearInterval(state.timer); state.timer=null; }   // congela el cronómetro de la rep
  state.restSec=0; state.restT0=Date.now();
  if(state.restTimer) clearInterval(state.restTimer);
  state.restTimer=setInterval(function(){ state.restSec=Math.floor((Date.now()-state.restT0)/1000); if(_pauseNode) _pauseNode.textContent=fmtTime(state.restSec); }, 500);
  render();
}
function resumeSession(){
  if(!state.paused) return;
  state.paused=false;
  if(state.restTimer){ clearInterval(state.restTimer); state.restTimer=null; }
  if(state.waterAuto){ state.waterAuto=false; phraseNext(); return; }  // pausa de agua de frases → continúa solo
  if(state.running && !state.waitingVoice){   // si estaba corriendo una rep, reanuda el cronómetro donde quedó
    startRepTimer();
  }
  render();

/* ─────────── Cronómetro ─────────── */
// Fin por silencio tras oír la voz: 3.5 s (da lugar a pausas a media frase sin cortarla).
var PHRASE_END_SILENCE_MS=3500, SUSTAIN_END_SILENCE_MS=3500;
// "GO!": se despliega 1 s después de mostrar la repetición para indicar cuándo empezar.
var GO_DELAY_MS=1000;
function flashGo(){
  try{
    var g=el("div",{style:"position:fixed;inset:0;z-index:70;display:flex;align-items:center;justify-content:center;font-size:100px;font-weight:900;color:#2e7d32;background:rgba(238,241,250,0.72);letter-spacing:3px;pointer-events:none;animation:goPop 1.1s ease forwards;"},"GO!");
    document.body.appendChild(g);
    setTimeout(function(){ try{ g.remove(); }catch(e){} }, 1150);
  }catch(e){}
}
function tickStart(){
  // Pedir micrófono PRIMERO, aún dentro del gesto del toque (clave en iOS).
  if(!state.micOn){ startMic(function(ok){
    // Si el micrófono falla, el reloj arranca de inmediato (no hay voz que esperar).
    if(!ok && state.running && state.waitingVoice){ state.waitingVoice=false; startRepTimer(); updateTimer(); }
  }); }
  state.sec=0; state.running=true;
  state.repSamples={db:[],hz:[],zin:0,ztot:0}; state.history=[];
  state.heardSound=false; state.soundFrames=0; state.lastSoundTs=0;   // re-arma el fin por silencio (frases)
  state.noiseFloorRms=0; state.phrasePeakRms=0;                       // re-mide ambiente y pico de voz
  // Sostenidos y frases: el reloj arranca al oír la voz (la inhalación previa no cuenta).
  var _t=EXERCISES[state.exIdx].type;
  state.waitingVoice = (_t==="sustain"||_t==="phrases") && !state.micError;
  if(!state.waitingVoice){ startRepTimer(); }
  else {
    // "GO!": en FRASES va PRIMERO (apenas se muestra la frase); en tonos, al segundo.
    var _goDelay=(EXERCISES[state.exIdx].type==="phrases")?250:GO_DELAY_MS;
    setTimeout(function(){ if(state.running && state.waitingVoice){ flashGo(); } }, _goDelay);
    // Red de seguridad: si el micrófono no llega a conectar (p.ej. permiso colgado), arranca solo.
    setTimeout(function(){ if(state.running && state.waitingVoice && !state.micOn){ state.waitingVoice=false; startRepTimer(); updateTimer(); } }, 4000);
  }
  render();
}
// Cronómetro basado en la hora real: no deriva si iOS congela los intervalos en segundo plano.
function startRepTimer(){
  state.timerT0=Date.now()-state.sec*1000;
  if(state.timer) clearInterval(state.timer);
  state.timer=setInterval(function(){
    var s=Math.floor((Date.now()-state.timerT0)/1000);
    if(s!==state.sec){
      state.sec=s; updateTimer();
      // Sostenidos: al alcanzar la meta de tiempo, cierra la rep (el gap de 3s + avance lo hace repDone).
      if(state.running && !state.paused && EXERCISES[state.exIdx].type==="sustain"
         && state.targetNow!=null && state.sec>=state.targetNow){ repDone(); }
    }
  }, 250);
}
function repDone(){
  state.running=false;
  if(state.timer){ clearInterval(state.timer); state.timer=null; }
  var ex=EXERCISES[state.exIdx];
  state.repLog.push(state.sec);
  var db=state.repSamples.db, hz=state.repSamples.hz, audio=null;
  if(db.length){
    var onTarget=db.filter(function(d){return d>=state.settings.targetDb;}).length;
    audio={ avgDb:Math.round(db.reduce(function(a,b){return a+b;},0)/db.length),
      maxDb:Math.max.apply(null,db),
      pctOnTarget:Math.round(onTarget/db.length*100),
      tonePct:state.repSamples.ztot?Math.round(state.repSamples.zin/state.repSamples.ztot*100):null,
      minHz:hz.length?Math.min.apply(null,hz):0,
      maxHz:hz.length?Math.max.apply(null,hz):0,
      avgHz:hz.length?hz.reduce(function(a,b){return a+b;},0)/hz.length:0 };
  }
  state.dbLog.push(audio);
  // Frases: califica la frase (pasa con ≥70% del tiempo hablado por arriba de la meta)
  // y lleva el conteo de la ronda de 10 para la calificación 0–10.
  if(ex.type==="phrases"){
    state.lastPhrase = (audio && audio.pctOnTarget!=null) ? {pct:audio.pctOnTarget, ok:audio.pctOnTarget>=70} : null;
    if(state.lastPhrase){ state.cycleN++; if(state.lastPhrase.ok) state.cycleOk++; }
  }
  if(state.rep+1>=exTotal(ex)){
    var avg=Math.round(state.repLog.reduce(function(a,b){return a+b;},0)/state.repLog.length);
    var best=Math.max.apply(null,state.repLog);
    var stats={type:ex.type,name:ex.name,reps:state.repLog.length,avg:avg,best:best};
    var wa=state.dbLog.filter(Boolean);
    if(wa.length){
      stats.avgDb=Math.round(wa.reduce(function(a,r){return a+r.avgDb;},0)/wa.length);
      stats.maxDb=Math.max.apply(null,wa.map(function(r){return r.maxDb;}));
      var pcts=wa.map(function(r){return r.pctOnTarget;}).filter(function(v){return v!=null;});
      if(pcts.length) stats.pctDb=Math.round(pcts.reduce(function(a,b){return a+b;},0)/pcts.length);
      var mins=wa.map(function(r){return r.minHz;}).filter(function(v){return v>0;});
      var maxs=wa.map(function(r){return r.maxHz;}).filter(function(v){return v>0;});
      var avgs=wa.map(function(r){return r.avgHz;}).filter(function(v){return v>0;});
      var tps=wa.map(function(r){return r.tonePct;}).filter(function(v){return v!=null;});
      if(tps.length) stats.tonePct=Math.round(tps.reduce(function(a,b){return a+b;},0)/tps.length);
      if(ex.pitchRole==="max"&&maxs.length){ var h=Math.max.apply(null,maxs); stats.pitch={note:hzToNote(h),hz:Math.round(h)}; }
      else if(ex.pitchRole==="min"&&mins.length){ var h2=Math.min.apply(null,mins); stats.pitch={note:hzToNote(h2),hz:Math.round(h2)}; }
      else if(ex.pitchRole&&avgs.length){ var h3=avgs.reduce(function(a,b){return a+b;},0)/avgs.length; stats.pitch={note:hzToNote(h3),hz:Math.round(h3)}; }
    }
    stats.scores=exerciseScores(ex, stats);
    recordExercise(ex.id, stats);
    if(ex.type==="phrases"){ showCycleSummary(true); }   // calificación de la última ronda; TERMINAR cierra
    else finishEx(ex.id);
  } else if(ex.type==="phrases"){
    // ¿Terminó la ronda de 10 frases? → calificación 0–10 (y descanso); si no, SIGUIENTE FRASE
    // directa, sin pausa numerada (el respiro natural lo dan el silencio de cierre y el GO!).
    var perCycle=exPhrases(ex).length;            // 10
    if((state.rep+1)%perCycle===0){ showCycleSummary(false); }
    else { phraseNext(); }
  } else {
    // Sostenidos: SIGUIENTE repetición directa, sin pausa (el respiro lo dan el silencio
    // de cierre y el GO!). El registro de la rep queda en los puntos y las estadísticas.
    state.lastRepHitMeta = (state.targetNow!=null && state.sec>=state.targetNow);
    state.lastRep={sec:state.sec, db:audio?audio.maxDb:null, cue:SENSE_CUES[state.rep%SENSE_CUES.length]};
    phraseNext();
  }
}

/* ─────────── Auto-ajuste vertical: ninguna pantalla debe necesitar scroll ───────────
   El tamaño efectivo del viewport varía por dispositivo, zoom de página y tamaño de texto
   de iOS; si el contenido rebasa el alto visible, se encoge proporcionalmente hasta caber.
   Excepciones: LECTURA (texto largo, scrollea a propósito) e HISTORIAL (lista). */
function fitToViewport(){
  app.style.zoom="";
  if(state.screen==="history") return;
  if(state.screen==="ex" && EXERCISES[state.exIdx].type==="reading") return;
  // Iterativo: al encoger, el texto se reacomoda y el alto cambia un poco — refina hasta caber.
  // OJO: medir el alto VISUAL (documentElement), no app.scrollHeight (viene en unidades ya
  // escaladas por el propio zoom y haría encoger de más en cada pasada).
  for(var i=0;i<3;i++){
    var vh=window.innerHeight, sh=document.documentElement.scrollHeight;
    if(sh<=vh+1) break;
    var cur=parseFloat(app.style.zoom||"1");
    app.style.zoom=String(Math.max(0.55, cur*(vh/sh)*0.995));
  }
}
window.addEventListener("resize", function(){ fitToViewport(); });
window.addEventListener("orientationchange", function(){ setTimeout(fitToViewport, 250); });

/* ─────────── Render principal ─────────── */
function render(){
  try{ renderInner(); }
  catch(e){
    showErrBanner("render: "+(e.message||e));
    // Auto-recuperación: si la pantalla que falló no era el inicio, regresa al inicio.
    if(state.screen!=="home"){
      try{ state.screen="home"; state.running=false; renderInner(); return; }catch(e2){}
    }
    // Último recurso: botón para reiniciar la vista.
    try{
      app.innerHTML="";
      var b=el("button",{style:"margin:40vh auto 0;display:block;padding:16px 30px;border:none;border-radius:14px;background:#1a237e;color:#fff;font-size:16px;font-weight:800;"},tt("↻ REINICIAR PANTALLA","↻ RESTART SCREEN"));
      b.addEventListener("click",function(){ state.screen="home"; render(); });
      app.appendChild(b);
    }catch(e3){}
  }
}
// Vigilante de arranque: si la pantalla queda vacía (iOS a veces arranca la PWA en blanco), re-renderiza.
var _bootTries=0;
setInterval(function(){
  if(_bootTries>=5) return;
  if(!app.children.length){ _bootTries++; try{ render(); }catch(e){} }
}, 1200);
function renderInner(){
  syncWakeLock();
  app.innerHTML="";
  var s=state.screen;
  if(s==="home") app.appendChild(HomeScreen());
  else if(s==="tuner") app.appendChild(TunerScreen());
  else if(s==="history") app.appendChild(HistoryScreen());

    var ex=EXERCISES[state.exIdx];
    if(ex.type==="sustain") app.appendChild(SustainScreen());
    else if(ex.type==="phrases") app.appendChild(PhraseScreen());
    else if(ex.type==="reading") app.appendChild(ReadScreen());
    else if(ex.type==="conversation") app.appendChild(ConvScreen());
  }
  fitToViewport();
}

/* ─────────── Termómetro (SVG) ─────────── */
function thermometerSVG(db, targetDb, micOn, running){
  var MIN=40,MAX=105,W=70,H=200,TW=44,r=TW/2;
  var tx0=(W-TW)/2, tx1=tx0+TW, ty0=8, ty1=H-8;
  function pct(v){ return clamp((v-MIN)/(MAX-MIN),0,1); }
  function y(p){ return ty1-p*(ty1-ty0); }
  var zone=dbZone(db,targetDb);
  var fill = (db!=null&&db>=45)?pct(db):0;
  var svg='<svg width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'" style="opacity:'+(micOn?1:0.4)+';transition:opacity .3s;">';
  // tube bg
  svg+='<rect x="'+tx0+'" y="'+ty0+'" width="'+TW+'" height="'+(ty1-ty0)+'" rx="'+r+'" fill="#e8eaf6" stroke="rgba(26,35,126,0.2)" stroke-width="1.5"/>';
  // zone bands
  function bandRect(p0,p1,color,op){
    var yy=y(p1), hh=y(p0)-y(p1);
    return '<rect x="'+(tx0+2)+'" y="'+yy+'" width="'+(TW-4)+'" height="'+hh+'" fill="'+color+'" opacity="'+op+'"/>';
  }
  var t=pct(targetDb);
  // Zona de trabajo fija 60–95 dB: blanco debajo, verde la zona, rojo difuminado arriba.
  var z0=pct(60), z1=pct(95);
  svg+='<defs><linearGradient id="redFade" x1="0" y1="1" x2="0" y2="0">'
     +'<stop offset="0%" stop-color="#c62828" stop-opacity="0.10"/>'
     +'<stop offset="100%" stop-color="#c62828" stop-opacity="0.45"/></linearGradient></defs>';
  svg+='<clipPath id="tube"><rect x="'+(tx0+2)+'" y="'+(ty0+2)+'" width="'+(TW-4)+'" height="'+(ty1-ty0-4)+'" rx="'+(r-2)+'"/></clipPath>';
  svg+='<g clip-path="url(#tube)">';
  svg+=bandRect(0,z0,"#ffffff",1);
  svg+=bandRect(z0,z1,"#2e7d32",0.20);
  svg+=bandRect(z1,1,"url(#redFade)",1);
  // fill
  if(fill>0){
    svg+='<rect x="'+(tx0+2)+'" y="'+y(fill)+'" width="'+(TW-4)+'" height="'+(y(0)-y(fill))+'" fill="'+zone.color+'" opacity="0.85"/>';
    svg+='<rect x="'+(tx0+2)+'" y="'+(y(fill)-2)+'" width="'+(TW-4)+'" height="4" fill="'+zone.color+'"/>';
  }
  svg+='</g>';
  // meta dashed line
  svg+='<line x1="'+(tx0-6)+'" y1="'+y(t)+'" x2="'+(tx1+6)+'" y2="'+y(t)+'" stroke="#0a0a0a" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.85"/>';
  // ticks
  [60,80,95].forEach(function(gv){
    svg+='<text x="'+(tx1-2)+'" y="'+(y(pct(gv))+3)+'" font-size="8.5" font-weight="800" fill="rgba(26,35,126,0.55)" text-anchor="end">'+gv+'</text>';
  });
  svg+='</svg>';
  return svg;
}

/* ─────────── Gráfica en vivo (dB+tono) ─────────── */
function liveGraphSVG(history, targetDb, ex){
  var W=300,HDB=76,HP=36,CAP=110;
  function dbY(db){ return HDB-clamp((db-50)/(100-50),0,1)*HDB; }   // escala de la gráfica: 50–100 dB
  var pMin=33,pMax=78;
  function pY(mf){ return HP-clamp((mf-pMin)/(pMax-pMin),0,1)*HP; }
  function X(i){ return i/(CAP-1)*W; }
  var last=history.length?history[history.length-1]:null;
  var okTop=dbY(90), okBot=dbY(targetDb);   // zona verde: meta a 90 dB
  var svg='<svg width="100%" height="'+HDB+'" viewBox="0 0 '+W+' '+HDB+'" preserveAspectRatio="none" style="display:block;">';
  svg+='<rect x="0" y="'+okTop+'" width="'+W+'" height="'+Math.max(0,okBot-okTop)+'" fill="rgba(46,125,50,0.14)"/>';
  svg+='<line x1="0" x2="'+W+'" y1="'+okBot+'" y2="'+okBot+'" stroke="#e65100" stroke-width="1.5" stroke-dasharray="5 4"/>';
  [60,70,80,90].forEach(function(g){ svg+='<line x1="0" x2="'+W+'" y1="'+dbY(g)+'" y2="'+dbY(g)+'" stroke="rgba(26,35,126,0.07)"/><text x="3" y="'+(dbY(g)-2.5)+'" font-size="8" fill="#93a0c8" font-weight="700">'+g+'</text>'; });
  if(history.length>1){
    var pts=history.map(function(h,i){ return X(i).toFixed(1)+","+dbY(h.db).toFixed(1); }).join(" ");
    svg+='<polyline points="'+pts+'" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
  }
  if(last){ var z=dbZone(last.db,targetDb); svg+='<circle cx="'+X(history.length-1)+'" cy="'+dbY(last.db)+'" r="4.5" fill="'+z.color+'"/>'; }
  svg+='</svg>';

  var box=el("div",{style:"background:#ffffff;border-radius:16px;border:1px solid rgba(26,35,126,0.12);padding:10px 10px 8px;width:100%;"});
  box.appendChild(el("div",{style:"display:flex;justify-content:space-between;font-size:9px;letter-spacing:1.5px;color:#5a6899;font-weight:700;padding:0 2px 4px;"},[el("span",null,"🔊 VOLUMEN (dB)"),el("span",{style:"color:#2e7d32;"},tt("■ rango ","■ range ")+targetDb+"–90")]));
  box.appendChild(el("div",{html:svg}));

  // Carril de tono: solo si el ejercicio tiene zona de tono (frases es solo volumen).
  var z2=state.zoneNow||ex.zone;
  if(z2){
    var bandTop,bandBot;
    if(z2.mode==="above"){ bandTop=pY(pMax); bandBot=pY(z2.min); }
    else if(z2.mode==="below"){ bandTop=pY(z2.max); bandBot=pY(pMin); }
    else { bandTop=pY(z2.max); bandBot=pY(z2.min); }
    var svg2='<svg width="100%" height="'+HP+'" viewBox="0 0 '+W+' '+HP+'" preserveAspectRatio="none" style="display:block;">';
    svg2+='<rect x="0" y="'+bandTop+'" width="'+W+'" height="'+Math.max(0,bandBot-bandTop)+'" fill="'+ex.color+'22"/>';
    var seg=[], cur=[];
    history.forEach(function(h,i){ if(h.mf!=null) cur.push(X(i).toFixed(1)+","+pY(h.mf).toFixed(1)); else { if(cur.length>1) seg.push(cur.join(" ")); cur=[]; } });
    if(cur.length>1) seg.push(cur.join(" "));
    seg.forEach(function(sp){ svg2+='<polyline points="'+sp+'" fill="none" stroke="#6a1b9a" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'; });
    if(last&&last.mf!=null) svg2+='<circle cx="'+X(history.length-1)+'" cy="'+pY(last.mf)+'" r="3.8" fill="#6a1b9a"/>';
    svg2+='</svg>';
    box.appendChild(el("div",{style:"display:flex;justify-content:space-between;font-size:9px;letter-spacing:1.5px;color:#5a6899;font-weight:700;padding:8px 2px 4px;border-top:1px solid rgba(26,35,126,0.07);margin-top:6px;"},[el("span",null,"♪ TONO"),el("span",{style:"color:"+ex.color+";"},"■ "+trs(z2.label))]));
    box.appendChild(el("div",{html:svg2}));
  }
  return box;
}

var _readNode=null, _readDbNode=null;
// Palabras del texto de lectura (spans) para ir desvaneciendo lo ya leído mientras se oye la voz.
var _readWords={els:[],total:0,rate:0,faded:0};
// Aplica el desvanecido según state.readProgress, en ambas direcciones (sirve para re-sincronizar).
function applyReadFade(){
  var upto=Math.min(Math.floor(state.readProgress||0), _readWords.total);
  for(var k=0;k<_readWords.total;k++){ _readWords.els[k].style.opacity = (k<upto) ? READ_FADE_OPACITY : "1"; }
  _readWords.faded=upto;
}
// Indicador en vivo de la lectura: dB y si la app está oyendo la voz (diagnóstico visible).
function updateReadDOM(){
  if(!_readDbNode) return;
  var r=state.reading;
  var speaking = state.readSoundTs && (performance.now()-state.readSoundTs)<450;
  _readDbNode.textContent = (r&&r.db>=45 ? r.db+" dB" : "— dB") + (speaking ? tt(" · 🎙️ te escucho"," · 🎙️ I hear you") : tt(" · 🤫 no oigo voz"," · 🤫 no voice heard"));
  _readDbNode.style.color = speaking ? "#2e7d32" : "#93a0c8";
}
var READ_FADE_OPACITY="0.18";
// Lectura del día: rota con la fecha del calendario (cada día toca un autor/texto distinto).
function nextReading(){
  var d=new Date();
  var doy=Math.floor((d-new Date(d.getFullYear(),0,0))/86400000);
  var RS=isEN()?READINGS_EN:READINGS;
  return RS[doy%RS.length];
}
function readStart(){
  if(state.readRunning || state.readSec<=0) return;
  releaseRec();
  function begin(){
    state.readRunning=true;
    state.readProgress=0; state.readSoundTs=0; state.readAdvTs=0;   // reinicia el desvanecido de lo leído
    // Conversación: durante la charla se miden dB (state.running activa la captura del bucle de audio)
    if(EXERCISES[state.exIdx].type==="conversation"){ state.running=true; state.repSamples={db:[],hz:[],zin:0,ztot:0}; }
    state.readEndAt=Date.now()+state.readSec*1000;
    if(state.readTimer) clearInterval(state.readTimer);
    state.readTimer=setInterval(function(){
      var s=Math.max(0, Math.ceil((state.readEndAt-Date.now())/1000));
      if(s!==state.readSec){ state.readSec=s; if(_readNode) _readNode.textContent=fmtTime(s); }
      if(s<=0){ stopReading(); }
    }, 250);
    render();
  }
  if(!state.micOn){ startMic(function(ok){ if(ok) startReadRecording(); begin(); }); }
  else { startReadRecording(); begin(); }
}
function stopReading(){
  if(state.readTimer){ clearInterval(state.readTimer); state.readTimer=null; }
  state.readRunning=false;
  // Conversación: cerrar la medición y calcular las estadísticas de la charla
  if(state.running && EXERCISES[state.exIdx].type==="conversation"){
    state.running=false;
    var d=state.repSamples.db;
    if(d.length){
      var on=d.filter(function(v){return v>=state.settings.targetDb;}).length;
      var st={type:"conversation", name:EXERCISES[state.exIdx].name,
        avgDb:Math.round(d.reduce(function(a,b){return a+b;},0)/d.length),
        maxDb:Math.max.apply(null,d),
        pctDb:Math.round(on/d.length*100)};
      st.scores=exerciseScores(EXERCISES[state.exIdx], st);
      state.convStats=st;
    }
  }
  if(state.recording && state.recorder){ try{ state.recorder.stop(); }catch(e){ state.recording=false; render(); } }
  else render();
}
function startReadRecording(){
  try{
    if(typeof MediaRecorder==="undefined"){ state.recUnsupported=true; return; }
    if(!state.stream) return;
    var opts={}, types=["audio/mp4","audio/webm;codecs=opus","audio/webm"];
    for(var i=0;i<types.length;i++){ if(MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(types[i])){ opts.mimeType=types[i]; break; } }
    state.recChunks=[];
    // iOS: grabar desde el grafo de audio, NO del stream crudo — si el grabador y el analizador
    // consumen el mismo stream, iOS silencia uno de los dos (y el seguimiento de voz muere).
    var recStream=state.stream;
    try{
      if(state.audioCtx && state.srcNode && state.audioCtx.createMediaStreamDestination){
        var dest=state.audioCtx.createMediaStreamDestination();
        state.srcNode.connect(dest);
        recStream=dest.stream;
      }
    }catch(e){}
    state.recorder = opts.mimeType ? new MediaRecorder(recStream, opts) : new MediaRecorder(recStream);
    state.recMime = state.recorder.mimeType || opts.mimeType || "audio/webm";
    state.recorder.ondataavailable=function(e){ if(e.data && e.data.size>0) state.recChunks.push(e.data); };
    state.recorder.onstop=function(){
      try{ state.recBlob=new Blob(state.recChunks,{type:state.recMime}); state.recURL=URL.createObjectURL(state.recBlob); }catch(e){}
      state.recording=false; render();
    };
    state.recorder.start(1000);
    state.recording=true; state.recStarted=true;
  }catch(e){ state.recording=false; state.recorder=null; }
}
function releaseRec(){
  if(state.recURL){ try{ URL.revokeObjectURL(state.recURL); }catch(e){} }
  state.recorder=null; state.recChunks=[]; state.recBlob=null; state.recURL=null; state.recMime=""; state.recording=false; state.recStarted=false; state.recUnsupported=false;
}
function clearRead(){

  var streak=computeStreak(state.log);
  var lines=["📈 Mi progreso — Practica tu voz",
    tt("Sesiones: ","Sessions: ")+state.log.length+tt(" · Racha: "," · Streak: ")+streak+(isEN()?((streak===1?" day":" days")):((streak===1?" día":" días"))),""];
  state.log.slice().sort(function(a,b){return b.id-a.id;}).slice(0,20).forEach(function(s){
    var d=new Date(s.date), exs=s.exercises||{}, agg=aggScores(exs);
    var line="• "+d.toLocaleDateString(tt("es-MX","en-US"),{day:"numeric",month:"short"})+" "
      +d.toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"})
      +" — "+Object.keys(exs).length+"/"+EXERCISES.length+" ejercicios";
    if(agg.overall!=null) line+=" — "+agg.overall+" pts ("+scoreLabel(agg.overall).txt+")";

}

// Respaldo completo en JSON: protege el historial si el navegador borra localStorage.
function downloadBackup(){
  var d=new Date();
  var data={app:"PRACTICA TU VOZ", exportedAt:d.toISOString(), settings:state.settings, log:state.log};
  var blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a"); a.href=url;
  a.download="lsvt-historial-"+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+".json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);

}

// Teclas blancas/negras clásicas. La nota activa se resalta en gris (sin color).
var PIANO_W_BASE="#FFFFFF", PIANO_W_ACT="#b9f6ca", PIANO_B_BASE="#111418", PIANO_B_ACT="#69f0ae";   // tecla activa: verde claro
function buildPiano(activeMidi, whiteH){
  whiteH=whiteH||138; var blackH=Math.round(whiteH*0.62);
  var keys={};
  var scroller=el("div",{style:"overflow-x:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 4px;"});
  var kb=el("div",{style:"display:flex;position:relative;width:max-content;margin:0 auto;"});
  var WHITE_W=34, BLACK_W=21;
  var blackSet={1:1,3:1,6:1,8:1,10:1};
  for(var m=36;m<=76;m++){
    if(blackSet[m%12]) continue;
    var isActive=activeMidi===m;
    var isDO=(m%12===0);
    var container=el("div",{style:"position:relative;"});
    (function(mm){
      var whiteSpan=el("span",{style:"font-size:8.5px;font-weight:800;color:"+(isActive?"#1b5e20":isDO?"#333":"#8a92a3")+";"}, (isDO||isActive)?midiName(mm):"");
      var white=btn(whiteSpan,
        "width:"+WHITE_W+"px;height:"+whiteH+"px;background:"+(isActive?PIANO_W_ACT:PIANO_W_BASE)+";border:1px solid #333;border-radius:0 0 6px 6px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;", function(){ playTone(mm); });
      container.appendChild(white);
      keys[mm]={btn:white,span:whiteSpan,isDO:isDO,black:false};
      var nb=mm+1;
      if(blackSet[nb%12]){
        var blackActive=activeMidi===nb;
        var black=btn("", "position:absolute;top:0;right:-"+(BLACK_W/2)+"px;width:"+BLACK_W+"px;height:"+blackH+"px;z-index:2;background:"+(blackActive?PIANO_B_ACT:PIANO_B_BASE)+";border:1px solid #000;border-radius:0 0 5px 5px;", function(e){ e.stopPropagation(); playTone(nb); });
        container.appendChild(black);
        keys[nb]={btn:black,black:true};
      }
    })(m);
    kb.appendChild(container);
  }
  scroller.appendChild(kb);
  return {node:scroller, keys:keys};
}
// Desplaza el piano horizontalmente para dejar la tecla detectada más o menos al centro.
function centerPianoKey(scroller, keyBtn){
  if(!scroller || !keyBtn) return;
  try{
    var kr=keyBtn.getBoundingClientRect(), sr=scroller.getBoundingClientRect();
    if(!sr.width) return;                       // aún no está en el layout
    var target=scroller.scrollLeft + (kr.left+kr.width/2) - (sr.left+sr.width/2);
    target=Math.max(0, Math.min(target, scroller.scrollWidth-scroller.clientWidth));
    if(scroller.scrollTo){ scroller.scrollTo({left:target, behavior:"smooth"}); }
    else { scroller.scrollLeft=target; }
  }catch(e){}
}

// Actualización ligera del Medidor durante mic (sin re-render completo)
var _tunerNodes={};
function updateTunerDOM(){
  if(!_tunerNodes.volNum) return;
  var r=state.reading, td=state.settings.targetDb;
  var zone=dbZone(r?r.db:null, td);
  var activeMidi=(r&&r.midi!=null)?r.midi:null;
  // tarjeta volumen
  _tunerNodes.volCard.style.borderColor=(zone.key!=="silent"?zone.color+"70":"rgba(26,35,126,0.09)");

  _tunerNodes.volLabel.textContent=zone.key!=="silent"?zone.label:"dB est.";
  _tunerNodes.volLabel.style.color=(zone.key!=="silent"?zone.color:"#5a6899");
  // tarjeta nota
  _tunerNodes.noteNum.textContent=activeMidi!=null?midiName(activeMidi):"——";
  _tunerNodes.noteNum.style.color=(activeMidi!=null?"#6a1b9a":"#c7cee6");
  _tunerNodes.noteFreq.textContent=(r&&r.freq)?(r.freq+" Hz"):"· · ·";
  // barra dB
  var dbPct=r?clamp((r.db-40)/(105-40),0,1)*100:0;
  _tunerNodes.barFill.style.width=dbPct+"%";
  _tunerNodes.barFill.style.background=(zone.key==="ok"||zone.key==="high")?"linear-gradient(90deg,#0d47a1,#2e7d32)":"linear-gradient(90deg,#0d47a1,#6a1b9a)";
  // piano: resaltar tecla activa
  if(_tunerNodes.activeMidi!==activeMidi){
    var prev=_tunerNodes.activeMidi, keys=_tunerNodes.keys;
    if(prev!=null && keys[prev]){ setKeyActive(keys[prev],prev,false); }
    if(activeMidi!=null && keys[activeMidi]){ setKeyActive(keys[activeMidi],activeMidi,true); }
    _tunerNodes.activeMidi=activeMidi;
    if(activeMidi!=null && keys[activeMidi]) centerPianoKey(_tunerNodes.scroller, keys[activeMidi].btn);   // nota al centro
  }

function setKeyActive(k,midi,on){
  if(k.black){
    k.btn.style.background=on?PIANO_B_ACT:PIANO_B_BASE;
  } else {
    k.btn.style.background=on?PIANO_W_ACT:PIANO_W_BASE;
    k.span.textContent=(k.isDO||on)?midiName(midi):"";
    k.span.style.color=on?"#1b5e20":k.isDO?"#333":"#8a92a3";
  }
}
function cfgRow(label, value, onDec, onInc){
  var b="width:34px;height:34px;border-radius:9px;border:1px solid rgba(26,35,126,0.15);background:rgba(26,35,126,0.07);color:#0a0a0a;font-size:18px;font-weight:800;";
  return el("div",{style:"display:flex;align-items:center;gap:10px;"},[
    el("div",{style:"flex:1;font-size:13px;color:#5a6899;font-weight:600;"},label),
    btn("−",b,onDec),
    el("div",{style:"min-width:62px;text-align:center;font-size:15px;font-weight:900;color:#0a0a0a;"},value),
    btn("+",b,onInc)
  ]);
}

/* ─────────── Arranque ─────────── */
// Detección de contexto: iOS solo da micrófono en https o file:// (contexto seguro).
state.secureOk = (typeof window.isSecureContext === "undefined") ? true : (window.isSecureContext || location.protocol === "file:");
if(!state.secureOk){
  state.micError="Esta página no está en un contexto seguro (https o archivo local). El micrófono estará bloqueado. Abre el archivo directamente en Safari (file://) o sírvelo por https.";
}

// Restaurar la sesión de hoy: si la app se recarga a mitad de sesión, los
// ejercicios ya guardados vuelven a aparecer como completados en el inicio.
(function(){
  if(!state.log.length) return;
  var s=state.log[state.log.length-1];
  if(localDay(s.date)!==localDay(new Date().toISOString())) return;
  if(s.id<=(state.settings.resetAt||0)) return;   // el usuario reinició la sesión de hoy
  state.sessionId=s.id;
  for(var k in (s.exercises||{})) state.done[k]=true;
})();

render();

// Service Worker: guarda la app para uso offline.
// En desarrollo (localhost) NO se registra, para ver siempre la última versión.
var _isDev = (location.hostname==="localhost" || location.hostname==="127.0.0.1");
if("serviceWorker" in navigator && !_isDev){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("sw.js").catch(function(){});
  });
}
</script>
